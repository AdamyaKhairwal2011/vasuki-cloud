<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Create Account - Vasuki vCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #5c8cbd;
            --google-blue-hover: #174ea6;
            --text-dark: #202124;
            --text-light: #5f6368;
            --border-color: #dadce0;
        }
                        html {
            -webkit-text-size-adjust: 80%; /* Prevents iOS Safari from auto-adjusting font size */
            -moz-text-size-adjust: 80%;    /* For Firefox */
            -ms-text-size-adjust: 80%;     /* For older IE */
            text-size-adjust: 80%;
        }


        body {
            font-family: 'Roboto', sans-serif;
            background-color: #5c8cbd;
            margin: 0;
            display: flex;
            align-items: flex-end; /* Keeps it as a bottom sheet like login */
            justify-content: center;
            min-height: 100vh;
        }

        .signup-container {
            width: 100%;
            max-width: 450px;
            padding: 48px 40px;
            border-radius: 50px 50px 0 0;
            text-align: center;
            background-color: #fff;
            min-height: 70vh; /* Slightly taller to fit more fields */
            box-sizing: border-box;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; color: var(--text-dark); }
        .subtitle { color: var(--text-light); margin-bottom: 30px; font-size: 14px; }

        .input-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 20px; text-align: left; }
        
        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            transition: border 0.2s;
        }

        input:focus { border: 2px solid var(--google-blue); padding: 12px 14px; }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        .btn-text {
            color: var(--google-blue);
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
            font-size: 14px;
        }

        .btn-primary {
            background-color: var(--google-blue);
            color: #fff;
            padding: 10px 24px;
            min-width: 110px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Loader Styles */
        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading .btn-text-content { display: none; }
        .loading .loader { display: inline-block; }

        @media (max-width: 450px) {
            .signup-container { padding: 30px 24px; }
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h1>Create Account</h1>
        <p class="subtitle">Join Vasuki Cloud and start building</p>

        <div class="input-row">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email address">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Create password">
        </div>

        <div class="button-row">
            <button class="btn-text" onclick="window.location.href='login.html'">Sign in instead</button>
            <button class="btn-primary" id="signupBtn" onclick="submitSignup()">
                <span class="btn-text-content">Create</span>
                <div class="loader"></div>
            </button>
        </div>
    </div>

    <script type="module">
        import Vasuki from 'https://cdn.jsdelivr.net/npm/vasuki-db@1.0.1/index.min.js';
        
        let vdb = new Vasuki();

        window.submitSignup = async () => {
            const first = document.getElementById("firstName").value.trim();
            const last = document.getElementById("lastName").value.trim();
            const email = document.getElementById("email").value.trim().toLowerCase();
            const password = document.getElementById("password").value;
            const signupBtn = document.getElementById("signupBtn");

            if (!first || !last || !email || !password) {
                return alert("Please fill all fields");
            }

            // UI: Start Loading
            signupBtn.classList.add('loading');
            signupBtn.disabled = true;

            try {
                // Step 1: Auth the SDK session
                await vdb.login('codeclutch.adamyarao@gmail.com', 'wkmeupb4ugo');

                // Step 2: Insert the new user
                const name = `${first} ${last}`;
                // Note: Ensure your SDK uses 'users_rows.json' as the DB name 
                // and 'Sheet1' as table to match your login logic
                const result = await vdb.insertRow('users_rows', 'Sheet1', {
                    username: email, // used 'username' to match your login query
                    email: email,    // keeping both for safety
                    name: name,
                    password: password
                });

                alert("Account created successfully!");
                window.location.href = "login.html";

            } catch (err) {
                console.error("Signup Error:", err);
                alert("Signup failed. Check console for details.");
                signupBtn.classList.remove('loading');
                signupBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
