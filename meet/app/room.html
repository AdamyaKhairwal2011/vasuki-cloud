<!DOCTYPE html>
<html>
<head>
<title>Vasuki Meet</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h3 id="roomId"></h3>
</header>

<div id="layout">

<div id="videos"></div>

<div id="sidebar">
<h4>Room Info</h4>
<p>Share this ID with others</p>
<p id="copyRoom"></p>
</div>

</div>

<div class="controls">
<button onclick="toggleMute()">Mute</button>
<button onclick="toggleCamera()">Camera</button>
<button onclick="shareScreen()">Share</button>
</div>

<script src="app.js"></script>

<script>
const id = new URLSearchParams(location.search).get("room");
document.getElementById("copyRoom").innerText = id;
</script>

</body>
</html>
