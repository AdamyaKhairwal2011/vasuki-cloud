<!DOCTYPE html>
<html>
<head>
<title>Vasuki Meet</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h3 id="roomId"></h3>
</header>

<div id="layout">

<div id="videos"></div>

<div id="sidebar">

<div class="panel">
<h4>Invite</h4>
<button onclick="copyLink()">Copy Link</button>
</div>

<div class="panel">
<h4>Participants</h4>
<ul id="users"></ul>
</div>

<div class="panel">
<h4>Chat</h4>
<div id="chatBox"></div>
<input id="chatInput">
<button onclick="sendChat()">Send</button>
</div>

</div>

</div>

<div class="controls">
<button onclick="toggleMute()">Mute</button>
<button onclick="toggleCamera()">Camera</button>
<button onclick="shareScreen()">Share</button>
</div>

<script src="app.js"></script>

<script>
function copyLink() {
    const url = window.location.href;
    navigator.clipboard.writeText(url);
    alert("Link copied");
}

function updateUsers(users) {
    const list = document.getElementById("users");
    list.innerHTML = "";
    users.forEach(u => {
        const li = document.createElement("li");
        li.innerText = u;
        list.appendChild(li);
    });
}

function addChat(data) {
    const box = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.innerText = data.user + ": " + data.msg;
    box.appendChild(div);
}
</script>

</body>
</html>
