<!DOCTYPE html>
<html>
<head>
<title>Vasuki Meet</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<header>
<h3 id="roomId"></h3>
</header>

<div id="layout">

<div id="videos"></div>

<div id="sidebar">

<div class="panel">
<h4>Invite</h4>
<button onclick="copyLink()">Copy Link</button>
</div>

<div class="panel">
<h4>Participants</h4>
<ul id="users"></ul>
</div>

<div class="panel">
<h4>Chat</h4>
<div id="chatBox"></div>
<input id="chatInput" placeholder="Message">
<button onclick="sendChat()">Send</button>
</div>

<div class="panel">
<h4>Captions</h4>
<button onclick="startCaptions()">On</button>
<button onclick="stopCaptions()">Off</button>
</div>

</div>

</div>

<div id="captionsBar">
<span id="captions"></span>
</div>

<div class="controls">
<button onclick="toggleMute()">Mute</button>
<button onclick="toggleCamera()">Camera</button>
<button onclick="shareScreen()">Share</button>
</div>

<script src="app.js"></script>

</body>
</html>
