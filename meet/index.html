<!DOCTYPE html>
<html>
<head>
<title>Vasuki Meet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h3>Vasuki Meet</h3>
</header>

<div class="center">
<input id="username" placeholder="Enter your name">
<button onclick="enter()">Continue</button>
</div>

<script>
function enter() {
    const name = document.getElementById("username").value;
    if (!name) return alert("Enter name");

    localStorage.setItem("vasuki_user", name);
    location.href = "app/room.html?room=" + Math.random().toString(36).substr(2,5);
}
</script>

</body>
</html>
