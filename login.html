<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vasuki Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f5f5f7;
            --accent: #0071e3;
            --text-main: #1d1d1f;
            --text-sec: #86868b;
            --card-bg: rgba(255,255,255,0.85);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            text-align: center;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            animation: fadeIn 1s ease;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--accent);
            color: #fff;
            border-radius: 12px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
        }

        p {
            color: var(--text-sec);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 16px;
            background: #fff;
            border: 1px solid #e5e5e7;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,113,227,0.15);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            background: #005ecb;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .signup-btn {
    margin-top: 14px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
}

.signup-btn:hover {
    background: rgba(0,113,227,0.08);
    transform: scale(1.02);
}

    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">
            <img src="./logo.png" alt="" width="70px">
        </div>
        <h1>Vasuki Cloud</h1>
        <p>Sign in with your email to access your vault.</p>
        <input type="email" id="emailInput" placeholder="name@company.com">
        <input type="password" id="passwordInput" placeholder="Enter your password">
        <button onclick="handleLogin()">Continue</button>
        <button class="signup-btn" onclick="goToSignup()">
            Go to Signup
        </button>

    </div>

    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";
        const SUPABASE_URL = "https://aitckloahlwemlekaour.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdGNrbG9haGx3ZW1sZWthb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyOTQ3MTMsImV4cCI6MjA3MTg3MDcxM30.uQjQLSz0mQuuArPQ_F8u-suQ-6T0e9bF11ahQtSw6yA";
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        window.handleLogin = async function handleLogin() {
            try {
                const { data, error } = await supabase
                    .from("users")
                    .select("*");

                if (error) {
                    console.error(error);
                    alert("Failed to fetch users. Try again later.");
                    return;
                }

                console.log(data)

                const email = document.getElementById('emailInput').value.toLowerCase();
                const password = document.getElementById('passwordInput').value;

                if (email && password) {
                    const user = data.find(user => user.username.toLowerCase() === email && user.password === password);
                    if (user) {
                        alert("Login successful!");
                        window.location.href = `index.html?email=${encodeURIComponent(email)}`;
                    } else {
                        alert("Invalid email or password");
                    }
                } else {
                    alert("Please enter an email and password");
                }
            } catch (err) {
                console.error(err);
                alert("Something went wrong. Try again.");
            }
        }

        window.goToSignup = function () {
            window.location.href = "signup.html";
        };

    </script>
</body>
</html>
