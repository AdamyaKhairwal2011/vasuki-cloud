<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in - Vasuki vCloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --google-blue: #5c8cbd;
            --google-blue-hover: #174ea6;
            --text-dark: #202124;
            --text-light: #5f6368;
            --border-color: #dadce0;
        }
                html {
            -webkit-text-size-adjust: 80%; /* Prevents iOS Safari from auto-adjusting font size */
            -moz-text-size-adjust: 80%;    /* For Firefox */
            -ms-text-size-adjust: 80%;     /* For older IE */
            text-size-adjust: 80%;
        }


        body {
            font-family: 'Roboto', sans-serif;
            background-color: #5c8cbd;
            margin: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            min-height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 48px 40px;
            border-radius: 50px 50px 0 0;
            text-align: center;
            background-color: #fff;
            height: 60vh;
            box-sizing: border-box;
            box-shadow: 0 -10px 25px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
        .subtitle { color: var(--text-light); margin-bottom: 40px; font-size: 14px; }

        .input-group { margin-bottom: 24px; text-align: left; }
        
        input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
        }

        input:focus { border: 2px solid var(--google-blue); padding: 12px 14px; }

        .button-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .btn-text {
            color: var(--google-blue);
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        /* --- LOADER STYLES --- */
        .btn-primary {
            background-color: var(--google-blue);
            color: #fff;
            padding: 10px 24px;
            min-width: 100px;
            font-size: 14px;
            font-weight: 500;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .btn-primary:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: none; /* Hidden by default */
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn-primary.loading .btn-text-content {
            display: none;
        }

        .btn-primary.loading .loader {
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
        </div>
        <h1>Welcome Back, We Missed You!</h1>
        <p class="subtitle">Get Back By Using Your EmailID and password</p>

        <div class="input-group">
            <input type="email" id="emailInput" placeholder="Email" autocomplete="username">
        </div>

        <div class="input-group">
            <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
        </div>


        <div class="button-row">
            <button class="btn-text" onclick="goToSignup()">Create account</button>
            <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Next</button>
             <div class="loader" id="loginLoader"></div>
        </div>
    </div>

<script type="module">
    import Vasuki from 'https://cdn.jsdelivr.net/npm/vasuki-db@1.0.1/index.min.js';
    
    let vdb = new Vasuki();

    // 1. DETERMINE REDIRECT LOGIC
    const previousPage = document.referrer;
    const isInternal = previousPage && previousPage.includes(window.location.hostname);
    
    // Create a URL object to easily manipulate the path
    if(localStorage.getItem("vcloud_user")){
        window.location.href = './dash.html?email=' + encodeURIComponent(localStorage.getItem("vcloud_user"));
    }

    // 2. AUTO-LOGIN CHECK (On Load)
    window.addEventListener('DOMContentLoaded', () => {
        const existingUser = localStorage.getItem("vcloud_user");
        
        // Prevent loop: If we just came from the dashboard, don't auto-redirect back to it
        const comingFromDash = destURL.pathname.includes('dash.html');

        if (existingUser && !comingFromDash) {
            // Only add email if it's not already there
            if (!destURL.searchParams.has('email')) {
                destURL.searchParams.set('email', existingUser);
            }
            window.location.href = destURL.href;
        }
    });

    window.goToSignup = function() {
        window.location.href = 'signup.html';
    }

    // 3. LOGIN HANDLER
    window.handleLogin = async function() {
        const emailInput = document.getElementById('emailInput').value.toLowerCase().trim();
        const password = document.getElementById('passwordInput').value;
        const loginBtn = document.getElementById('loginBtn');

        if (!emailInput || !password) {
            alert("Please fill in all fields");
            return;
        }

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        try {
            await vdb.login('codeclutch.adamyarao@gmail.com', 'wkmeupb4ugo');
            const data = await vdb.fetchTable('users_rows', 'Sheet1');

            const user = data.find(u => 
                u && u.username && u.username.toLowerCase() === emailInput && u.password === password
            );

            if (user) {
                localStorage.setItem('vcloud_user', emailInput);
                window.location.href = './dash.html?email=' + encodeURIComponent(emailInput);
            } else {
                alert("Invalid credentials.");
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
        }
    }
</script>
</body>
</html>
