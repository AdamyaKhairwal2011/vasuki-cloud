<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in - Vasuki vCloud</title>
    <style>
        @font-face {
            font-family: 'CustomFont';
            src: url('custom.ttf') format('truetype');
        }
        
        body {
            font-family: 'CustomFont', -apple-system, BlinkMacSystemFont, sans-serif;
        }
    </style>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --cream: #c9c9c9;
            --cream-dark: #ede7d9;
            --cream-border: #d9d0bc;
            --yellow-accent: #f3efbb;
            --yellow-hover: #f5f7ab;
            --yellow-light: #fdf6d8;
            --gray-900: #1c1c1e;
            --gray-700: #3a3a3c;
            --gray-500: #636366;
            --gray-400: #8e8e93;
            --gray-200: #d1d1d6;
            --white: #ffffff;
            --shadow-soft: 0 2px 20px rgba(0,0,0,0.08);
            --shadow-card: 0 4px 40px rgba(0,0,0,0.12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--cream);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(232, 200, 74, 0.13) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(180, 180, 180, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 16px 40px;
        }

        /* Top bar */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 28px;
            background: rgba(245, 240, 232, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--cream-border);
            z-index: 10;
        }

        .top-bar-logo {
            display: flex;
            align-items: center;
            gap: 9px;
            font-family: 'DM Serif Display', serif;
            font-size: 17px;
            color: var(--gray-900);
            letter-spacing: -0.2px;
        }

        .logo-mark {
            width: 30px; height: 30px;
            background: var(--yellow-accent);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--gray-900);
        }

        .top-bar-help {
            font-size: 13px;
            color: var(--gray-500);
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 8px;
            transition: background 0.15s;
        }
        .top-bar-help:hover { background: var(--cream-dark); }

        /* Card */
        .card {
            width: 100%;
            max-width: 440px;
            background: var(--white);
            border-radius: 28px;
            border: 1px solid var(--cream-border);
            padding: 44px 44px 38px;
            animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Brand chip */
        .brand-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            border: 1px solid rgba(232, 200, 74, 0);
            border-radius: 100px;
            padding: 4px 13px 4px 5px;
            margin-bottom: 22px;
        }

        .brand-chip img {
            width: 38px; height: 38px;
            border-radius: 6px;
        }
        .brand-chip-dot {
            width: 22px; height: 22px;
            background: var(--yellow-accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 700;
            color: var(--gray-900);
        }
        .brand-chip-text {
            font-size: 12px; font-weight: 500;
            color: var(--gray-700); letter-spacing: 0.2px;
        }

        h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--gray-900);
            line-height: 1.2;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* Inputs */
        .input-group { margin-bottom: 18px; }

        .input-label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 7px;
            letter-spacing: 0.1px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            font-family: 'DM Sans', sans-serif;
            color: var(--gray-900);
            background: var(--cream);
            border: 1.5px solid var(--cream-border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: var(--yellow-accent);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(232, 200, 74, 0.18);
        }
        input::placeholder { color: var(--gray-400); }

        .forgot-link {
            display: block;
            text-align: right;
            font-size: 12px;
            color: var(--gray-500);
            margin-top: 7px;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s;
        }
        .forgot-link:hover { color: var(--gray-700); }

        /* Actions */
        .actions {
            margin-top: 28px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-primary {
            width: 100%;
            padding: 13px 24px;
            background: var(--gray-900);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
            position: relative;
            min-height: 50px;
        }
        .btn-primary:hover:not(:disabled) { background: var(--gray-700); }
        .btn-primary:active:not(:disabled) { transform: scale(0.99); }
        .btn-primary:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

        .btn-primary.loading .btn-label { opacity: 0; }
        .spinner {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .btn-primary.loading .spinner { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--gray-400);
            font-size: 12px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--cream-border);
        }

        /* Google Button */
        .btn-google {
            width: 100%;
            padding: 12px 24px;
            background: var(--white);
            border: 1.5px solid var(--cream-border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            min-height: 50px;
        }
        .btn-google:hover:not(:disabled) {
            background: var(--cream);
            box-shadow: var(--shadow-soft);
        }
        .btn-google:disabled { opacity: 0.55; cursor: not-allowed; }

        /* Footer */
        .card-footer {
            margin-top: 28px;
            padding-top: 22px;
            border-top: 1px solid var(--cream-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .footer-text { font-size: 13px; color: var(--gray-500); }

        .btn-create {
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-900);
            background: var(--yellow-light);
            border: 1px solid rgba(232, 200, 74, 0.5);
            border-radius: 9px;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .btn-create:hover { background: rgba(232, 200, 74, 0.28); }

        /* Page footer */
        .page-footer {
            margin-top: 28px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .page-footer a {
            font-size: 12px;
            color: var(--gray-400);
            text-decoration: none;
            transition: color 0.15s;
        }
        .page-footer a:hover { color: var(--gray-700); }

        @media (max-width: 480px) {
            .card { padding: 32px 24px 28px; border-radius: 20px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>



    <div class="card">
        <div class="brand-chip">
            <img src="./logo.jpg" alt="">
        </div>

        <h1>Sign in</h1>
        <p class="subtitle">to continue to Vasuki Cloud</p>

        <div class="input-group">
            <label class="input-label" for="emailInput">Email address</label>
            <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="username">
        </div>

        <div class="input-group">
            <label class="input-label" for="passwordInput">Password</label>
            <input type="password" id="passwordInput" placeholder="Enter your password" autocomplete="current-password">
        </div>

        <div class="actions">
            <button class="btn-primary" id="loginBtn" onclick="handleLogin()">
                <span class="btn-label">Next</span>
                <div class="spinner"></div>
            </button>

            <div class="divider">or</div>

            <button class="btn-google" id="googleBtn" onclick="handleGoogleLogin()">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <div class="card-footer">
            <span class="footer-text">New to vCloud?</span>
            <button class="btn-create" onclick="goToSignup()">Create account</button>
        </div>
    </div>

    <footer class="page-footer">
        <a href="#" onclick="showSettings()">Settings</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#">Help</a>
    </footer>

<script type="module">
    import Vasuki from 'https://cdn.jsdelivr.net/npm/vasuki-db@1.0.1/index.min.js';
    let vdb = new Vasuki();

    if (localStorage.getItem("vcloud_user")) {
        window.location.href = './dash.html?email=' + encodeURIComponent(localStorage.getItem("vcloud_user"));
    }

    window.goToSignup = function () {
        window.location.href = 'signup.html';
    }

    window.handleLogin = async function () {
        const emailInput = document.getElementById('emailInput').value.toLowerCase().trim();
        const password = document.getElementById('passwordInput').value;
        const loginBtn = document.getElementById('loginBtn');

        if (!emailInput || !password) { alert("Please fill in all fields"); return; }

        loginBtn.classList.add('loading');
        loginBtn.disabled = true;

        try {
            await vdb.login('codeclutch.adamyarao@gmail.com', 'wkmeupb4ugo');
            const data = await vdb.fetchTable('users_rows', 'Sheet1');
            const user = data.find(u => u && u.username && u.username.toLowerCase() === emailInput && u.password === password);

            if (user) {
                localStorage.setItem('vcloud_user', emailInput);
                localStorage.setItem('vcloud_username', user.name || '');
                window.location.href = './dash.html?email=' + encodeURIComponent(emailInput);
            } else {
                alert("Invalid credentials.");
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;
        }
    }

    window.handleGoogleLogin = function () {
        const googleBtn = document.getElementById('googleBtn');
        googleBtn.disabled = true;

        const client = google.accounts.oauth2.initCodeClient({
            client_id: "600593339063-blt9bcoe1k382f82ri4gd7a2el2bqfv1.apps.googleusercontent.com",
            scope: "email profile openid",
            ux_mode: "popup",
            callback: async (response) => {
                try {
                    const tokenRes = await fetch("https://oauth2.googleapis.com/token", {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: new URLSearchParams({
                            code: response.code,
                            client_id: "600593339063-blt9bcoe1k382f82ri4gd7a2el2bqfv1.apps.googleusercontent.com",
                            client_secret: "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",
                            redirect_uri: "postmessage",
                            grant_type: "authorization_code"
                        })
                    }).then(r => r.json());

                    if (!tokenRes.access_token) throw new Error("No access token");

                    const userInfo = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
                        headers: { Authorization: `Bearer ${tokenRes.access_token}` }
                    }).then(r => r.json());

                    const email = userInfo.email.toLowerCase();

                    await vdb.login('codeclutch.adamyarao@gmail.com', 'wkmeupb4ugo');
                    const data = await vdb.fetchTable('users_rows', 'Sheet1');
                    const user = data.find(u => u && u.username && u.username.toLowerCase() === email);

                    if (user) {
                        localStorage.setItem('vcloud_user', email);
                        localStorage.setItem('vcloud_username', userInfo.name || '');
                        window.location.href = './dash.html?email=' + encodeURIComponent(email);
                    } else {
                        alert("No account found. Redirecting to sign up.");
                        window.location.href = './signup.html?email=' + encodeURIComponent(email) + '&name=' + encodeURIComponent(userInfo.name || '');
                    }
                } catch (err) {
                    console.error("Google login error:", err);
                    alert("Google sign-in failed. Please try again.");
                    googleBtn.disabled = false;
                }
            }
        });

        client.requestCode();
    }
</script>

<script>
    // Sound Effects System
    class SoundEffects {
        constructor() {
            this.audioContext = null;
            this.sounds = {};
            this.initAudioContext();
        }
        
        initAudioContext() {
            try {
                this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                this.createSounds();
            } catch (error) {
                console.log('Audio not supported');
            }
        }
        
        createSounds() {
            // Create different sound effects using Web Audio API
            this.sounds = {
                click: () => this.playTone(800, 0.1, 'sine'),
                success: () => this.playTone(600, 0.2, 'sine'),
                error: () => this.playTone(300, 0.2, 'sawtooth'),
                hover: () => this.playTone(1000, 0.05, 'sine'),
                notification: () => this.playChord([523, 659, 784], 0.3),
                leave: () => this.playChord([400, 300, 200], 0.4),
                mute: () => this.playTone(400, 0.15, 'square'),
                unmute: () => this.playTone(800, 0.15, 'square')
            };
        }
        
        playTone(frequency, duration, type = 'sine') {
            if (!this.audioContext) return;
            
            const oscillator = this.audioContext.createOscillator();
            const gainNode = this.audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(this.audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, this.audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + duration);
            
            oscillator.start(this.audioContext.currentTime);
            oscillator.stop(this.audioContext.currentTime + duration);
        }
        
        playChord(frequencies, duration) {
            if (!this.audioContext) return;
            
            frequencies.forEach(freq => {
                this.playTone(freq, duration);
            });
        }
        
        play(soundName) {
            if (this.sounds[soundName]) {
                // Resume audio context if suspended
                if (this.audioContext && this.audioContext.state === 'suspended') {
                    this.audioContext.resume();
                }
                this.sounds[soundName]();
            }
        }
    }
    
    // Initialize sound effects
    const soundEffects = new SoundEffects();
    
    // Settings functionality - Global scope
    function showSettings() {
        soundEffects.play('click');
        showSettingsDialog();
    }
    
    // Show settings dialog
    function showSettingsDialog() {
        // Create settings dialog
        const dialog = document.createElement('div');
        dialog.className = 'dialog';
        dialog.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--white);
            border-radius: 28px;
            padding: 44px;
            box-shadow: var(--shadow-card);
            z-index: 10000;
            min-width: 400px;
            max-width: 500px;
            animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
        `;
        
        // Load existing settings
        const existingSettings = JSON.parse(localStorage.getItem('vasuki_meet_settings') || '{}');
        
        dialog.innerHTML = `
            <h2 style="margin: 0 0 24px 0; font-family: 'CustomFont', sans-serif; color: var(--gray-900);">Vasuki Cloud Settings</h2>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--gray-900); font-family: 'CustomFont', sans-serif;">
                    Default Camera Quality
                </label>
                <select id="cameraQuality" style="width: 100%; padding: 12px; border: 1px solid var(--cream-border); border-radius: 12px; font-family: 'CustomFont', sans-serif;">
                    <option value="high" ${existingSettings.cameraQuality === 'high' ? 'selected' : ''}>High (1080p)</option>
                    <option value="medium" ${existingSettings.cameraQuality === 'medium' || !existingSettings.cameraQuality ? 'selected' : ''}>Medium (720p)</option>
                    <option value="low" ${existingSettings.cameraQuality === 'low' ? 'selected' : ''}>Low (480p)</option>
                </select>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 500; color: var(--gray-900); font-family: 'CustomFont', sans-serif;">
                    Default Audio Quality
                </label>
                <select id="audioQuality" style="width: 100%; padding: 12px; border: 1px solid var(--cream-border); border-radius: 12px; font-family: 'CustomFont', sans-serif;">
                    <option value="high" ${existingSettings.audioQuality === 'high' ? 'selected' : ''}>High</option>
                    <option value="medium" ${existingSettings.audioQuality === 'medium' || !existingSettings.audioQuality ? 'selected' : ''}>Medium</option>
                    <option value="low" ${existingSettings.audioQuality === 'low' ? 'selected' : ''}>Low</option>
                </select>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; font-family: 'CustomFont', sans-serif;">
                    <input type="checkbox" id="autoJoinAudio" ${existingSettings.autoJoinAudio !== false ? 'checked' : ''} style="width: 18px; height: 18px;">
                    <span style="color: var(--gray-900);">Automatically join meetings with audio</span>
                </label>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; font-family: 'CustomFont', sans-serif;">
                    <input type="checkbox" id="autoJoinVideo" ${existingSettings.autoJoinVideo !== false ? 'checked' : ''} style="width: 18px; height: 18px;">
                    <span style="color: var(--gray-900);">Automatically join meetings with video</span>
                </label>
            </div>
            
            <div style="margin-bottom: 24px;">
                <label style="display: flex; align-items: center; gap: 12px; cursor: pointer; font-family: 'CustomFont', sans-serif;">
                    <input type="checkbox" id="rememberMe" ${existingSettings.rememberMe === true ? 'checked' : ''} style="width: 18px; height: 18px;">
                    <span style="color: var(--gray-900);">Remember me on this device</span>
                </label>
            </div>
            
            <div style="display: flex; gap: 12px; justify-content: flex-end;">
                <button onclick="this.closest('.dialog').remove(); document.querySelector('.settings-backdrop').remove();" style="padding: 12px 24px; border: 1px solid var(--cream-border); border-radius: 12px; background: var(--white); cursor: pointer; font-family: 'CustomFont', sans-serif;">
                    Cancel
                </button>
                <button onclick="saveLoginSettings(this)" style="padding: 12px 24px; border: none; border-radius: 12px; background: var(--gray-900); color: var(--white); cursor: pointer; font-family: 'CustomFont', sans-serif;">
                    Save Settings
                </button>
            </div>
        `;
        
        // Add backdrop
        const backdrop = document.createElement('div');
        backdrop.className = 'settings-backdrop';
        backdrop.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
        `;
        backdrop.onclick = () => {
            dialog.remove();
            backdrop.remove();
        };
        
        document.body.appendChild(backdrop);
        document.body.appendChild(dialog);
    }
    
    // Save settings
    function saveLoginSettings(button) {
        soundEffects.play('success');
        
        const settings = {
            cameraQuality: document.getElementById('cameraQuality').value,
            audioQuality: document.getElementById('audioQuality').value,
            autoJoinAudio: document.getElementById('autoJoinAudio').checked,
            autoJoinVideo: document.getElementById('autoJoinVideo').checked,
            rememberMe: document.getElementById('rememberMe').checked
        };
        
        // Save to localStorage
        localStorage.setItem('vasuki_meet_settings', JSON.stringify(settings));
        
        // Close dialog
        button.closest('.dialog').remove();
        document.querySelector('.settings-backdrop').remove();
        
        // Show success message with sound
        const notification = document.createElement('div');
        notification.style.cssText = `
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--gray-900);
            color: var(--white);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            z-index: 10000;
            animation: cardIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
            font-family: 'CustomFont', sans-serif;
        `;
        notification.textContent = 'Settings saved successfully';
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.remove();
        }, 3000);
    }
    
    // Add sound effects to all buttons after page load
    document.addEventListener('DOMContentLoaded', function() {
        // Add click sounds to all buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                if (!button.disabled) {
                    soundEffects.play('click');
                }
            });
            
            // Add hover sounds
            button.addEventListener('mouseenter', () => {
                if (!button.disabled) {
                    soundEffects.play('hover');
                }
            });
        });
        
        // Add click sounds to links
        const links = document.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                soundEffects.play('click');
            });
            
            link.addEventListener('mouseenter', () => {
                soundEffects.play('hover');
            });
        });
        
        // Add sound to input focus
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                soundEffects.play('click');
            });
        });
    });
</script>
</body>
</html>
