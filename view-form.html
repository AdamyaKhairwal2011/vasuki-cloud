<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vasuki Forms</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #363636;
            --accent-rgb: 54, 54, 54;
            --accent-light: #F4F4F2;
            --bg: #F0EDE6;
            --card: #FFFFFF;
            --text: #202124;
            --text-secondary: #6B7280;
            --border: #E2E2DF;
            --radius: 10px;
            --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 6px 20px rgba(0,0,0,0.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── PROGRESS BAR ─────────────────────────────── */
        .progress-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: rgba(0,0,0,0.06);
            z-index: 100;
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ── WRAPPER ──────────────────────────────────── */
        .form-wrapper {
            width: 100%;
            max-width: 640px;
            padding: 24px 20px;
            position: relative;
        }

        /* ── CARDS ────────────────────────────────────── */
        .step-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 44px 48px;
            display: none;
            flex-direction: column;
            opacity: 0;
            transform: translateY(16px);
            transition: opacity 0.35s ease, transform 0.35s ease;
        }

        @media (max-width: 520px) {
            .step-card { padding: 32px 28px; }
        }

        .step-card.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        /* ── TYPOGRAPHY ───────────────────────────────── */
        .form-title {
            font-size: 26px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .form-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.65;
            margin-bottom: 28px;
        }

        .q-label {
            font-size: 20px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 28px;
            line-height: 1.45;
        }

        .q-label .required-star {
            color: #E53E3E;
            margin-left: 2px;
        }

        .step-counter {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        /* ── INPUTS ───────────────────────────────────── */
        .input-field {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--border);
            padding: 10px 0;
            font-size: 18px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background: transparent;
            outline: none;
            transition: border-color 0.25s;
            resize: none;
            overflow: hidden;
            min-height: 40px;
        }

        .input-field:focus { border-bottom-color: var(--accent); }
        .input-field::placeholder { color: #B0ADA8; }

        /* ── OPTIONS ──────────────────────────────────── */
        .options-list { display: flex; flex-direction: column; gap: 10px; }

        .option-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.18s, border-color 0.18s;
            user-select: none;
        }

        .option-row:hover { background: var(--accent-light); border-color: #C8C8C4; }

        .option-row input[type="radio"],
        .option-row input[type="checkbox"] {
            margin-right: 14px;
            width: 18px; height: 18px;
            accent-color: var(--accent);
            flex-shrink: 0;
            cursor: pointer;
        }

        .option-row span { font-size: 15px; color: var(--text); line-height: 1.4; }

        /* Highlight selected option */
        .option-row:has(input:checked) {
            background: var(--accent-light);
            border-color: var(--accent);
        }

        /* ── VALIDATION ───────────────────────────────── */
        .field-error {
            font-size: 12px;
            color: #E53E3E;
            margin-top: 8px;
            display: none;
        }
        .field-error.show { display: block; }
        .input-field.error { border-bottom-color: #E53E3E; }

        /* ── BUTTONS ──────────────────────────────────── */
        .controls {
            margin-top: 36px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-next {
            background: var(--accent);
            color: white;
            border: none;
            padding: 11px 28px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
            letter-spacing: 0.01em;
        }

        .btn-next:hover { opacity: 0.88; transform: translateY(-1px); }
        .btn-next:active { transform: translateY(0); }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-back {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            padding: 11px 8px;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--text); }

        .keyboard-hint {
            margin-left: auto;
            font-size: 12px;
            color: #C0BDB8;
            font-family: 'DM Mono', monospace;
        }

        /* ── LOADING / STATES ─────────────────────────── */
        #loading {
            font-size: 16px;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .success-card {
            text-align: center;
        }

        .success-icon {
            width: 52px; height: 52px;
            background: #F0FDF4;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 22px;
        }
    </style>
</head>
<body>

<div class="progress-container"><div id="progress-bar"></div></div>

<div class="form-wrapper">
    <div id="loading">Loading form…</div>

    <div id="form-content" style="display:none">
        <!-- Intro slide -->
        <div class="step-card active" id="intro-step">
            <h1 class="form-title" id="displayTitle"></h1>
            <p class="form-desc" id="displayDesc"></p>
            <div class="controls">
                <button class="btn-next" onclick="nextStep()">Start</button>
                <span class="keyboard-hint">Press Enter ↵</span>
            </div>
        </div>

        <!-- Dynamic question steps injected here -->
        <form id="publicForm" novalidate>
            <div id="dynamic-steps"></div>
        </form>
    </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const supabase = createClient(
    "https://aitckloahlwemlekaour.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdGNrbG9haGx3ZW1sZWthb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyOTQ3MTMsImV4cCI6MjA3MTg3MDcxM30.uQjQLSz0mQuuArPQ_F8u-suQ-6T0e9bF11ahQtSw6yA"
);

const params = new URLSearchParams(location.search);
const formId = params.get("id");

let currentStepIdx = -1; // -1 = intro
let fields = [];

/* ── INIT ───────────────────────────────────────────── */
async function init() {
    if (!formId) {
        document.getElementById('loading').innerText = "No form ID provided in the URL.";
        return;
    }

    const { data, error } = await supabase
        .from("forms")
        .select("*")
        .eq("id", formId)
        .single();

    if (error || !data) {
        document.getElementById('loading').innerText = "Form not found.";
        return;
    }

    fields = data.fields || [];
    renderForm(data);
}

/* ── RENDER ─────────────────────────────────────────── */
function renderForm(form) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('form-content').style.display = 'block';
    document.getElementById('displayTitle').innerText = form.title || "Untitled Form";
    document.getElementById('displayDesc').innerText = form.description || "Take a moment to fill this out.";

    if (form.theme_color) {
        document.documentElement.style.setProperty("--accent", form.theme_color);
    }

    const container = document.getElementById('dynamic-steps');
    const total = fields.length;

    container.innerHTML = fields.map((f, i) => {
        let inputHtml = '';

        if (f.type === 'radio' || f.type === 'checkbox') {
            const opts = (f.options || []).map(o => `
                <label class="option-row">
                    <input type="${f.type}" name="${f.id}" value="${escHtml(o)}">
                    <span>${escHtml(o)}</span>
                </label>`).join('');
            inputHtml = `<div class="options-list">${opts}</div>`;

        } else if (f.type === 'textarea') {
            inputHtml = `<textarea
                class="input-field"
                name="${f.id}"
                rows="1"
                placeholder="Type your answer…"
                oninput="autoResize(this)"
                ${f.required ? 'data-required="true"' : ''}
            ></textarea>`;

        } else {
            inputHtml = `<input
                class="input-field"
                type="${f.type || 'text'}"
                name="${f.id}"
                placeholder="Type your answer…"
                ${f.required ? 'data-required="true"' : ''}
            >`;
        }

        const isLast = i === total - 1;
        const actionBtn = isLast
            ? `<button type="submit" class="btn-next">Submit</button>`
            : `<button type="button" class="btn-next" onclick="nextStep()">Continue</button>`;

        return `
            <div class="step-card" id="step-${i}" data-index="${i}">
                <div class="step-counter">${i + 1} / ${total}</div>
                <div class="q-label">
                    ${escHtml(f.label)}${f.required ? '<span class="required-star">*</span>' : ''}
                </div>
                ${inputHtml}
                <div class="field-error" id="err-${i}">This field is required.</div>
                <div class="controls">
                    ${actionBtn}
                    <button type="button" class="btn-back" onclick="prevStep()">← Back</button>
                    ${!isLast ? '<span class="keyboard-hint">Press Enter ↵</span>' : ''}
                </div>
            </div>`;
    }).join('');
}

/* ── VALIDATION ─────────────────────────────────────── */
function validateCurrentStep() {
    if (currentStepIdx < 0) return true; // intro always passes
    const f = fields[currentStepIdx];
    if (!f || !f.required) return true;

    const card = document.getElementById(`step-${currentStepIdx}`);
    const errEl = document.getElementById(`err-${currentStepIdx}`);

    if (f.type === 'radio' || f.type === 'checkbox') {
        const checked = card.querySelector(`input[name="${f.id}"]:checked`);
        if (!checked) {
            errEl.classList.add('show');
            return false;
        }
    } else {
        const inp = card.querySelector(`[name="${f.id}"]`);
        if (!inp || inp.value.trim() === '') {
            inp && inp.classList.add('error');
            errEl.classList.add('show');
            return false;
        }
    }
    return true;
}

function clearErrors(idx) {
    const errEl = document.getElementById(`err-${idx}`);
    if (errEl) errEl.classList.remove('show');
    const card = document.getElementById(`step-${idx}`);
    if (card) card.querySelectorAll('.input-field').forEach(el => el.classList.remove('error'));
}

/* ── NAVIGATION ─────────────────────────────────────── */
window.nextStep = () => {
    if (!validateCurrentStep()) return;
    if (currentStepIdx < fields.length - 1) {
        changeStep(currentStepIdx + 1);
    }
};

window.prevStep = () => {
    if (currentStepIdx > 0) {
        changeStep(currentStepIdx - 1);
    } else {
        changeStep(-1); // back to intro
    }
};

function changeStep(newIdx) {
    const currentEl = getCardEl(currentStepIdx);
    if (!currentEl) return;

    // Animate out
    currentEl.classList.remove('active');

    setTimeout(() => {
        currentEl.style.display = 'none';
        currentStepIdx = newIdx;
        clearErrors(currentStepIdx);

        const nextEl = getCardEl(currentStepIdx);
        if (!nextEl) return;
        nextEl.style.display = 'flex';

        // Trigger paint before adding class (ensures transition fires)
        requestAnimationFrame(() => {
            requestAnimationFrame(() => nextEl.classList.add('active'));
        });

        // Progress bar: 0% on intro, proportional on questions
        const pct = currentStepIdx < 0
            ? 0
            : Math.round(((currentStepIdx + 1) / fields.length) * 100);
        document.getElementById('progress-bar').style.width = `${pct}%`;

        // Auto-focus first input
        const input = nextEl.querySelector('input:not([type="radio"]):not([type="checkbox"]), textarea');
        if (input) setTimeout(() => input.focus(), 50);

    }, 350);
}

function getCardEl(idx) {
    return idx === -1
        ? document.getElementById('intro-step')
        : document.getElementById(`step-${idx}`);
}

/* ── KEYBOARD: Enter to advance ─────────────────────── */
document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    // Allow Enter in textarea (Shift+Enter = newline, plain Enter = advance)
    if (e.target.tagName === 'TEXTAREA' && !e.shiftKey) {
        e.preventDefault();
        if (currentStepIdx < fields.length - 1) {
            window.nextStep();
        }
        return;
    }
    // Don't intercept submit button's natural Enter
    if (e.target.type === 'submit') return;
    // Advance on Enter for text inputs and intro
    if (e.target.tagName === 'INPUT' || currentStepIdx === -1) {
        e.preventDefault();
        window.nextStep();
    }
});

/* ── AUTO-RESIZE TEXTAREA ───────────────────────────── */
window.autoResize = function(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
};

/* ── SUBMIT ──────────────────────────────────────────── */
document.getElementById("publicForm").addEventListener("submit", async e => {
    e.preventDefault();
    if (!validateCurrentStep()) return;

    const btn = e.target.querySelector('button[type="submit"]');
    btn.innerText = "Sending…";
    btn.disabled = true;

    const fd = new FormData(e.target);
    const payload = {};
    fd.forEach((v, k) => {
        if (k in payload) {
            if (!Array.isArray(payload[k])) payload[k] = [payload[k]];
            payload[k].push(v);
        } else {
            payload[k] = v;
        }
    });

    const { error } = await supabase.from("form_responses").insert({
        form_id: formId,
        submission: payload,
        created_at: new Date().toISOString()
    });

    if (!error) {
        document.getElementById('progress-bar').style.width = '100%';
        document.getElementById('form-content').innerHTML = `
            <div class="step-card active success-card">
                <div class="success-icon">✓</div>
                <h1 class="form-title">All done!</h1>
                <p class="form-desc" style="margin-top:8px">Your response has been recorded. Thank you for your time.</p>
                <div class="controls" style="justify-content:center; margin-top:28px">
                    <button class="btn-next" onclick="location.reload()">Submit another response</button>
                </div>
            </div>`;
    } else {
        console.error("Supabase error:", error);
        alert("Submission failed. Please check your connection and try again.");
        btn.innerText = "Submit";
        btn.disabled = false;
    }
});

/* ── UTILS ───────────────────────────────────────────── */
function escHtml(str) {
    return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

init();
</script>
</body>
</html>
