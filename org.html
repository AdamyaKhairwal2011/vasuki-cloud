<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="extras.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Google+Sans:wght@400;700&family=Tektur:wght@400..900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

        const supabase = createClient(
            "https://aitckloahlwemlekaour.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdGNrbG9haGx3ZW1sZWthb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyOTQ3MTMsImV4cCI6MjA3MTg3MDcxM30.uQjQLSz0mQuuArPQ_F8u-suQ-6T0e9bF11ahQtSw6yA"
        );

        const orgId = new URLSearchParams(location.search).get("org");

        async function init() {
            if (!orgId) { 
                document.body.innerHTML = "<div class='status-screen'><h1>404</h1><p>Identity not found.</p></div>"; 
                return; 
            }
            const { data, error } = await supabase.from("startups").select("*").eq("id", orgId).single();
            if (error || !data) { 
                document.body.innerHTML = "<div class='status-screen'><h1>Private</h1><p>Node restricted.</p></div>"; 
                return; 
            }
            render(data);
        }

        function render(org) {
            const brand = org.theme_color || "#1a1a1a";
            document.documentElement.style.setProperty("--brand", brand);
            
            const parse = (v, fallback) => {
                try { return typeof v === "string" ? JSON.parse(v) : (v || fallback); } catch(e) { return fallback; }
            };

            const services = org.services || [];
            const buttons = parse(org.buttons, []);
            const contacts = parse(org.contacts, {});
            const coverImg = org.cover_base64 || 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070';
            document.title = `${org.name} | ${org.tagline || 'Designing the Future of Form.'}`;
            document.body.innerHTML = `
<style>
    :root {
        --brand: ${brand};
        --bg: #ffffff;
        --text: #050505;
        --text-dim: #666666;
        --border: #eeeeee;
    }

    * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
    
    body { background: var(--bg); color: var(--text); font-family: 'Google Sans', sans-serif; overflow-x: hidden; }
    body.menu-open { overflow: hidden; }

    /* --- NAVIGATION --- */
    header {
        display: flex; justify-content: space-between; align-items: center;
        padding: 20px 5%; position: fixed; width: 100%; top: 0; z-index: 1001;
        background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
    }
    .logo-area { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; z-index: 1002; }
    .logo-img { width: 28px; height: 28px; object-fit: contain; }
    .logo-name { font-weight: 800; font-size: 15px; letter-spacing: 1px; text-transform: uppercase; }

    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-btn {
        text-decoration: none; color: var(--text-dim); font-size: 12px; 
        font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
    }
    .nav-btn:hover { color: var(--brand); }
    .nav-btn.primary-link { color: var(--text); border-bottom: 2px solid var(--brand); padding-bottom: 4px; }

    /* --- HAMBURGER --- */
    .menu-toggle {
        display: none; flex-direction: column; gap: 6px; cursor: pointer; border: none; background: none; z-index: 1002; padding: 10px;
    }
    .bar { width: 24px; height: 2px; background: var(--text); transition: 0.3s; transform-origin: center; }
    
    /* Hamburger Transform */
    .menu-open .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
    .menu-open .bar:nth-child(2) { opacity: 0; }
    .menu-open .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

    /* --- MOBILE MENU --- */
    .mobile-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
        background: #fff; z-index: 1000; display: flex; flex-direction: column;
        justify-content: center; align-items: center; gap: 30px;
        transform: translateY(-100%); opacity: 0; pointer-events: none;
    }
    .menu-open .mobile-overlay { transform: translateY(0); opacity: 1; pointer-events: all; }
    .mobile-link { font-size: 32px; font-weight: 800; text-decoration: none; color: var(--text); letter-spacing: -1px; }

    /* --- HERO & CONTENT --- */
    .hero-section { padding: 160px 5% 80px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 60px; align-items: center; }
    .hero-content h1 { font-size: clamp(40px, 5vw, 85px); font-weight: 100; line-height: 0.95; letter-spacing: -4px; margin-bottom: 30px; }
    .hero-content p { font-size: 20px; color: var(--text-dim); line-height: 1.5; max-width: 450px; border-left: 3px solid var(--brand); padding-left: 25px; }
    .hero-image-container { position: relative; width: 100%; height: 600px; overflow: hidden; border-radius: 4px; background: #f9f9f9; }
    .hero-image { width: 100%; height: 100%; object-fit: cover; }

    /* --- SERVICES GRID --- */
    .section-label { padding: 100px 5% 40px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; color: var(--text-dim); }
    .content-grid { display: grid; grid-template-columns: repeat(2, 1fr); border-top: 1px solid var(--border); }
    .service-item { padding: 80px 10%; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .service-item:nth-child(2n) { border-right: none; }
    .service-item h3 { font-size: 32px; font-weight: 700; margin-bottom: 20px; letter-spacing: -1px; }

    /* --- FOOTER --- */
    footer { padding: 120px 5% 60px; background: #000; color: #fff; display: grid; grid-template-columns: 1fr 1fr; }
    .footer-left h2 { font-size: 60px; font-weight: 100; letter-spacing: -3px; }
    .cta-button { display: inline-block; margin-top: 40px; padding: 20px 50px; background: #fff; color: #000; text-decoration: none; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; }

    @media (max-width: 900px) {
        .hero-section { grid-template-columns: 1fr; padding-top: 120px; }
        .hero-image-container { height: 400px; order: -1; }
        .content-grid { grid-template-columns: 1fr; }
        .service-item { border-right: none; }
        .nav-links { display: none; }
        .menu-toggle { display: flex; }
        footer { grid-template-columns: 1fr; gap: 60px; text-align: center; }
        .footer-left h2 { font-size: 40px; }
    }
</style>

<header>
    <a href="#" class="logo-area">
        ${org.logo_base64 ? `<img src="${org.logo_base64}" class="logo-img">` : ''}
        <span class="logo-name">${org.name}</span>
    </a>
    
    <nav class="nav-links">
        ${buttons.map(btn => `<a href="${btn.url}" class="nav-btn" target="_blank">${btn.label}</a>`).join('')}
        ${org.website ? `<a href="${org.website}" class="nav-btn primary-link">Visit Studio</a>` : ""}
    </nav>

    <button class="menu-toggle" onclick="document.body.classList.toggle('menu-open')">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </button>
</header>

<div class="mobile-overlay">
    ${buttons.map(btn => `<a href="${btn.url}" class="mobile-link" onclick="document.body.classList.remove('menu-open')">${btn.label}</a>`).join('')}
    ${org.website ? `<a href="${org.website}" class="mobile-link" style="color:var(--brand)">Visit Studio</a>` : ""}
</div>

<section class="hero-section">
    <div class="hero-content">
        <h1>${org.tagline || 'Designing the Future of Form.'}</h1>
        <p>${org.about || 'A Vasuki iTech specialized entity.'}</p>
    </div>
    <div class="hero-image-container">
        <img src="${coverImg}" class="hero-image" alt="Featured Architecture">
    </div>
</section>

<div class="section-label">Selected Expertise</div>

<main class="content-grid">
    ${services.length > 0 ? services.map(s => `
        <div class="service-item">
            <h3>${s}</h3>
            <p style="color:var(--text-dim); line-height:1.7;">Bespoke execution of ${s.toLowerCase()} frameworks, prioritizing structural integrity.</p>
        </div>
    `).join("") : `<div class="service-item"><h3>Innovation</h3></div>`}
</main>

<footer>
    <div class="footer-left">
        <p style="letter-spacing:3px; font-size:11px; margin-bottom:20px; font-weight:700;">READY TO BUILD?</p>
        <h2>Work with ${org.name}</h2>
        <a href="mailto:${contacts.email}" class="cta-button">Start Inquiry</a>
    </div>
    <div style="text-align: right; display: flex; flex-direction: column; justify-content: flex-end;">
        <p style="font-size: 18px; font-weight: 300; opacity: 0.7; margin-bottom: 5px;">${org.location || 'Global Headquarters'}</p>
        <p style="font-size: 11px; opacity: 0.3; letter-spacing: 5px; margin-top: 60px;">EST. 2026 // POWERED BY VASUKI ITECH SYSTEM</p>
    </div>
</footer>
`;
        }

        init();
    </script>
</head>
<body></body>
</html>
