    <style>
        :root {
            /* Claude.ai Color Palette */
            --bg-pure: #fbfaf7;
            --bg-surface: #ffffff;
            --bg-input-banner: #f4f0ea;
            --text-main: #191919;
            --text-sub: #666360;
            --text-placeholder: #b0ada9;
            --border-muted: #e5e2dd;
            --border-focus: #ccbead;
            --accent-orange: #e05c36;
            --btn-black: #191919;
            --btn-black-hover: #333333;
            --transition-smooth: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body { 
            font-family: 'Public Sans', -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: var(--bg-pure); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: row;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Claude Left Sidebar Layout */
        .claude-sidebar {
            width: 64px;
            height: 100%;
            border-right: 1px solid var(--border-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            justify-content: space-between;
            background: var(--bg-pure);
            z-index: 5;
        }

        .sidebar-top, .sidebar-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
            width: 100%;
        }

        .sidebar-icon {
            color: var(--text-sub);
            cursor: pointer;
            font-size: 20px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .sidebar-icon:hover {
            background: #f1ede4;
            color: var(--text-main);
        }

        .user-avatar-circle {
            width: 28px;
            height: 28px;
            background: #191919;
            color: #ffffff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: -0.2px;
            text-transform: uppercase;
        }

        /* Main App Panel Wrapper */
        .main-app-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            height: 100%;
            overflow: hidden;
        }

        /* Top Bar Info Details */
        .claude-top-tier-banner {
            width: 100%;
            padding: 14px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .tier-pill {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 400;
        }

        .tier-pill span {
            color: var(--text-sub);
            text-decoration: underline;
            cursor: pointer;
            margin-left: 4px;
        }

        /* Container Configurations */
        .container {
            margin-top: 24vh;
            width: 100%;
            max-width: 680px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            transition: transform 0.5s var(--transition-smooth), opacity 0.4s var(--transition-smooth);
            opacity: 1;
            z-index: 2;
        }

        .container.hidden {
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
            height: 0;
            margin-top: 0;
            overflow: hidden;
        }

        /* Claude elegant serif greeting style */
        .greeting { 
            font-family: 'Lora', Georgia, serif;
            font-size: 36px; 
            font-weight: 400; 
            margin-bottom: 32px; 
            color: #191919; 
            line-height: 1.2;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Custom Claude Asterisk-styled icon logo */
        .claude-asterisk {
            color: var(--accent-orange);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .claude-asterisk svg {
            width: 30px;
            height: 30px;
            fill: currentColor;
        }

        /* Claude Input Container Suite Elements */
        .input-outer-box {
            width: 100%;
            background: var(--bg-surface);
            border-radius: 24px;
            border: 1px solid var(--border-muted);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.02);
            transition: border-color 0.2s var(--transition-smooth), box-shadow 0.2s var(--transition-smooth);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .input-outer-box:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .input-wrapper {
            width: 100%;
            padding: 20px 24px 14px 24px;
            display: flex;
            flex-direction: column;
        }

        .input-top { 
            display: flex; 
            align-items: flex-start; 
            width: 100%; 
            gap: 12px; 
        }
        
        input#query {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            font-family: inherit;
            padding: 2px 0;
            color: var(--text-main);
            background: transparent;
        }
        
        input#query::placeholder {
            color: var(--text-placeholder);
        }

        /* Streaming Stop Systems */
        .stop-btn-container {
            display: none; 
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            position: relative;
            margin-top: 2px;
        }

        .loader-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--border-muted);
            border-top: 2px solid var(--text-main);
            border-radius: 50%;
            animation: spin 0.85s linear infinite;
        }

        #stopBtn {
            position: relative;
            width: 8px;
            height: 8px;
            background: var(--text-main);
            border: none;
            border-radius: 1px;
            cursor: pointer;
            z-index: 2;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .input-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
        }

        .tools-group { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .tool-btn-attach { 
            color: var(--text-sub);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        
        .tool-btn-attach:hover {
            background: #f5f2eb;
            color: var(--text-main);
        }

        .tool-btn-attach svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.5;
        }

        .mode-select-container { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        
        #modeLabel { 
            font-size: 13px; 
            color: var(--text-sub); 
            font-weight: 400; 
            cursor: pointer; 
            padding: 6px 12px; 
            border-radius: 100px; 
            transition: all 0.2s var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        #modeLabel:hover {
            background: #f5f2eb;
            color: var(--text-main);
        }
        
        .mode-dropdown {
            position: absolute;
            bottom: calc(100% + 8px);
            right: 0;
            background: var(--bg-surface);
            border-radius: 12px;
            border: 1px solid var(--border-muted);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: none;
            flex-direction: column;
            width: 130px;
            overflow: hidden;
            z-index: 1000;
            padding: 4px 0;
        }

        .mode-option { 
            padding: 8px 14px; 
            font-size: 13px; 
            cursor: pointer; 
            text-align: left; 
            color: var(--text-sub);
            transition: background 0.15s, color 0.15s;
        }
        
        .mode-option:hover { 
            background: var(--bg-pure); 
            color: var(--text-main); 
        }

        /* Claude Input Static Footer Banner */
        .input-banner-notice {
            background: var(--bg-input-banner);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-main);
            border-top: 1px solid var(--border-muted);
        }

        .notice-left-text {
            color: var(--text-sub);
        }
        
        .notice-left-text span {
            text-decoration: underline;
            cursor: pointer;
        }

        .banner-upgrade-btn {
            background: var(--btn-black);
            color: #ffffff;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .banner-upgrade-btn:hover {
            background: var(--btn-black-hover);
        }

        /* Minimalist Horizontal Prompt Chips Architecture */
        .chips-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 24px;
            width: 100%;
        }

        .chip {
            background: var(--bg-surface);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 400;
            color: var(--text-sub);
            cursor: pointer;
            border: 1px solid var(--border-muted);
            transition: all 0.2s var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .chip:hover { 
            background: var(--bg-pure);
            border-color: var(--border-focus);
            color: var(--text-main);
        }

        .chip svg { 
            width: 14px; 
            height: 14px; 
            fill: none; 
            stroke: var(--text-sub); 
            stroke-width: 2; 
        }
        .chip:hover svg {
            stroke: var(--text-main);
        }

        /* Streaming & Conversation Interface Layout */
        #chatArea {
            width: 100%;
            max-width: 640px;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            gap: 32px;
            margin-top: 50px;
            padding: 40px 0;
            height: calc(100vh - 180px); 
            scroll-behavior: smooth;
        }

        #chatArea::-webkit-scrollbar {
            width: 6px;
        }
        #chatArea::-webkit-scrollbar-thumb {
            background: var(--border-muted);
            border-radius: 10px;
        }

        .message { 
            max-width: 100%; 
            font-size: 16px; 
            position: relative; 
        }

        .user-msg { 
            align-self: flex-end; 
            color: var(--text-main); 
            font-size: 20px; 
            font-family: 'Lora', Georgia, serif;
            font-weight: 400; 
            text-align: left; 
            width: 100%;
            padding-bottom: 8px;
            letter-spacing: -0.2px;
        }
        
        .bot-msg { 
            align-self: flex-start; 
            color: var(--text-main); 
            width: 100%; 
            text-align: left; 
            line-height: 1.6;
        }

        /* Standardized Markdown Presentation Engine Layouts */
        .bot-msg h1, .bot-msg h2, .bot-msg h3, .bot-msg h4 {
            color: var(--text-main);
            font-weight: 600;
            margin-top: 24px;
            margin-bottom: 10px;
        }
        .bot-msg h1 { font-size: 20px; }
        .bot-msg h2 { font-size: 18px; }
        .bot-msg h3 { font-size: 16px; }
        
        .bot-msg p {
            margin-top: 0;
            margin-bottom: 14px;
            color: var(--text-main);
        }

        .bot-msg ul, .bot-msg ol {
            margin-top: 6px;
            margin-bottom: 16px;
            padding-left: 20px;
        }

        .bot-msg li {
            margin-bottom: 6px;
        }

        /* Code Elements Styling */
        pre {
            position: relative;
            padding: 16px 20px !important;
            border-radius: 12px !important;
            margin: 20px 0 !important;
            background: #f9f8f5 !important;
            border: 1px solid var(--border-muted) !important;
        }

        code {
            font-family: 'JetBrains Mono', Consolas, monospace !important;
            font-size: 13.5px !important;
            background: #f4f1eb;
            padding: 2px 5px;
            border-radius: 4px;
        }

        pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
        }

        .code-copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 8px;
            background: var(--bg-surface);
            color: var(--text-sub);
            border: 1px solid var(--border-muted);
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        pre:hover .code-copy-btn {
            opacity: 1;
        }

        .code-copy-btn:hover {
            border-color: var(--border-focus);
            color: var(--text-main);
        }

        /* Action Component Row Layouts */
        .action-row {
            display: flex;
            gap: 4px;
            margin-top: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .bot-msg:hover .action-row { 
            opacity: 1; 
        }
        
        .action-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-sub);
        }
        
        .action-btn:hover { 
            background: #f4f1eb;
            color: var(--text-main);
        }
        
        .action-btn svg { 
            width: 16px; 
            height: 16px; 
            fill: none; 
            stroke: currentColor; 
            stroke-width: 1.5; 
        }

        /* Docked Footing Positioning Layout */
        .docked-footer {
            position: fixed;
            bottom: 0;
            width: calc(100% - 64px);
            max-width: 640px;
            display: flex;
            justify-content: center;
            background: linear-gradient(180deg, rgba(251,250,247,0) 0%, rgba(251,250,247,1) 40%);
            padding: 20px 0 40px 0;
            z-index: 90;
            transform: translateY(100px);
            opacity: 0;
            transition: transform 0.4s var(--transition-smooth), opacity 0.3s ease;
        }

        .docked-footer.visible {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .claude-sidebar { display: none; }
            .docked-footer { width: 100%; padding: 20px; }
        }
    </style>
</head>

<script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdGNrbG9haGx3ZW1sZWthb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyOTQ3MTMsImV4cCI6MjA3MTg3MDcxM30.uQjQLSz0mQuuArPQ_F8u-suQ-6T0e9bF11ahQtSw6yA";

    const mainInput = document.getElementById('mainInput');
    const modeLabel = document.getElementById('modeLabel');
    const modeDropdown = document.getElementById('modeDropdown');
    const userNameDisplay = document.getElementById('userName');
    const userInit = document.getElementById('userInit');

    let currentMode = 'research';
    let abortController = null;

    // Fixed setup getting directly from vcloud_username key inside localStorage
    async function initUser() {
        let targetUser = localStorage.getItem('vcloud_username');
        
        // Secondary backup lookup check if primary wasn't configured
        if (!targetUser) {
            targetUser = localStorage.getItem('vcloud_user') || 'adamya khairwal';
        }

        if (!targetUser) return;
        
        try {
            // Apply straight to UI immediately
            userNameDisplay.textContent = targetUser;
            userInit.textContent = targetUser.charAt(0).toUpperCase();

            // Query Supabase backend to get full canonical profile name mapping if available
            const { data } = await supabase.from('users').select('name').eq('email', localStorage.getItem('vcloud_user')).single();
            if (data && data.name) {
                userNameDisplay.textContent = data.name.toLowerCase();
                userInit.textContent = data.name.charAt(0).toUpperCase();
            }
        } catch (err) {}
    }
    initUser();

    function renderContent(text) {
        let processed = text.replace(/\\\[/g, '$$$$').replace(/\\\]/g, '$$$$').replace(/\\\(/g, '$').replace(/\\\)/g, '$');
        let htmlContent = marked.parse(processed);
        
        const temp = document.createElement('div');
        temp.innerHTML = htmlContent;

        // LaTeX Equation Processing Engine elements
        temp.innerHTML = temp.innerHTML.replace(/\$$([\s\S]+?)\$\$/g, (_, formula) => katex.renderToString(formula, { displayMode: true, throwOnError: false }));
        temp.innerHTML = temp.innerHTML.replace(/\$([^\$\n]+?)\$/g, (_, formula) => katex.renderToString(formula, { displayMode: false, throwOnError: false }));

        // Standardized Copy Action Component Assignment
        temp.querySelectorAll('pre').forEach(pre => {
            const btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.innerText = 'Copy';
            btn.onclick = () => {
                const code = pre.querySelector('code')?.innerText || pre.innerText;
                navigator.clipboard.writeText(code);
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy', 2000);
            };
            pre.appendChild(btn);
        });

        return temp.innerHTML;
    }

    window.toggleModeDropdown = () => modeDropdown.style.display = modeDropdown.style.display === 'flex' ? 'none' : 'flex';
    
    window.setMode = (mode) => {
        currentMode = mode;
        modeLabel.innerHTML = mode.charAt(0).toUpperCase() + mode.slice(1) + ' <span style="color:var(--text-sub); margin-left:4px;">Low</span> <span class="material-icons-outlined" style="font-size:16px; vertical-align:middle;">expand_more</span>';
        modeDropdown.style.display = 'none';
    }
    
    window.stopAIResponse = () => abortController?.abort();

    async function startConversation(text) {
        if (!text.trim()) return;

        if (!homeUI.classList.contains('hidden')) {
            homeUI.classList.add('hidden');
            
            setTimeout(() => {
                homeUI.style.display = 'none';
                chatArea.style.display = 'flex';
                footerDock.classList.add('visible');
                document.getElementById('quotaBanner').style.display = 'none';
                mainInput.style.borderRadius = '24px';
                footerDock.appendChild(mainInput);
                queryInput.focus();
            }, 300);
        }

        const uMsg = document.createElement('div');
        uMsg.className = 'message user-msg';
        uMsg.textContent = text;
        chatArea.appendChild(uMsg);
        queryInput.value = '';

        const bMsg = document.createElement('div');
        bMsg.className = 'message bot-msg';
        const contentDiv = document.createElement('div');
        contentDiv.innerHTML = '<p style="color: var(--text-sub); font-style: italic;">Accessing cluster neural weights...</p>';
        bMsg.appendChild(contentDiv);
        
        const actionRow = document.createElement('div');
        actionRow.className = 'action-row';
        actionRow.innerHTML = `
            <button class="action-btn" title="Copy Text" onclick="navigator.clipboard.writeText(this.closest('.bot-msg').querySelector('div').innerText)"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
            <button class="action-btn" title="Thumbs Up"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg></button>
        `;
        bMsg.appendChild(actionRow);
        chatArea.appendChild(bMsg);

        stopContainer.style.display = 'flex';
        abortController = new AbortController();

        try {
            const resp = await fetch(`https://adamyakhairwal2011-vasuki-ai.hf.space/research?topic=${encodeURIComponent(text)}&mode=${currentMode}&systemPrompt=${encodeURIComponent("you're Vaimanika AI developed by Vasuki Itech which is a leading global tech organization lead by ceo adamya khairwal, it provides ervices like Vasuki Cloud, Vasuki Guppt DBMS and Vasuki Worksace Suite")}`, {
                signal: abortController.signal
            });
            const reader = resp.body.getReader();
            const decoder = new TextDecoder();
            let fullText = "";

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                fullText += decoder.decode(value, {stream: true});
                contentDiv.innerHTML = renderContent(fullText);
                Prism.highlightAllUnder(contentDiv);
                chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'auto' });
            }
        } catch (e) {
            contentDiv.innerHTML = e.name === 'AbortError' ? "<p style='color: var(--text-sub); font-style: italic;'>Stream disconnected by terminal sequence.</p>" : "<p style='color:#ff4a4a'>Error handling internal data streaming interface layer.</p>";
        } finally {
            stopContainer.style.display = 'none';
        }
    }

    queryInput.addEventListener('keydown', (e) => e.key === 'Enter' && startConversation(queryInput.value));
    window.handleQuickAction = (t) => startConversation(t);
</script>
</body>
