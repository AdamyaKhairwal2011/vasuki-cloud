<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vasuki Form Studio | Workspace Admin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #080808;
            --bg-card: #121212;
            --bg-card-inner: #181818;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(255, 255, 255, 0.24);
            
            --text-pure: #ffffff;
            --text-muted: #8e8e93;
            --text-dark: #636366;
            
            --orange-accent: #ff6b00;
            --green-accent: #34c759;
            --error-red: #ff453a;
            --red-diff: rgba(255, 69, 58, 0.15);
            
            --font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Fira Code', monospace;
            --radius-card: 12px;
            --radius-input: 6px;
            --transition-smooth: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-black);
            color: var(--text-pure);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* --- NAVIGATION BAR --- */
        nav {
            background: rgba(8, 8, 8, 0.7);
            backdrop-filter: blur(20px);
            padding: 0 clamp(1.5rem, 6vw, 4rem);
            height: 72px;
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }
        
        .nav-logo img {
            border-radius: 6px;
            filter: grayscale(1) brightness(1.2);
            border: 1px solid var(--border-subtle);
        }

        .logo-app {
            color: var(--text-pure);
            font-weight: 500;
        }

        /* --- TIMELINE LOADING INDICATOR --- */
        .top-progress-bar {
            position: fixed;
            top: 72px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: transparent;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: 99;
        }
        .top-progress-bar.active { opacity: 1; }
        .top-progress-bar .progress-line {
            width: 100%;
            height: 100%;
            background-color: var(--orange-accent);
            transform-origin: left;
            animation: loader-slide 1.2s linear infinite;
        }
        @keyframes loader-slide {
            0% { transform: translateX(-100%) scaleX(1); }
            50% { transform: translateX(0%) scaleX(0.4); }
            100% { transform: translateX(100%) scaleX(1); }
        }

        /* --- LAYOUT CONTAINERS --- */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: clamp(2rem, 5vw, 4rem) clamp(1rem, 3vw, 1.5rem) 140px clamp(1rem, 3vw, 1.5rem);
            animation: viewFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes viewFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- CARDS & FORM HOVERS --- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
            padding: clamp(1.5rem, 4vw, 2.5rem);
            margin-bottom: 20px;
            position: relative;
            transition: var(--transition-smooth);
        }

        .form-item {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            border: 1px solid var(--border-subtle);
            padding: 20px;
            transition: var(--transition-smooth);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            height: 190px;
        }
        .form-item:hover { 
            border-color: var(--border-focus); 
            background: var(--bg-card-inner);
        }

        /* --- FIELD INTERACTIVE EDITING BOXES --- */
        .field-box {
            border-left: 1px solid var(--border-subtle);
            background: var(--bg-card);
        }
        .field-box:focus-within {
            border-left: 3px solid var(--orange-accent);
            background: var(--bg-card-inner);
            border-top-color: rgba(255, 255, 255, 0.12);
            border-right-color: rgba(255, 255, 255, 0.12);
            border-bottom-color: rgba(255, 255, 255, 0.12);
        }

        /* --- PREMIUM BUTTON DESIGN SYSTEMS --- */
        .btn {
            padding: 0 20px;
            height: 40px;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            font-size: 14px;
            border: 1px solid var(--border-subtle);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition-smooth);
            font-family: var(--font-family);
            user-select: none;
            background: transparent;
            color: var(--text-pure);
        }
        .btn:hover { 
            background: rgba(255, 255, 255, 0.04); 
            border-color: var(--border-focus); 
        }

        .btn-primary { 
            background: var(--text-pure); 
            color: var(--bg-black); 
            border: none; 
        }
        .btn-primary:hover { 
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
        
        .btn-text { 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            padding: 0 12px; 
            border-radius: 6px;
        }
        .btn-text:hover { 
            color: var(--text-pure);
            background: rgba(255, 255, 255, 0.05); 
        }
        
        .btn-danger-text { 
            background: transparent; 
            border: none; 
            color: var(--error-red); 
            padding: 0 12px; 
            border-radius: 6px;
        }
        .btn-danger-text:hover { 
            background: var(--red-diff); 
        }

        /* --- CONTROL INPUTS & INPUT OVERHAUL --- */
        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid transparent;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-pure);
            background: transparent;
            outline: none;
            transition: var(--transition-smooth);
            border-radius: 0;
        }
        input::placeholder {
            color: var(--text-dark);
        }
        input:focus, select:focus {
            background: transparent;
            border-bottom: 1px solid var(--text-pure);
        }

        .options-list {
            margin: 20px 0 12px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .opt-item { display: flex; align-items: center; gap: 12px; width: 100%; }
        .opt-input { 
            border-bottom: 1px solid var(--border-subtle); 
            padding: 8px 0 !important; 
            background: transparent; 
        }
        .opt-input:focus { border-bottom: 1px solid var(--orange-accent); }

        /* --- TERMINAL STYLED DATA TABLES --- */
        .table-responsive-container {
            overflow-x: auto;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-card);
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { 
            padding: 16px; 
            background: var(--bg-card-inner); 
            border-bottom: 1px solid var(--border-subtle); 
            color: var(--text-muted); 
            font-family: var(--font-mono);
            font-size: 12px; 
            font-weight: 500;
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border-subtle); 
            font-size: 14px; 
            color: rgba(255,255,255,0.85); 
            white-space: nowrap; 
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: var(--bg-card-inner); }

        /* --- STICKY FOOTER --- */
        .sticky-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 8, 0.85);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            z-index: 90;
        }

        /* --- PREMIUM TOAST --- */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 32px;
            background: #1c1c1e;
            color: var(--text-pure);
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 14px;
            border: 1px solid var(--border-subtle);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
            transform: translateY(140px);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 9999;
        }
        #toast.show { transform: translateY(0); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo" onclick="window.showPage('dashboard')">
        <div class="logo-app">Vasuki Forms</div>
    </div>
</nav>

<div class="top-progress-bar" id="globalActionLoader">
    <div class="progress-line"></div>
</div>

<div id="page-dashboard" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:36px; flex-wrap:wrap; gap:16px;">
        <h2 style="font-weight: 500; font-size: 26px; letter-spacing: -0.5px;">Recent Forms</h2>
        <button class="btn btn-primary" onclick="window.openEditor()">+ Blank Form</button>
    </div>
    <div id="formsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px;"></div>
</div>

<div id="page-editor" class="container hidden">
    <div class="card" style="background: var(--bg-card-inner); border-top: 2px solid var(--text-pure);">
        <input id="edit-title" style="font-size: 28px; font-weight: 500; border: none; border-bottom: 1px solid transparent; background: transparent; padding: 4px 0; letter-spacing: -0.5px;" placeholder="Untitled Form">
        <input id="edit-id" style="font-family: var(--font-mono); font-size: 13px; color: var(--orange-accent); border: none; background: transparent; margin-top: 16px; padding: 2px 0;" placeholder="form-id-slug">
    </div>

    <div id="fieldsList"></div>
    
    <div class="sticky-footer">
        <button class="btn" onclick="window.addField()">+ Add Question</button>
        <button class="btn btn-primary" id="saveBtn" onclick="window.saveFormToCloud()">Save Form</button>
        <button class="btn btn-text" onclick="window.showPage('dashboard')">Back</button>
    </div>
</div>

<div id="page-responses" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; margin-bottom: 32px;">
        <h2 id="resp-title" style="margin:0; font-weight:500; font-size: 26px; letter-spacing: -0.5px;">Responses</h2>
        <button class="btn" onclick="window.showPage('dashboard')">Close Dashboard</button>
    </div>
    <div id="resp-content"></div>
</div>

<div id="toast">Link copied to clipboard</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPABASE_URL = "https://aitckloahlwemlekaour.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpdGNrbG9haGx3ZW1sZWthb3VyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYyOTQ3MTMsImV4cCI6MjA3MTg3MDcxM30.uQjQLSz0mQuuArPQ_F8u-suQ-6T0e9bF11ahQtSw6yA";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;

function showLoader() { document.getElementById('globalActionLoader').classList.add('active'); }
function hideLoader() { document.getElementById('globalActionLoader').classList.remove('active'); }

window.showPage = (id) => {
    document.querySelectorAll('.container').forEach(p => p.classList.add('hidden'));
    document.getElementById(`page-${id}`).classList.remove('hidden');
    window.scrollTo({top: 0, behavior: 'instant'});
    if(id === 'dashboard') fetchForms();
};

const userBlob = localStorage.getItem("vcloud_user");
if(!userBlob) { 
    location.href = "../login.html"; 
} else {
    try {
        currentUser = userBlob.email || userBlob;
    } catch(e) { currentUser = userBlob; }
    window.showPage('dashboard');
}

async function fetchForms() {
    showLoader();
    const { data } = await supabase.from("forms").select("*").eq("user", currentUser).order("updated_at", { ascending: false });
    hideLoader();
    
    const grid = document.getElementById("formsGrid");
    if(!data || data.length === 0) {
        grid.style.display = "block";
        grid.innerHTML = `
            <div style="text-align:center; padding: 64px 16px; color: var(--text-muted); border: 1px dashed var(--border-subtle); border-radius: var(--radius-card); background: var(--bg-card);">
                <p style="font-size: 15px;">No forms found inside your workspace channel yet.</p>
            </div>`;
        return;
    }
    
    grid.style.display = "grid";
    grid.innerHTML = data.map(f => `
        <div class="form-item" onclick="window.openEditor('${f.id}')">
            <div style="height:70px; background: #111111; margin:-20px -20px 20px -20px; border-radius:11px 11px 0 0; display:flex; align-items:center; justify-content:center; position:relative; border-bottom: 1px solid var(--border-subtle);">
                <button onclick="event.stopPropagation(); window.deleteForm('${f.id}')" style="position:absolute; top:12px; right:12px; background:var(--bg-card-inner); border-radius:50%; border:1px solid var(--border-subtle); width:32px; height:32px; cursor:pointer; color:var(--error-red); display:flex; align-items:center; justify-content:center; transition: 0.2s;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path></svg>
                </button>
            </div>
            <h3 style="margin:0; font-size:16px; font-weight:500; color:var(--text-pure); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f.title || 'Untitled Form'}</h3>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap: 8px; width: 100%;">
                <button class="btn btn-text" style="font-size:13px; height: 32px; padding: 0 8px;" onclick="event.stopPropagation(); window.viewResponses('${f.id}', '${f.title}')">Responses</button>
                <button class="btn" style="font-size:13px; height: 32px; padding: 0 12px; border-radius: 16px;" onclick="event.stopPropagation(); window.copyLink('${f.id}')">Copy Link</button>
            </div>
        </div>
    `).join('');
}

window.copyLink = (id) => {
    const url = `https://vasuki.cloud/view-form.html?id=${id}`;
    navigator.clipboard.writeText(url);
    showToast("Link copied to clipboard");
};

function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 3000);
}

window.openEditor = async (id = null) => {
    window.showPage('editor');
    const list = document.getElementById("fieldsList");
    list.innerHTML = "";
    
    if(id && typeof id === 'string') {
        showLoader();
        const { data } = await supabase.from("forms").select("*").eq("id", id).single();
        hideLoader();
        if(data) {
            document.getElementById("edit-title").value = data.title;
            document.getElementById("edit-id").value = data.id;
            document.getElementById("edit-id").disabled = true;
            data.fields.forEach(f => window.addField(f));
        }
    } else {
        document.getElementById("edit-title").value = "Untitled Form";
        document.getElementById("edit-id").value = "f-" + Math.random().toString(36).substr(2,6);
        document.getElementById("edit-id").disabled = false;
        window.addField();
    }
};

window.addField = (f = { label: "", type: "text", options: [] }) => {
    const div = document.createElement("div");
    div.className = "card field-box";
    div.innerHTML = `
        <div style="display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;">
            <div style="flex: 2; min-width: 200px;">
                <input class="f-label" value="${f.label}" placeholder="Question Statement">
            </div>
            <div style="flex: 1; min-width: 150px; position: relative;">
                <select class="f-type" style="-webkit-appearance: none; appearance: none; background-image: url('data:image/svg+xml;utf8,<svg fill=%22%238e8e93%22 height=%2224%22 viewBox=%220 0 24 24%22 width=%2224%22 xmlns=%22http://www.w3.org/2000/svg%22><path d=%22M7 10l5 5 5-5z%22/></svg>'); background-repeat: no-repeat; background-position: right 12px center; background-color: var(--bg-card-inner); border: 1px solid var(--border-subtle); border-radius: var(--radius-input); padding: 10px 14px;">
                    <option value="text" ${f.type==='text'?'selected':''}>Short Answer</option>
                    <option value="textarea" ${f.type==='textarea'?'selected':''}>Paragraph</option>
                    <option value="radio" ${f.type==='radio'?'selected':''}>Multiple Choice</option>
                    <option value="checkbox" ${f.type==='checkbox'?'selected':''}>Checkboxes</option>
                </select>
            </div>
            <button class="btn-text" style="color:var(--text-dark); padding: 8px;" onclick="this.closest('.field-box').remove()" title="Delete Question">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
            </button>
        </div>
        <div class="opt-section ${['text','textarea'].includes(f.type) ? 'hidden' : ''}">
            <div class="options-list"></div>
            <button class="btn" style="font-size:13px; height: 32px; border-radius: 16px;" onclick="window.addOption(this.previousElementSibling)">+ Add Option</button>
        </div>
    `;

    const optList = div.querySelector(".options-list");
    const structuralOptions = f.options && f.options.length ? f.options : ["Option 1"];
    structuralOptions.forEach(o => window.addOption(optList, o));

    div.querySelector(".f-type").onchange = (e) => {
        div.querySelector(".opt-section").classList.toggle("hidden", ['text','textarea'].includes(e.target.value));
    };
    document.getElementById("fieldsList").appendChild(div);
};

window.addOption = (container, val = "") => {
    const div = document.createElement("div");
    div.className = "opt-item";
    div.innerHTML = `
        <div style="width:14px; height:14px; border:1px solid var(--border-subtle); border-radius:50%; flex-shrink: 0; background: var(--bg-black);"></div>
        <input class="opt-input" value="${val}" placeholder="Option description" style="padding: 6px 0!important;">
        <button class="btn-text" style="color:var(--text-dark); padding:4px 8px; font-size:16px;" onclick="this.parentElement.remove()">✕</button>
    `;
    container.appendChild(div);
};

window.saveFormToCloud = async () => {
    const btn = document.getElementById("saveBtn");
    const originalText = btn.innerText;
    btn.innerText = "Saving...";
    showLoader();
    
    const fields = [...document.querySelectorAll(".field-box")].map((box, i) => ({
        id: `q_${i}`,
        label: box.querySelector(".f-label").value || `Question ${i + 1}`,
        type: box.querySelector(".f-type").value,
        options: [...box.querySelectorAll(".opt-input")].map(input => input.value).filter(v => v)
    }));

    const { error } = await supabase.from("forms").upsert({
        id: document.getElementById("edit-id").value,
        title: document.getElementById("edit-title").value || "Untitled Form",
        fields, 
        user: currentUser, 
        updated_at: new Date().toISOString()
    });

    hideLoader();
    btn.innerText = originalText;

    if(!error) {
        showToast("Form saved securely to cloud");
        window.showPage('dashboard');
    } else {
        alert("Transaction failure details: " + error.message);
    }
};

window.viewResponses = async (id, title) => {
    document.getElementById("resp-content").innerHTML = "<div style='padding:32px; text-align:center; color:var(--text-muted); font-family:var(--font-mono); font-size:14px;'>Loading responses dataset...</div>";
    window.showPage('responses');
    document.getElementById("resp-title").innerText = `${title || 'Form Responses'}`;
    
    showLoader();
    const { data: resps, error: rErr } = await supabase.from("form_responses").select("*").eq("form_id", id).order("created_at", { ascending: false });
    const { data: form, error: fErr } = await supabase.from("forms").select("fields").eq("id", id).single();
    hideLoader();

    if (rErr || fErr || !resps?.length) {
        document.getElementById("resp-content").innerHTML = `
            <div style='padding:64px 16px; text-align:center; border: 1px dashed var(--border-subtle); border-radius: var(--radius-card); background: var(--bg-card);'>
                <p style="color:var(--text-muted); font-size:15px; margin-bottom:20px;">No responses synchronized to this schema yet.</p>
                <button class="btn" onclick="window.showPage('dashboard')">Return to Workspace</button>
            </div>`;
        return;
    }

    let html = `
        <div style="padding: 16px 0; display: flex; justify-content: space-between; align-items: center; background: transparent; flex-wrap: wrap; gap: 12px; margin-bottom:16px;">
            <span style="font-size: 14px; color: var(--text-muted); font-family: var(--font-mono);">${resps.length} Submissions Total</span>
            <div style="display:flex; gap: 12px;">
                <button class="btn btn-danger-text" style="font-size: 13px;" onclick="window.clearAllResponses('${id}', '${title}')">Clear Table</button>
                <button class="btn btn-text" style="font-size: 13px;" onclick="window.deleteForm('${id}')">Wipe Form</button>
            </div>
        </div>
        <div class="table-responsive-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 60px; text-align: center;">Actions</th>
                        <th style="min-width: 180px;">Submission Timestamp</th>`;
    
    form.fields.forEach(f => {
        html += `<th style="min-width: 160px;">${f.label}</th>`;
    });
    html += `</tr></thead><tbody>`;

    resps.forEach(r => {
        const sub = r.submission || {};
        html += `<tr>
            <td style="text-align:center;">
                <button class="btn-text" style="color:var(--text-dark); padding:4px 8px; font-size:13px;" onclick="window.deleteSingleResponse('${r.id}', '${id}', '${title}')" title="Delete Row">✕</button>
            </td>
            <td style="color: var(--text-muted); font-family: var(--font-mono); font-size: 13px;">${new Date(r.created_at).toLocaleString('en-IN')}</td>`;
        
        form.fields.forEach((f, index) => {
            let val = sub[f.id] || sub[f.label] || sub[`q_${index}`];
            if (val === undefined || val === null) {
                const fuzzyKey = Object.keys(sub).find(k => k.toLowerCase() === f.label.toLowerCase());
                val = fuzzyKey ? sub[fuzzyKey] : "-";
            }
            if (Array.isArray(val)) val = val.join(", ");
            html += `<td>${val}</td>`;
        });
        html += `</tr>`;
    });

    html += `</tbody></table></div>`;
    document.getElementById("resp-content").innerHTML = html;
};

window.deleteSingleResponse = async (responseId, formId, title) => {
    if(!confirm("Wipe this record out natively?")) return;
    showLoader();
    const { error } = await supabase.from("form_responses").delete().eq("id", responseId);
    hideLoader();
    if(!error) {
        showToast("Row deleted successfully");
        window.viewResponses(formId, title);
    } else {
        alert("Transaction fault: " + error.message);
    }
};

window.clearAllResponses = async (formId, title) => {
    if(!confirm("Are you sure you want to completely clear out all responses for this production structure? This step is permanent.")) return;
    showLoader();
    const { error } = await supabase.from("form_responses").delete().eq("form_id", formId);
    hideLoader();
    if(!error) {
        showToast("Responses table cleared");
        window.viewResponses(formId, title);
    } else {
        alert("Transaction fault: " + error.message);
    }
};

window.deleteForm = async (id) => {
    const confirmDelete = confirm("⚠️ CRITICAL EVENT: Permanent structure deletion. This wipes the form asset and all structural logs. Action irreversible. Proceed?");
    
    if (confirmDelete) {
        showLoader();
        await supabase.from("form_responses").delete().eq("form_id", id);
        const { error: formError } = await supabase.from("forms").delete().eq("id", id);
        hideLoader();

        if (!formError) {
            showToast("Form asset dropped cleanly");
            window.showPage('dashboard');
        } else {
            alert("Structural modification fault: " + formError.message);
        }
    }
};
</script>
</body>
</html>
