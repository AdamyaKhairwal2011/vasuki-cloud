<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>VCloud: Your Data, Simplified</title>
<meta name="description" content="A minimal, Apple-inspired vault for your labeled data." />
<link rel="icon" href="./logo.png">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../style_central.css">
<link rel="stylesheet" href="env_style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
  

<!-- ===================== PRELOADER ===================== -->
<div class="preloader" id="preloader" role="status" aria-label="Loading">
  <div class="preloader-inner">
    <img src="./logo.png" alt="" class="preloader-logo" />
    <div class="preloader-spinner"></div>
  </div>
</div>

<!-- ===================== MOBILE HAMBURGER ===================== -->
<button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
</button>

<!-- ===================== MOBILE SIDEBAR OVERLAY ===================== -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">

  <!-- ===================== SIDEBAR: all saved keys/entries ===================== -->
  <aside class="sidebar" id="sidebarEl">
    <div class="sidebar-head">
      <div class="sidebar-title">Vasuki Developer / Tijori</div>
      <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>



    <div class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Search labels & data…" />
        <button class="clear-x" id="searchClear" style="display:none" aria-label="Clear search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="select-wrap">
        <select id="sortSelect">
          <option value="new">Newest</option>
          <option value="old">Oldest</option>
          <option value="az">Label A–Z</option>
          <option value="za">Label Z–A</option>
        </select>
      </div>
    </div>

    <div class="section-label" id="listLabel">All entries</div>
    <div class="entries" id="entriesList"></div> <br><br>
    <div class="section-label" id="listLabel">Integration</div>
  <button class="mini-btn" id="genCodeBtn" title="Generate integration code">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
    Get code
  </button>
  </aside>

  <!-- ===================== MAIN: welcome + add new entry ===================== -->
  <main class="main">
    <div class="app">

      <div class="hero">
        <h1 class="welcome">Vault</h1>
        <p>Store any key or passwords securely: synced instantly, everywhere.</p>
      </div>

          <div class="status-row">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Connecting…</span>
            <div class="uid-chip" id="uidChip" title="Click to copy your Vault ID">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span id="uidText">—</span>
      </div>
    </div>

      <div class="stats">
        <div class="stat-card">
          <div class="num" id="statCount">0</div>
          <div class="lbl">Entries</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statSize">0 B</div>
          <div class="lbl">Data size</div>
        </div>
        <div class="stat-card">
          <div class="num" id="statUpdated">—</div>
          <div class="lbl">Last synced</div>
        </div>
      </div>

      <div class="composer" id="composer">
        <div class="composer-title">New entry</div>
        <div class="field">
          <input id="labelInput" type="text" placeholder="e.g. Wi-Fi password, API key, Note to self…" maxlength="120" autocomplete="off" />
        </div>
        <div class="field">
          <textarea id="dataInput" placeholder="Anything — text, JSON, a link, credentials…"></textarea>
          <div class="field-meta">
            <span class="char-count" id="charCount">0 characters</span>
            <span class="fmt-badge fmt-text" id="fmtBadge">TEXT</span>
          </div>
        </div>
        <div class="composer-actions">
          <button class="btn btn-ghost" id="clearComposerBtn">Clear</button>
          <button class="btn btn-primary" id="addBtn" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            Save entry
          </button>
        </div>
      </div>

    </div>
  </main>

</div>

<div class="toast-stack" id="toastStack"></div>

<script src="env_script.js"></script>
</body>
</html>
