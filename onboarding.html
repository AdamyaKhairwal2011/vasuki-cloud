<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in - Vasuki Accounts</title>
      <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* Google Identity Workspace Theme Tokens */
    :root {
      --google-blue: #815521;
      --google-blue-hover: #65441b;
      --text-primary: #202124;
      --text-secondary: #5f6368;
      --border-color: #dadce0;
      --bg-surface: #ffffff;
      --font-family: 'Google Sans', Roboto, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-family);
      background-color: #efe5d8;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      padding: 24px;
    }

    /* Account Card Container - Dynamically scales height with internal content changes */
    .oauth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      width: 450px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: height;
    }

    @media (max-width: 450px) {
      body {
        padding: 0;
      }
      .oauth-card {
        width: 100%;
        min-height: 100vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 24px;
        transition: none;
      }
    }

    /* Brand Header Components */
    .brand-header {
      text-align: left;
      margin-bottom: 24px;
    }

    .brand-logo {
      font-size: 24px;
      font-weight: 500;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
      display: flex;
      justify-content: left;
      align-items: left;
      gap: 4px;
    }

    .brand-logo span:nth-child(1) { color: #4285F4; }
    .brand-logo span:nth-child(2) { color: #EA4335; }
    .brand-logo span:nth-child(3) { color: #FBBC05; }
    .brand-logo span:nth-child(4) { color: #34A853; }

    .brand-header h1 {
      font-size: 24px;
      font-weight: 400;
      color: var(--text-primary);
      line-height: 1.3333;
    }

    .brand-header p {
      font-size: 16px;
      color: var(--text-secondary);
      margin-top: 8px;
    }

    /* Form and Smooth Height Reflow Window Structure */
    .onboarding-form {
      display: flex;
      flex-direction: column;
    }

    .step-window {
      position: relative;
      width: 100%;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: height;
    }

    .step-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transform: translateX(50px);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), 
                  opacity 0.35s ease, 
                  visibility 0.35s;
    }

    /* Controlled Pagination Layer Toggle Matrix */
    .step-view.active {
      position: relative; /* Instructs parent container of local height criteria */
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transform: translateX(0);
    }

    .step-view.next-out {
      position: absolute;
      opacity: 0;
      visibility: hidden;
      transform: translateX(-50px);
    }

    .step-view.prev-out {
      position: absolute;
      opacity: 0;
      visibility: hidden;
      transform: translateX(50px);
    }

    /* Form Input Options Structure */
    .options-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .option-card {
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background-color 0.15s, border-color 0.15s;
    }

    .option-card:hover {
      background-color: #f8f9fa;
    }

    .option-card.selected {
      border-color: var(--google-blue);
      background-color: #f1f3f4;
    }

    .option-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .radio-circle {
      width: 20px;
      height: 20px;
      border: 2px solid var(--text-secondary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }

    .option-card.selected .radio-circle {
      border-color: var(--google-blue);
    }

    .radio-circle::after {
      content: '';
      width: 10px;
      height: 10px;
      background-color: var(--google-blue);
      border-radius: 50%;
      transform: scale(0);
      transition: transform 0.2s;
    }

    .option-card.selected .radio-circle::after {
      transform: scale(1);
    }

    /* Dynamic Action Footer Area */
    .action-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      min-height: 36px;
    }

    .btn {
      font-family: var(--font-family);
      font-size: 14px;
      font-weight: 500;
      padding: 0 24px;
      height: 36px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s;
    }

    .btn-text {
      background: transparent;
      color: var(--google-blue);
      padding: 0 8px;
    }

    .btn-text:hover {
      background-color: rgba(26, 115, 232, 0.04);
    }

    .btn-text:disabled {
      color: var(--text-secondary);
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background-color: var(--google-blue);
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: var(--google-blue-hover);
    }

    .btn-primary:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    /* ==========================================
       TOP INTEGRATED CARD PROGRESS LOADERBAR
       ========================================== */
    .top-progress-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background-color: #e8eaed;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .top-progress-bar.active {
      opacity: 1;
    }

    .top-progress-bar .progress-line {
      width: 100%;
      height: 100%;
      background-color: var(--google-blue);
      transform-origin: left;
      animation: indeterminate-loader 1.5s linear infinite;
    }

    @keyframes indeterminate-loader {
      0% { transform: translateX(-100%) scaleX(1); }
      50% { transform: translateX(0%) scaleX(0.4); }
      100% { transform: translateX(100%) scaleX(1); }
    }
  </style>
</head>
<body>

  <div id="loader-container">
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-bar"></div>
    <div class="loader-spinner-wrap">
      <div class="spinner"></div>
    </div>
  </div>

  <style>
    #loader-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 9999;
      display: flex;
      pointer-events: none;
    }
    .loader-bar {
      height: 100%;
      flex: 1;
      background-color: #3b2a13;
      transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
      will-change: transform;
      pointer-events: auto;
    }
    #loader-container.loaded .loader-bar {
      transform: translateY(-100%);
    }
    .loader-bar:nth-child(1)  { transition-delay: 0.00s; }
    .loader-bar:nth-child(2)  { transition-delay: 0.05s; }
    .loader-bar:nth-child(3)  { transition-delay: 0.10s; }
    .loader-bar:nth-child(4)  { transition-delay: 0.15s; }
    .loader-bar:nth-child(5)  { transition-delay: 0.20s; }
    .loader-bar:nth-child(6)  { transition-delay: 0.25s; }
    .loader-bar:nth-child(7)  { transition-delay: 0.30s; }
    .loader-bar:nth-child(8)  { transition-delay: 0.35s; }
    .loader-bar:nth-child(9)  { transition-delay: 0.40s; }
    .loader-bar:nth-child(10) { transition-delay: 0.45s; }

    .loader-spinner-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      transition: opacity 0.4s ease;
      pointer-events: auto;
    }
    #loader-container.loaded .loader-spinner-wrap {
      opacity: 0;
    }
    .spinner {
      width: 60px;
      display: flex;
      align-items: flex-start;
      aspect-ratio: 1;
    }
    .spinner:before,
    .spinner:after {
      content: "";
      flex: 1;
      aspect-ratio: 1;
      --g: conic-gradient(from -90deg at 10px 10px,#ffffff 90deg,#fffefe00 0);
      background: var(--g), var(--g), var(--g);
      filter: drop-shadow(30px 30px 0 #ffffff);
      animation: l20 1s infinite;
    }
    .spinner:after { transform: scaleX(-1); }
    @keyframes l20 {
       0%   {background-position:0     0, 10px 10px, 20px 20px}
       33%  {background-position:10px  10px}
       66%  {background-position:0    20px,10px 10px,20px 0   }
       100% {background-position:0     0, 10px 10px, 20px 20px}
    }
  </style>

  <script>
    window.addEventListener('load', () => {
      const loaderContainer = document.getElementById('loader-container');
      setTimeout(() => {
        loaderContainer.classList.add('loaded');
      }, 300);
      setTimeout(() => {
        loaderContainer.style.display = 'none';
      }, 1500); 
    });
  </script>

  <div class="oauth-card" id="mainWorkspaceCard">
    
    <div class="top-progress-bar" id="topNavLoader">
      <div class="progress-line"></div>
    </div>

    <header class="brand-header">
      <div class="brand-logo">
        <img src="./logo.jpg" alt="" style="width: 50px;">
      </div>
      <h1 id="onboardingTitle">Select gender</h1>
      <p id="onboardingSubtitle">Choose your gender preference</p>
    </header>

    <form class="onboarding-form" id="onboardingForm" onsubmit="return false;">
      <div class="step-window" id="stepWindowContainer">
        
        <div class="step-view active" id="step0" data-title="Select gender" data-subtitle="Choose your gender preference">
          <div class="options-group">
            <div class="option-card" onclick="selectOption('gender', 'Female', this)">
              <span class="option-label">Female</span>
              <div class="radio-circle"></div>
            </div>
            <div class="option-card" onclick="selectOption('gender', 'Male', this)">
              <span class="option-label">Male</span>
              <div class="radio-circle"></div>
            </div>
            <div class="option-card" onclick="selectOption('gender', 'Rather not say', this)">
              <span class="option-label">Rather not say</span>
              <div class="radio-circle"></div>
            </div>
          </div>
        </div>

        <div class="step-view prev-out" id="step1" data-title="Your profession" data-subtitle="Help us customize your workspace setup">
          <div class="options-group">
            <div class="option-card" onclick="selectOption('profession', 'Developer', this)">
              <span class="option-label">Developer / Architect</span>
              <div class="radio-circle"></div>
            </div>
            <div class="option-card" onclick="selectOption('profession', 'Manager', this)">
              <span class="option-label">Product Lead / Manager</span>
              <div class="radio-circle"></div>
            </div>
            <div class="option-card" onclick="selectOption('profession', 'Student', this)">
              <span class="option-label">Student</span>
              <div class="radio-circle"></div>
            </div>
            <div class="option-card" onclick="selectOption('profession', 'Other', this)">
              <span class="option-label">Other Professional</span>
              <div class="radio-circle"></div>
            </div>
          </div>
        </div>

      </div>

      <footer class="action-footer">
        <div>
          <button type="button" class="btn btn-text" id="backBtn" onclick="navigateStep(-1)" style="visibility: hidden;">Back</button>
        </div>
        <div>
          <button type="button" class="btn btn-primary" id="nextBtn" onclick="navigateStep(1)" disabled>Next</button>
        </div>
      </footer>
    </form>
  </div>

  <script type="module">
    import Vasuki from 'https://cdn.jsdelivr.net/npm/vasuki-db@1.0.1/index.min.js';

    let dbInstance = new Vasuki();
    const trackingState = {
      gender: null,
      profession: null
    };

    let activeStepIndex = 0;
    const stepsCount = 2;

    async function initDatabaseEngine() {
      showSystemStatus();
      try {
        await dbInstance.login("codeclutch.adamyarao@gmail.com", "wkmeupb4ugo");
        
        const userEmail = localStorage.getItem('vcloud_user');
        if (!userEmail) {
          console.error("Session missing: vcloud_user not established inside local storage.");
        }
        hideSystemStatus();
        syncCardHeightReflow();
      } catch (error) {
        console.error("Database initialization error:", error);
        hideSystemStatus();
      }
    }

    // Handles the card height reflow calculations cleanly
    function syncCardHeightReflow() {
      const stepWindow = document.getElementById('stepWindowContainer');
      const activeView = document.getElementById(`step${activeStepIndex}`);
      if (activeView && stepWindow) {
        stepWindow.style.height = `${activeView.offsetHeight}px`;
      }
    }

    window.selectOption = function(metricField, targetValue, targetElement) {
      trackingState[metricField] = targetValue;
      
      const parentScope = targetElement.closest('.step-view');
      parentScope.querySelectorAll('.option-card').forEach(card => card.classList.remove('selected'));
      targetElement.classList.add('selected');
      
      document.getElementById('nextBtn').disabled = false;
    };

    window.navigateStep = async function(direction) {
      const futureIndex = activeStepIndex + direction;

      if (futureIndex === stepsCount) {
        await commitDataToVasukiDB();
        return;
      }

      const activeView = document.getElementById(`step${activeStepIndex}`);
      const targetView = document.getElementById(`step${futureIndex}`);

      // Handle structural class assignments for animations
      if (direction === 1) {
        activeView.className = "step-view next-out";
        targetView.className = "step-view active prev-out";
        targetView.offsetHeight; // Force layout pass
        targetView.className = "step-view active";
      } else {
        activeView.className = "step-view prev-out";
        targetView.className = "step-view active next-out";
        targetView.offsetHeight; // Force layout pass
        targetView.className = "step-view active";
      }

      document.getElementById('onboardingTitle').innerText = targetView.getAttribute('data-title');
      document.getElementById('onboardingSubtitle').innerText = targetView.getAttribute('data-subtitle');

      activeStepIndex = futureIndex;
      
      // Sync heights immediately following slide transitions
      syncCardHeightReflow();
      updateControlFooterState();
    };

    function updateControlFooterState() {
      const backBtn = document.getElementById('backBtn');
      const nextBtn = document.getElementById('nextBtn');

      backBtn.style.visibility = (activeStepIndex === 0) ? 'hidden' : 'visible';
      
      if (activeStepIndex === 1) {
        nextBtn.innerText = "Submit";
        nextBtn.disabled = !trackingState.profession;
      } else {
        nextBtn.innerText = "Next";
        nextBtn.disabled = !trackingState.gender;
      }
    }

    async function commitDataToVasukiDB() {
      if (!dbInstance) return;

      const targetUserEmail = localStorage.getItem('vcloud_user');
      if (!targetUserEmail) {
        alert("Session Error: Could not locate active string key 'vcloud_user' inside LocalStorage context.");
        return;
      }

      showSystemStatus();
      try {
        const userTable = await dbInstance.fetchTable("users_rows", "Sheet1");
        const userRecord = userTable.find(u => u.username === targetUserEmail);
        
        if (!userRecord || !userRecord.id) {
          throw new Error(`Profile entry for ${targetUserEmail} could not be successfully loaded.`);
        }

        await dbInstance.updateRow("users_rows", "Sheet1", userRecord.id, {
          gender: trackingState.gender.toLowerCase(),
          profession: trackingState.profession.toLowerCase()
        });

        setTimeout(() => {
          hideSystemStatus();
          window.location.href = './dash.html'
        }, 1000);

      } catch (error) {
        console.error("Failed database transaction:", error);
        alert("Transaction error processing onboarding update: " + error.message);
        hideSystemStatus();
      }
    }

    function showSystemStatus() {
      document.getElementById('topNavLoader').classList.add('active');
    }

    function hideSystemStatus() {
      document.getElementById('topNavLoader').classList.remove('active');
    }

    window.addEventListener('DOMContentLoaded', initDatabaseEngine);
    // Bind window resize listener to verify calculations match display metrics
    window.addEventListener('resize', syncCardHeightReflow);
  </script>
</body>
</html>
