<!DOCTYPE html>
<html>
<head>
<title>Vasuki Meet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h2>Vasuki Meet</h2>
</header>

<div style="padding:20px;">
<button class="primary" onclick="createRoom()">New Meeting</button>
<button onclick="joinRoom()">Join Meeting</button>
</div>

<script>
function createRoom() {
    const id = Math.random().toString(36).substr(2, 6);
    location.href = "/room.html?room=" + id;
}

function joinRoom() {
    const id = prompt("Enter Room ID:");
    location.href = "/room.html?room=" + id;
}
</script>

</body>
</html>
