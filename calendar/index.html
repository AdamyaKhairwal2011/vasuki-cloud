<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasuki Calendar — Smart Scheduling</title>
<style>
@font-face {
  font-family: 'Tyhr';
  src: url('../custom.ttf') format('truetype');
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}
:root {
  --bg:    #08090c; --bg2: #0e1016; --bg3: #13151e; --bg4: #191c28; --bg5: #1f2333;
  --s1: rgba(255,255,255,0.035); --s2: rgba(255,255,255,0.065); --s3: rgba(255,255,255,0.1);
  --b1: rgba(255,255,255,0.07);  --b2: rgba(255,255,255,0.12);  --b3: rgba(255,255,255,0.18);
  --ink: #eef0f7; --ink2: #8b92ae; --ink3: #555e7a; --ink4: #2e3550;
  --a: #4f7fff; --a2: #2954e8; --ag: rgba(79,127,255,0.22); --at: rgba(79,127,255,0.08);
  --gr: #2dcc85; --gd: rgba(45,204,133,0.12);
  --re: #f04f5e; --rd: rgba(240,79,94,0.12);
  --am: #f0a840; --ad2: rgba(240,168,64,0.12);
  --pu: #9f6bff; --pd: rgba(159,107,255,0.12);
  --te: #2ec4c0; --td: rgba(46,196,192,0.12);
  --pi: #f06292; --pid: rgba(240,98,146,0.12);
  --f: 'Tyhr', system-ui, -apple-system, sans-serif;
  --mo: 'SF Mono','Fira Code',ui-monospace,monospace;
  --ease: cubic-bezier(0.22,1,0.36,1);
  --ease2: cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--f);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--ink4)}

/* ─ SHELL ─ */
.app{display:grid;grid-template-columns:230px 1fr;grid-template-rows:56px 1fr;height:100vh}

/* ─ HEADER ─ */
header{
  grid-column:1/-1;display:flex;align-items:center;
  background:var(--bg);border-bottom:1px solid var(--b1);
  padding:0 16px 0 0;gap:0;position:relative;z-index:200
}
.h-brand{
  width:230px;flex-shrink:0;display:flex;align-items:center;
  gap:10px;padding:0 16px;height:100%;border-right:1px solid var(--b1)
}
.brand-icon{
  width:30px;height:30px;background:linear-gradient(135deg,var(--a),var(--pu));
  border-radius:8px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;position:relative;overflow:hidden
}
.brand-icon::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15) 0%,transparent 60%)}
.brand-icon svg{position:relative;z-index:1}
.brand-txt{display:flex;flex-direction:column;gap:0}
.brand-nm{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.2px;line-height:1.2}
.brand-nm em{color:var(--a);font-style:normal}
.brand-sub{font-size:10px;color:var(--ink3);letter-spacing:.3px;line-height:1.1}

.h-mid{flex:1;display:flex;align-items:center;gap:12px;padding:0 16px}

.nav-cluster{display:flex;align-items:center;gap:2px}
.nav-arr{
  width:28px;height:28px;background:transparent;border:1px solid transparent;
  border-radius:7px;color:var(--ink3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;
  transition:all .15s var(--ease2)
}
.nav-arr:hover{background:var(--s1);border-color:var(--b1);color:var(--ink)}
.nav-arr:active{transform:scale(.92)}
.td-btn{
  height:28px;padding:0 11px;background:transparent;border:1px solid var(--b1);
  border-radius:7px;color:var(--ink2);font-family:var(--f);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s var(--ease2)
}
.td-btn:hover{background:var(--s1);border-color:var(--b2);color:var(--ink)}
.td-btn:active{transform:scale(.96)}
.period{font-size:15px;font-weight:600;color:var(--ink);letter-spacing:-.3px;min-width:160px;white-space:nowrap}

.h-search{position:relative;max-width:250px;flex:1}
.h-search svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink3);pointer-events:none;transition:color .15s}
.h-search input{
  width:100%;height:30px;padding:0 12px 0 32px;
  background:var(--s1);border:1px solid var(--b1);border-radius:20px;
  font-family:var(--f);font-size:12.5px;color:var(--ink);outline:none;transition:all .2s var(--ease2)
}
.h-search input::placeholder{color:var(--ink3)}
.h-search input:focus{background:var(--bg3);border-color:var(--a);box-shadow:0 0 0 3px var(--ag)}
.h-search input:focus~svg,.h-search:focus-within svg{color:var(--a)}

.view-sw{
  display:flex;background:var(--s1);border:1px solid var(--b1);
  border-radius:9px;padding:3px;gap:2px;flex-shrink:0
}
.vbtn{
  height:24px;padding:0 10px;border:none;background:transparent;
  color:var(--ink3);font-family:var(--f);font-size:12px;font-weight:500;
  border-radius:6px;cursor:pointer;transition:all .15s var(--ease2)
}
.vbtn:hover{color:var(--ink2)}
.vbtn.on{background:var(--bg4);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}

.h-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.h-icon{
  width:30px;height:30px;border-radius:7px;border:1px solid transparent;
  background:transparent;color:var(--ink3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s var(--ease2);text-decoration:none;position:relative
}
.h-icon:hover{background:var(--s1);border-color:var(--b1);color:var(--ink2)}
.h-icon:active{transform:scale(.92)}
.ndot{position:absolute;top:5px;right:5px;width:6px;height:6px;background:var(--a);border-radius:50%;border:1.5px solid var(--bg)}
.hdiv{width:1px;height:18px;background:var(--b1);flex-shrink:0}

/* Login button */
.login-btn{
  display:flex;align-items:center;gap:6px;height:30px;padding:0 14px;
  background:var(--a);border:none;border-radius:7px;
  font-family:var(--f);font-size:12.5px;font-weight:600;color:#fff;
  cursor:pointer;text-decoration:none;
  transition:all .22s var(--ease);
  box-shadow:0 2px 12px rgba(79,127,255,.35),inset 0 1px 0 rgba(255,255,255,.15);
  position:relative;overflow:hidden;white-space:nowrap
}
.login-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%)
}
.login-btn::after{
  content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-15deg);transition:left .55s var(--ease)
}
.login-btn:hover{background:var(--a2);transform:translateY(-1px);box-shadow:0 5px 20px rgba(79,127,255,.45),inset 0 1px 0 rgba(255,255,255,.15)}
.login-btn:hover::after{left:160%}
.login-btn:active{transform:scale(.97) translateY(0)}

/* Get Started button */
.gs-btn{
  display:flex;align-items:center;gap:6px;height:30px;padding:0 14px;
  background:var(--gd);border:1px solid rgba(45,204,133,.22);border-radius:7px;
  font-family:var(--f);font-size:12.5px;font-weight:600;color:var(--gr);
  cursor:pointer;text-decoration:none;
  transition:all .22s var(--ease);white-space:nowrap;position:relative;overflow:hidden
}
.gs-btn::after{
  content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(45,204,133,.12),transparent);
  transform:skewX(-15deg);transition:left .55s var(--ease)
}
.gs-btn:hover{background:rgba(45,204,133,.18);border-color:rgba(45,204,133,.38);transform:translateY(-1px);box-shadow:0 4px 16px rgba(45,204,133,.2)}
.gs-btn:hover::after{left:160%}
.gs-btn:active{transform:scale(.97) translateY(0)}

.avatar{
  width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--a),var(--pu));
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0;
  transition:all .2s var(--ease);border:1.5px solid transparent
}
.avatar:hover{border-color:var(--b3);transform:scale(1.07)}

/* ─ SIDEBAR ─ */
.sidebar{
  background:var(--bg);border-right:1px solid var(--b1);
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;padding:14px 10px
}
.create-btn{
  display:flex;align-items:center;justify-content:center;gap:7px;
  width:100%;height:36px;background:var(--at);border:1px solid rgba(79,127,255,.22);
  border-radius:10px;font-family:var(--f);font-size:13px;font-weight:600;color:var(--a);
  cursor:pointer;margin-bottom:14px;transition:all .22s var(--ease);
  position:relative;overflow:hidden
}
.create-btn::after{
  content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(79,127,255,.1),transparent);
  transform:skewX(-15deg);transition:left .55s var(--ease)
}
.create-btn:hover{background:rgba(79,127,255,.14);border-color:rgba(79,127,255,.35);transform:translateY(-1px);box-shadow:0 4px 16px var(--ag)}
.create-btn:hover::after{left:160%}
.create-btn:active{transform:scale(.98) translateY(0)}

/* Mini cal */
.mc{margin-bottom:16px}
.mc-hd{display:flex;justify-content:space-between;align-items:center;padding:4px 4px 8px}
.mc-title{font-size:12px;font-weight:600;color:var(--ink2)}
.mc-navs{display:flex;gap:1px}
.mc-nav{width:22px;height:22px;background:none;border:none;color:var(--ink3);cursor:pointer;border-radius:5px;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.mc-nav:hover{background:var(--s2);color:var(--ink2)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center}
.mc-wd{font-size:9.5px;font-weight:700;color:var(--ink4);letter-spacing:.4px;padding:3px 0 5px;text-transform:uppercase}
.mc-d{font-size:11px;color:var(--ink3);padding:4px 0;border-radius:5px;cursor:pointer;transition:all .12s;line-height:1.4}
.mc-d:hover{background:var(--s2);color:var(--ink2)}
.mc-d.today{background:var(--a);color:#fff;font-weight:700;box-shadow:0 2px 8px var(--ag)}
.mc-d.other{color:var(--ink4)}

.sb-sec{margin-bottom:4px}
.sb-sec-t{font-size:9.5px;font-weight:700;color:var(--ink4);letter-spacing:1.1px;text-transform:uppercase;padding:10px 6px 6px}
.cal-row{display:flex;align-items:center;gap:8px;padding:6px;border-radius:7px;cursor:pointer;transition:background .12s}
.cal-row:hover{background:var(--s1)}
.cal-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cal-lbl{font-size:12.5px;color:var(--ink2);line-height:1}
.sb-sp{flex:1;min-height:16px}
.sb-ft{padding-top:12px;border-top:1px solid var(--b1);display:flex;flex-direction:column;gap:2px}
.sb-fl{
  display:flex;align-items:center;gap:8px;padding:7px 6px;border-radius:7px;
  text-decoration:none;color:var(--ink3);font-size:12px;font-weight:500;
  transition:all .12s;cursor:pointer;border:none;background:none;font-family:var(--f);width:100%;text-align:left
}
.sb-fl:hover{background:var(--s1);color:var(--ink2)}

/* ─ MAIN ─ */
.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg2);position:relative}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg)}
.stat{padding:10px 16px;display:flex;flex-direction:column;gap:2px;border-right:1px solid var(--b1);transition:background .15s}
.stat:last-child{border-right:none}
.stat:hover{background:var(--s1)}
.sv{font-size:22px;font-weight:700;letter-spacing:-.8px;line-height:1;font-variant-numeric:tabular-nums;transition:all .3s var(--ease)}
.sv.ca{color:var(--a)}  .sv.cg{color:var(--gr)} .sv.cam{color:var(--am)} .sv.cp{color:var(--pu)}
.sl{font-size:10.5px;color:var(--ink3);font-weight:500}

/* ─ VIEWS ─ */
.view{flex:1;overflow:hidden;display:flex;flex-direction:column;animation:vin .22s var(--ease) both}
.view[hidden]{display:none!important}
@keyframes vin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Month */
.m-wds{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);border-bottom:1px solid var(--b1);flex-shrink:0}
.m-wd{padding:9px 0;text-align:center;font-size:10.5px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.8px}
.m-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;flex:1;overflow:hidden}
.m-cell{
  border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);padding:7px 7px 5px;
  cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:3px;
  min-height:0;overflow:hidden
}
.m-cell:nth-child(7n){border-right:none}
.m-cell.other{background:rgba(0,0,0,.12)}
.m-cell.today{background:rgba(79,127,255,.05)}
.m-cell:hover{background:var(--s1)}
.m-cell:hover .dn{background:var(--s3);color:var(--ink)}
.dn{
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:11.5px;font-weight:500;color:var(--ink3);border-radius:50%;
  flex-shrink:0;align-self:flex-start;transition:all .12s;line-height:1
}
.m-cell.other .dn{color:var(--ink4)}
.m-cell.today .dn{background:var(--a);color:#fff;font-weight:700;box-shadow:0 2px 10px var(--ag)}
.cevts{display:flex;flex-direction:column;gap:2px;flex:1;overflow:hidden}
.ce{
  display:flex;align-items:center;gap:4px;padding:2px 5px;border-radius:4px;
  font-size:10.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;transition:all .12s;flex-shrink:0;line-height:1.5
}
.ce:hover{filter:brightness(1.2);transform:translateX(1px)}
.cedot{width:4px;height:4px;border-radius:50%;flex-shrink:0;background:currentColor}
.ce.blue  {background:rgba(79,127,255,.18);color:#8ab0ff}
.ce.green {background:var(--gd);color:#3dd490}
.ce.red   {background:var(--rd);color:#f27080}
.ce.amber {background:var(--ad2);color:#f0b85a}
.ce.purple{background:var(--pd);color:#b891ff}
.ce.teal  {background:var(--td);color:#3ed4d0}
.ce.pink  {background:var(--pid);color:#f076a0}
.more-lbl{font-size:10px;color:var(--ink4);padding:1px 5px;cursor:pointer;font-weight:500;transition:color .12s}
.more-lbl:hover{color:var(--a)}

/* Time views */
.tv{flex:1;display:flex;flex-direction:column;overflow:hidden}
.t-hdr{display:grid;background:var(--bg);border-bottom:1px solid var(--b1);flex-shrink:0}
.t-corner{border-right:1px solid var(--b1);padding:8px 0;display:flex;align-items:center;justify-content:center}
.tz-lbl{font-size:9px;color:var(--ink4);font-weight:600;letter-spacing:.3px;font-family:var(--mo)}
.dhc{padding:8px 6px;text-align:center;border-left:1px solid var(--b1);cursor:pointer;transition:background .12s}
.dhc:hover{background:var(--s1)}
.dhwd{font-size:10px;font-weight:700;color:var(--ink4);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px}
.dhnum{
  font-size:18px;font-weight:600;color:var(--ink2);width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto;
  transition:all .15s;line-height:1
}
.dhc.today .dhwd{color:var(--a)}
.dhc.today .dhnum{background:var(--a);color:#fff;box-shadow:0 2px 10px var(--ag)}
.t-scroll{flex:1;overflow-y:auto;position:relative}
.t-grid{display:grid}
.tl{padding:0 8px;height:56px;display:flex;align-items:flex-start;padding-top:4px;border-right:1px solid var(--b1);border-bottom:1px solid rgba(255,255,255,.025)}
.tl span{font-size:9.5px;color:var(--ink4);font-family:var(--mo);line-height:1}
.ts{height:56px;border-left:1px solid var(--b1);border-bottom:1px solid rgba(255,255,255,.025);position:relative;cursor:pointer;transition:background .1s}
.ts:hover{background:var(--s1)}
.ts.tc{background:rgba(79,127,255,.018)}
.ts::after{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:rgba(255,255,255,.022);pointer-events:none}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--re);z-index:10;pointer-events:none}
.now-line::before{content:'';position:absolute;left:-1px;top:-4px;width:10px;height:10px;background:var(--re);border-radius:50%;box-shadow:0 0 6px rgba(240,79,94,.6)}
.eb{
  position:absolute;left:3px;right:3px;border-radius:5px;padding:3px 7px;
  font-size:10.5px;font-weight:500;overflow:hidden;cursor:pointer;z-index:5;
  display:flex;flex-direction:column;justify-content:flex-start;gap:1px;
  transition:filter .15s,transform .15s
}
.eb:hover{filter:brightness(1.15);transform:translateX(1px);z-index:6}
.eb-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.eb-m{font-size:9.5px;opacity:.75;white-space:nowrap;font-family:var(--mo);line-height:1}
.eb.blue  {background:rgba(79,127,255,.28);color:#9ab8ff;border-left:2.5px solid var(--a)}
.eb.green {background:rgba(45,204,133,.22);color:#3dd490;border-left:2.5px solid var(--gr)}
.eb.red   {background:rgba(240,79,94,.22);color:#f27080;border-left:2.5px solid var(--re)}
.eb.amber {background:rgba(240,168,64,.22);color:#f0b85a;border-left:2.5px solid var(--am)}
.eb.purple{background:rgba(159,107,255,.22);color:#b891ff;border-left:2.5px solid var(--pu)}
.eb.teal  {background:rgba(46,196,192,.22);color:#3ed4d0;border-left:2.5px solid var(--te)}
.eb.pink  {background:rgba(240,98,146,.22);color:#f076a0;border-left:2.5px solid var(--pi)}

/* Schedule */
.sw{flex:1;overflow-y:auto;padding:16px 20px 32px}
.sd{margin-bottom:24px;animation:vin .22s var(--ease) both}
.sd-hd{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sd-num{width:32px;height:32px;border-radius:50%;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--ink2);flex-shrink:0}
.sd.ist .sd-num{background:var(--a);color:#fff;box-shadow:0 2px 10px var(--ag)}
.sd-lbl{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:1px}
.sd.ist .sd-lbl{color:var(--a)}
.sd-line{flex:1;height:1px;background:var(--b1)}
.se{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:var(--s1);border:1px solid var(--b1);border-radius:10px;
  margin-bottom:5px;cursor:pointer;transition:all .15s var(--ease2)
}
.se:hover{border-color:var(--b2);background:var(--s2);transform:translateX(3px);box-shadow:-3px 0 0 var(--a)}
.se-bar{width:3px;height:28px;border-radius:2px;flex-shrink:0}
.se-info{flex:1;min-width:0}
.se-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.se-meta{display:flex;gap:10px;font-size:11px;color:var(--ink3)}
.se-r{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.se-time{font-size:11px;color:var(--ink3);font-family:var(--mo);white-space:nowrap}
.stag{padding:1px 7px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px}
.stag.blue  {background:rgba(79,127,255,.15);color:#7fa6ff}
.stag.green {background:var(--gd);color:#3dd490}
.stag.red   {background:var(--rd);color:#f27080}
.stag.amber {background:var(--ad2);color:#f0b85a}
.stag.purple{background:var(--pd);color:#b891ff}
.stag.teal  {background:var(--td);color:#3ed4d0}
.stag.pink  {background:var(--pid);color:#f076a0}

.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--ink4);padding:60px 20px;text-align:center}
.empty-icon{width:52px;height:52px;background:var(--s1);border:1px solid var(--b1);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:4px}
.empty-title{font-size:15px;font-weight:600;color:var(--ink3)}
.empty-sub{font-size:12.5px;color:var(--ink4)}
.empty-cta{margin-top:4px;padding:8px 20px;background:var(--at);border:1px solid rgba(79,127,255,.22);border-radius:7px;color:var(--a);font-family:var(--f);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .2s var(--ease)}
.empty-cta:hover{background:rgba(79,127,255,.14);border-color:rgba(79,127,255,.35);transform:translateY(-1px)}

/* ─ MODAL ─ */
.ov{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:1000;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s var(--ease2)
}
.ov.open{opacity:1;pointer-events:all}
.modal{
  background:var(--bg3);border:1px solid var(--b2);border-radius:16px;
  width:90%;max-width:455px;max-height:92vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.05) inset;
  transform:translateY(16px) scale(.97);transition:all .25s var(--ease)
}
.ov.open .modal{transform:translateY(0) scale(1)}
.m-head{padding:18px 20px 0;display:flex;align-items:center;justify-content:space-between}
.m-title{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.3px}
.m-x{width:26px;height:26px;background:var(--s1);border:1px solid var(--b1);border-radius:6px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.m-x:hover{background:var(--s2);color:var(--ink)}
.m-body{padding:16px 20px 4px}
.fg{margin-bottom:13px}
.fl{display:block;font-size:10.5px;font-weight:700;color:var(--ink3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.fi,.fsel,.fta{
  width:100%;padding:9px 11px;background:var(--bg4);border:1px solid var(--b1);
  border-radius:7px;font-family:var(--f);font-size:13px;color:var(--ink);
  outline:none;transition:all .18s var(--ease2)
}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--ag);background:var(--bg3)}
.fi::placeholder,.fta::placeholder{color:var(--ink4)}
.fsel{appearance:none;cursor:pointer}
.fsel option{background:var(--bg3)}
.fta{resize:vertical;min-height:60px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.crow{display:flex;gap:7px;align-items:center}
.cs{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s var(--ease);position:relative}
.cs.sel{border-color:var(--ink);transform:scale(1.2);box-shadow:0 2px 8px rgba(0,0,0,.4)}
.cs.blue{background:var(--a)}.cs.green{background:var(--gr)}.cs.red{background:var(--re)}
.cs.amber{background:var(--am)}.cs.purple{background:var(--pu)}.cs.teal{background:var(--te)}.cs.pink{background:var(--pi)}
.ck{display:flex;align-items:center;gap:8px;cursor:pointer;padding:3px 0;user-select:none}
.ck input[type="checkbox"]{accent-color:var(--a);width:13px;height:13px;cursor:pointer}
.ck-lbl{font-size:12.5px;color:var(--ink2)}
.rp{display:none;margin-top:8px;padding:12px;background:var(--bg4);border:1px solid var(--b1);border-radius:7px;animation:vin .18s var(--ease) both}
.rp.show{display:block}
.m-acts{display:flex;gap:8px;justify-content:flex-end;padding:12px 20px 20px;border-top:1px solid var(--b1)}
.btn-ghost{padding:8px 14px;background:transparent;border:1px solid var(--b1);border-radius:7px;font-family:var(--f);font-size:12.5px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s}
.btn-ghost:hover{background:var(--s1);color:var(--ink);border-color:var(--b2)}
.btn-ghost:active{transform:scale(.96)}
.btn-prim{
  padding:8px 18px;background:var(--a);border:none;border-radius:7px;
  font-family:var(--f);font-size:12.5px;font-weight:700;color:#fff;cursor:pointer;
  transition:all .2s var(--ease);box-shadow:0 2px 12px var(--ag);
  position:relative;overflow:hidden
}
.btn-prim::after{content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);transform:skewX(-15deg);transition:left .5s var(--ease)}
.btn-prim:hover{background:var(--a2);transform:translateY(-1px);box-shadow:0 5px 20px var(--ag)}
.btn-prim:hover::after{left:160%}
.btn-prim:active{transform:scale(.97) translateY(0)}
.btn-del{padding:8px 14px;background:var(--rd);border:1px solid rgba(240,79,94,.2);border-radius:7px;font-family:var(--f);font-size:12.5px;font-weight:500;color:var(--re);cursor:pointer;transition:all .15s;margin-right:auto}
.btn-del:hover{background:rgba(240,79,94,.2);border-color:rgba(240,79,94,.35)}
.btn-del:active{transform:scale(.96)}

/* Toast */
.toast{
  position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--b2);
  border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:8px;
  font-size:12.5px;color:var(--ink);box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;
  max-width:260px;transform:translateY(8px);opacity:0;pointer-events:none;transition:all .25s var(--ease)
}
.toast.show{opacity:1;transform:translateY(0);pointer-events:all}
.tdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.toast.ok .tdot{background:var(--gr)}
.toast.err .tdot{background:var(--re)}

/* Mobile */
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .h-brand{width:auto;border-right:none}
  .sidebar{display:none;position:fixed;left:0;top:56px;bottom:0;width:230px;z-index:300}
  .sidebar.open{display:flex;border-right:1px solid var(--b1);box-shadow:4px 0 32px rgba(0,0,0,.4)}
  .stats{grid-template-columns:1fr 1fr}
  .h-search{display:none}
  .vbtn:nth-child(n+4){display:none}
  .gs-btn,.period{display:none}
}
</style>
</head>
<body>

<div class="toast" id="toast"><div class="tdot"></div><span id="toast-text">Saved</span></div>

<!-- MODAL -->
<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="modal">
    <div class="m-head">
      <span class="m-title" id="m-title">New Event</span>
      <button class="m-x" onclick="closeModal()">×</button>
    </div>
    <div class="m-body">
      <div class="fg"><label class="fl">Title</label><input class="fi" id="f-title" type="text" placeholder="Event name" required></div>
      <div class="fg"><label class="fl">Description</label><textarea class="fta" id="f-desc" placeholder="Notes or agenda…"></textarea></div>
      <div class="fr2">
        <div class="fg"><label class="fl">Date</label><input class="fi" id="f-date" type="date" required></div>
        <div class="fg"><label class="fl">Type</label>
          <select class="fsel" id="f-type">
            <option value="meeting">Meeting</option><option value="focus">Focus Time</option>
            <option value="appointment">Appointment</option><option value="reminder">Reminder</option><option value="task">Task</option>
          </select>
        </div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">Start Time</label><input class="fi" id="f-time" type="time"></div>
        <div class="fg"><label class="fl">End Time</label><input class="fi" id="f-end" type="time"></div>
      </div>
      <div class="fg"><label class="fl">Location</label><input class="fi" id="f-loc" type="text" placeholder="Office, Zoom, Meet…"></div>
      <div class="fg">
        <label class="fl">Color</label>
        <div class="crow" id="crow">
          <div class="cs blue sel"  data-c="blue"   onclick="pc(this)"></div>
          <div class="cs green"     data-c="green"  onclick="pc(this)"></div>
          <div class="cs red"       data-c="red"    onclick="pc(this)"></div>
          <div class="cs amber"     data-c="amber"  onclick="pc(this)"></div>
          <div class="cs purple"    data-c="purple" onclick="pc(this)"></div>
          <div class="cs teal"      data-c="teal"   onclick="pc(this)"></div>
          <div class="cs pink"      data-c="pink"   onclick="pc(this)"></div>
        </div>
      </div>
      <div class="fg">
        <label class="ck"><input type="checkbox" id="f-rec" onchange="tRecur()"><span class="ck-lbl">Recurring event</span></label>
        <div class="rp" id="rp">
          <div class="fr2">
            <div class="fg"><label class="fl">Repeat</label>
              <select class="fsel" id="f-rt"><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select>
            </div>
            <div class="fg"><label class="fl">Until</label><input class="fi" id="f-until" type="date"></div>
          </div>
        </div>
      </div>
      <label class="ck" style="margin-bottom:8px"><input type="checkbox" id="f-speedy"><span class="ck-lbl">Speedy meeting (−10 min)</span></label>
      <label class="ck" style="margin-bottom:4px"><input type="checkbox" id="f-priv"><span class="ck-lbl">Private — show as Busy</span></label>
    </div>
    <div class="m-acts">
      <button class="btn-del" id="btn-del" style="display:none" onclick="delEv()">Delete</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-prim" onclick="saveEv()">Save Event</button>
    </div>
  </div>
</div>

<!-- APP -->
<div class="app">
  <header>
    <div class="h-brand">
      <button id="hb" onclick="toggleSb()" style="display:none;background:none;border:none;cursor:pointer;padding:4px;color:var(--ink3);margin-right:2px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </div>
      <div class="brand-txt">
        <div class="brand-nm"><em>Vasuki</em> Calendar</div>
        <div class="brand-sub">Schedule Management</div>
      </div>
    </div>
    <div class="h-mid">
      <div class="nav-cluster">
        <button class="nav-arr" onclick="prev()">&#8249;</button>
        <button class="td-btn"  onclick="goToday()">Today</button>
        <button class="nav-arr" onclick="next()">&#8250;</button>
      </div>
      <span class="period" id="period"></span>
      <div class="h-search">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" placeholder="Search events…" id="sinp" oninput="doSearch(this.value)">
      </div>
      <div class="view-sw">
        <button class="vbtn on" data-v="month"    onclick="sv('month')">Month</button>
        <button class="vbtn"   data-v="week"     onclick="sv('week')">Week</button>
        <button class="vbtn"   data-v="day"      onclick="sv('day')">Day</button>
        <button class="vbtn"   data-v="schedule" onclick="sv('schedule')">Schedule</button>
      </div>
    </div>
    <div class="h-right">
      <div class="h-icon" title="Notifications"><div class="ndot" id="ndot" style="display:none"></div><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
      <div class="hdiv"></div>
      <a href="login.html" class="login-btn" id="lbtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        Login
      </a>
      <a href="https://vasuki.cloud/login" class="gs-btn">
        Get Started
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" x2="19" y1="12" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
      <div class="hdiv"></div>
      <div class="avatar" id="avatar" onclick="avatarClick()">S</div>
    </div>
  </header>

  <aside class="sidebar" id="sb">
    <button class="create-btn" onclick="openModal()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
      New Event
    </button>
    <div class="mc">
      <div class="mc-hd"><span class="mc-title" id="mc-t"></span><div class="mc-navs"><button class="mc-nav" onclick="mPrev()">‹</button><button class="mc-nav" onclick="mNext()">›</button></div></div>
      <div class="mc-grid" id="mc-g"></div>
    </div>
    <div class="sb-sec"><div class="sb-sec-t">My Calendars</div>
      <div class="cal-row"><div class="cal-dot" style="background:var(--a)"></div><span class="cal-lbl">Personal</span></div>
      <div class="cal-row"><div class="cal-dot" style="background:var(--gr)"></div><span class="cal-lbl">Work</span></div>
      <div class="cal-row"><div class="cal-dot" style="background:var(--am)"></div><span class="cal-lbl">Family</span></div>
    </div>
    <div class="sb-sec"><div class="sb-sec-t">Other</div>
      <div class="cal-row"><div class="cal-dot" style="background:var(--re)"></div><span class="cal-lbl">Holidays in India</span></div>
      <div class="cal-row"><div class="cal-dot" style="background:var(--pu)"></div><span class="cal-lbl">Birthdays</span></div>
    </div>
    <div class="sb-sp"></div>
    <div class="sb-ft">
      <a href="../" class="sb-fl"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Vasuki Cloud</a>
      <button class="sb-fl" onclick="logout()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>Sign Out</button>
    </div>
  </aside>

  <main class="main">
    <div class="stats">
      <div class="stat"><div class="sv ca" id="s0">0</div><div class="sl">This Month</div></div>
      <div class="stat"><div class="sv cg" id="s1">0</div><div class="sl">Today</div></div>
      <div class="stat"><div class="sv cam" id="s2">0</div><div class="sl">This Week</div></div>
      <div class="stat"><div class="sv cp" id="s3">0</div><div class="sl">Recurring</div></div>
    </div>
    <div class="view" id="v-month"><div class="m-wds" id="wds"></div><div class="m-grid" id="mg"></div></div>
    <div class="view tv" id="v-week" hidden><div class="t-hdr" id="wh"></div><div class="t-scroll" id="ws"><div class="t-grid" id="wg"></div></div></div>
    <div class="view tv" id="v-day" hidden><div class="t-hdr" id="dh"></div><div class="t-scroll" id="ds"><div class="t-grid" id="dg"></div></div></div>
    <div class="view" id="v-schedule" hidden style="overflow:hidden"><div class="sw" id="scw"></div></div>
  </main>
</div>

<script>
const MO=['January','February','March','April','May','June','July','August','September','October','November','December'];
const M3=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const WD=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const CLR={blue:'var(--a)',green:'var(--gr)',red:'var(--re)',amber:'var(--am)',purple:'var(--pu)',teal:'var(--te)',pink:'var(--pi)'};

let cur=new Date(), mCur=new Date(), view='month', sCl='blue', eid=null, events=[], nid=1;

const dk=d=>`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
const p=n=>String(n).padStart(2,'0');
const add=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const tk=()=>dk(new Date());

function fmt(t){if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${p(m)} ${h<12?'AM':'PM'}`}

function save(){try{localStorage.setItem('vc2_evts',JSON.stringify(events))}catch(e){}}
function load(){try{const s=localStorage.getItem('vc2_evts');if(s){const x=JSON.parse(s);if(Array.isArray(x)&&x.length){events=x;nid=Math.max(...x.map(e=>e.id||0))+1}}}catch(e){}}

function uStats(){
  const now=new Date(),t=tk();
  const ms=dk(new Date(now.getFullYear(),now.getMonth(),1));
  const me=dk(new Date(now.getFullYear(),now.getMonth()+1,0));
  const ws=dk(add(now,-now.getDay())),we=dk(add(now,6-now.getDay()));
  document.getElementById('s0').textContent=events.filter(e=>e.date>=ms&&e.date<=me).length;
  document.getElementById('s1').textContent=events.filter(e=>e.date===t).length;
  document.getElementById('s2').textContent=events.filter(e=>e.date>=ws&&e.date<=we).length;
  document.getElementById('s3').textContent=events.filter(e=>e.recurring).length;
}

function uLabel(){
  const el=document.getElementById('period');
  if(view==='month') el.textContent=`${MO[cur.getMonth()]} ${cur.getFullYear()}`;
  else if(view==='week'){
    const s=add(cur,-cur.getDay()),e=add(s,6);
    el.textContent=s.getMonth()===e.getMonth()
      ?`${MO[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${e.getFullYear()}`
      :`${M3[s.getMonth()]} ${s.getDate()} – ${M3[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;
  } else if(view==='day') el.textContent=cur.toLocaleDateString('en-IN',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  else el.textContent=`Schedule · ${MO[cur.getMonth()]} ${cur.getFullYear()}`;
}

function prev(){
  if(view==='month')cur.setMonth(cur.getMonth()-1);
  else if(view==='week')cur.setDate(cur.getDate()-7);
  else if(view==='day')cur.setDate(cur.getDate()-1);
  else cur.setMonth(cur.getMonth()-1);
  render();
}
function next(){
  if(view==='month')cur.setMonth(cur.getMonth()+1);
  else if(view==='week')cur.setDate(cur.getDate()+7);
  else if(view==='day')cur.setDate(cur.getDate()+1);
  else cur.setMonth(cur.getMonth()+1);
  render();
}
function goToday(){cur=new Date();mCur=new Date();render();rMini()}

function sv(v){
  view=v;
  document.querySelectorAll('.vbtn').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  ['month','week','day','schedule'].forEach(n=>{
    const el=document.getElementById('v-'+n);
    if(n===v){el.removeAttribute('hidden')}else el.setAttribute('hidden','');
  });
  render();
}

function render(){uLabel();uStats();
  if(view==='month')rMonth();
  else if(view==='week')rWeek();
  else if(view==='day')rDay();
  else rSched();
}

/* ─ MONTH ─ */
function rMonth(){
  const wds=document.getElementById('wds');
  if(!wds.children.length) wds.innerHTML=WD.map(d=>`<div class="m-wd">${d}</div>`).join('');
  const y=cur.getFullYear(),m=cur.getMonth();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),pd=new Date(y,m,0).getDate();
  const t=tk();let html='',cnt=0;
  for(let i=fd-1;i>=0;i--){html+=mCell(pd-i,dk(new Date(y,m-1,pd-i)),true,false);cnt++}
  for(let d=1;d<=dim;d++){const k=dk(new Date(y,m,d));html+=mCell(d,k,false,k===t);cnt++}
  const rem=35-cnt;
  for(let d=1;d<=rem;d++)html+=mCell(d,dk(new Date(y,m+1,d)),true,false);
  document.getElementById('mg').innerHTML=html;
}
function mCell(day,key,oth,isT){
  const de=events.filter(e=>e.date===key);
  let cls='m-cell'+(oth?' other':'')+(isT?' today':'');
  let eh='';
  de.slice(0,3).forEach(e=>{
    eh+=`<div class="ce ${e.color}" onclick="event.stopPropagation();editEv(${e.id})"><div class="cedot"></div>${e.time?fmt(e.time)+' ':''}${e.private?'Busy':e.title}</div>`;
  });
  if(de.length>3)eh+=`<div class="more-lbl">+${de.length-3} more</div>`;
  return`<div class="${cls}" onclick="openModal('${key}')"><div class="dn">${day}</div><div class="cevts">${eh}</div></div>`;
}

/* ─ WEEK ─ */
function rWeek(){
  const ws=add(cur,-cur.getDay()),t=tk();
  const hdr=document.getElementById('wh');
  hdr.style.gridTemplateColumns='48px repeat(7,1fr)';
  let hh=`<div class="t-corner"><span class="tz-lbl">IST</span></div>`;
  for(let i=0;i<7;i++){
    const d=add(ws,i),isT=dk(d)===t;
    hh+=`<div class="dhc ${isT?'today':''}" onclick="jDate(${d.getFullYear()},${d.getMonth()},${d.getDate()})"><div class="dhwd">${WD[i]}</div><div class="dhnum">${d.getDate()}</div></div>`;
  }
  hdr.innerHTML=hh;
  const grid=document.getElementById('wg');
  grid.style.gridTemplateColumns='48px repeat(7,1fr)';
  let gh='';
  for(let h=0;h<24;h++){
    gh+=`<div class="tl"><span>${h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM'}</span></div>`;
    for(let i=0;i<7;i++){
      const d=add(ws,i),key=dk(d),isT=key===t;
      const se=events.filter(e=>e.date===key&&(e.time?parseInt(e.time.split(':')[0])===h:h===0));
      const ev=se.map(e=>`<div class="eb ${e.color}" style="top:4px;height:${eH(e)}px" onclick="editEv(${e.id})"><div class="eb-t">${e.private?'Busy':e.title}</div>${eH(e)>30&&e.time?`<div class="eb-m">${fmt(e.time)}${e.endtime?' – '+fmt(e.endtime):''}</div>`:''}</div>`).join('');
      gh+=`<div class="ts ${isT?'tc':''}" onclick="openModal('${key}','${p(h)}:00')">${ev}</div>`;
    }
  }
  grid.innerHTML=gh;
  setTimeout(()=>{document.getElementById('ws').scrollTop=8*56},60);
}

/* ─ DAY ─ */
function rDay(){
  const key=dk(cur),isT=key===tk();
  const hdr=document.getElementById('dh');
  hdr.style.gridTemplateColumns='48px 1fr';
  hdr.innerHTML=`<div class="t-corner"><span class="tz-lbl">IST</span></div>
    <div class="dhc ${isT?'today':''}"><div class="dhwd">${WD[cur.getDay()]}</div><div class="dhnum">${cur.getDate()}</div></div>`;
  const de=events.filter(e=>e.date===key);
  const grid=document.getElementById('dg');
  grid.style.gridTemplateColumns='48px 1fr';
  let gh='';
  for(let h=0;h<24;h++){
    gh+=`<div class="tl"><span>${h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM'}</span></div>`;
    const se=de.filter(e=>e.time?parseInt(e.time.split(':')[0])===h:h===0);
    const ev=se.map(e=>{const ht=eH(e);return`<div class="eb ${e.color}" style="top:4px;height:${ht}px" onclick="editEv(${e.id})"><div class="eb-t">${e.private?'Busy':e.title}</div>${ht>28&&e.time?`<div class="eb-m">${fmt(e.time)}${e.endtime?' – '+fmt(e.endtime):''}</div>`:''}</div>`}).join('');
    gh+=`<div class="ts ${isT?'tc':''}" onclick="openModal('${key}','${p(h)}:00')">${ev}</div>`;
  }
  grid.innerHTML=gh;
  if(isT){
    const now=new Date(),slots=grid.querySelectorAll('.ts');
    if(slots[now.getHours()]){
      const nl=document.createElement('div');nl.className='now-line';
      nl.style.top=`${Math.round(now.getMinutes()/60*56)}px`;slots[now.getHours()].appendChild(nl);
    }
  }
  setTimeout(()=>{document.getElementById('ds').scrollTop=8*56},60);
}

function eH(e){
  if(!e.time||!e.endtime)return 48;
  const[sh,sm]=e.time.split(':').map(Number),[eh,em]=e.endtime.split(':').map(Number);
  return Math.max(22,Math.round(((eh*60+em)-(sh*60+sm))/60*56)-6);
}

/* ─ SCHEDULE ─ */
function rSched(){
  const wrap=document.getElementById('scw'),t=tk();
  if(!events.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No events yet</div><div class="empty-sub">Create your first event to get started</div><button class="empty-cta" onclick="openModal()">+ New Event</button></div>`;
    return;
  }
  const win0=add(new Date(),-14),win1=add(new Date(),45);
  const vis=events.filter(e=>e.date>=dk(win0)&&e.date<=dk(win1));
  if(!vis.length){
    wrap.innerHTML=`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-title">Nothing upcoming</div><div class="empty-sub">No events in the next 45 days</div></div>`;
    return;
  }
  const bd={};
  vis.forEach(e=>{if(!bd[e.date])bd[e.date]=[];bd[e.date].push(e)});
  const dates=Object.keys(bd).sort();
  let html='';
  dates.forEach(k=>{
    const d=new Date(k+'T00:00:00'),isT=k===t;
    const evts=bd[k].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    html+=`<div class="sd ${isT?'ist':''}">
      <div class="sd-hd"><div class="sd-num">${d.getDate()}</div><div class="sd-lbl">${WD[d.getDay()]} · ${M3[d.getMonth()]} ${d.getFullYear()}</div><div class="sd-line"></div></div>`;
    evts.forEach(e=>{
      html+=`<div class="se" onclick="editEv(${e.id})">
        <div class="se-bar" style="background:${CLR[e.color]||CLR.blue}"></div>
        <div class="se-info"><div class="se-title">${e.private?'Busy (Private)':e.title}</div>
          <div class="se-meta"><span>${e.type?e.type[0].toUpperCase()+e.type.slice(1):'Event'}</span>${e.location?`<span>📍 ${e.location}</span>`:''}</div>
        </div>
        <div class="se-r">
          <div class="se-time">${e.time?fmt(e.time)+(e.endtime?' – '+fmt(e.endtime):''):'All day'}</div>
          <div class="stag ${e.color}">${e.recurring?'↻ Recurring':e.type||'event'}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  });
  wrap.innerHTML=html;
}

/* ─ MINI ─ */
function rMini(){
  const y=mCur.getFullYear(),m=mCur.getMonth();
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),pd=new Date(y,m,0).getDate(),t=tk();
  document.getElementById('mc-t').textContent=`${M3[m]} ${y}`;
  let html=WD.map(d=>`<div class="mc-wd">${d[0]}</div>`).join('');
  for(let i=fd-1;i>=0;i--)html+=`<div class="mc-d other">${pd-i}</div>`;
  for(let d=1;d<=dim;d++){
    const k=dk(new Date(y,m,d));
    let cls='mc-d'+(k===t?' today':'');
    html+=`<div class="${cls}" onclick="jDate(${y},${m},${d})">${d}</div>`;
  }
  const rem=35-(fd+dim);
  for(let d=1;d<=Math.max(0,rem);d++)html+=`<div class="mc-d other">${d}</div>`;
  document.getElementById('mc-g').innerHTML=html;
}
function mPrev(){mCur.setMonth(mCur.getMonth()-1);rMini()}
function mNext(){mCur.setMonth(mCur.getMonth()+1);rMini()}
function jDate(y,m,d){cur=new Date(y,m,d);mCur=new Date(y,m,d);render();rMini()}

/* ─ MODAL ─ */
function openModal(ds,ts){
  eid=null;
  document.getElementById('m-title').textContent='New Event';
  document.getElementById('btn-del').style.display='none';
  ['f-title','f-desc','f-time','f-end','f-loc'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('f-type').value='meeting';
  document.getElementById('f-rec').checked=false;
  document.getElementById('f-speedy').checked=false;
  document.getElementById('f-priv').checked=false;
  document.getElementById('rp').classList.remove('show');
  document.getElementById('f-date').value=ds||tk();
  if(ts)document.getElementById('f-time').value=ts;
  sCl='blue';
  document.querySelectorAll('.cs').forEach(s=>s.classList.toggle('sel',s.dataset.c==='blue'));
  document.getElementById('ov').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(),120);
}
function editEv(id){
  const e=events.find(x=>x.id===id);if(!e)return;
  eid=id;
  document.getElementById('m-title').textContent='Edit Event';
  document.getElementById('btn-del').style.display='block';
  document.getElementById('f-title').value=e.title;
  document.getElementById('f-desc').value=e.desc||'';
  document.getElementById('f-date').value=e.date;
  document.getElementById('f-time').value=e.time||'';
  document.getElementById('f-end').value=e.endtime||'';
  document.getElementById('f-type').value=e.type||'meeting';
  document.getElementById('f-loc').value=e.location||'';
  document.getElementById('f-rec').checked=!!e.recurring;
  document.getElementById('f-speedy').checked=!!e.speedy;
  document.getElementById('f-priv').checked=!!e.private;
  if(e.recurring)document.getElementById('rp').classList.add('show');
  sCl=e.color||'blue';
  document.querySelectorAll('.cs').forEach(s=>s.classList.toggle('sel',s.dataset.c===sCl));
  document.getElementById('ov').classList.add('open');
}
function closeModal(){document.getElementById('ov').classList.remove('open');eid=null}
function ovClick(ev){if(ev.target===document.getElementById('ov'))closeModal()}
function pc(el){sCl=el.dataset.c;document.querySelectorAll('.cs').forEach(s=>s.classList.toggle('sel',s===el))}
function tRecur(){document.getElementById('rp').classList.toggle('show',document.getElementById('f-rec').checked)}

function saveEv(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){document.getElementById('f-title').focus();return}
  let time=document.getElementById('f-time').value,endtime=document.getElementById('f-end').value;
  if(document.getElementById('f-speedy').checked&&time&&endtime){
    const[sh,sm]=time.split(':').map(Number),[eh,em]=endtime.split(':').map(Number);
    const dur=(eh*60+em)-(sh*60+sm),trim=Math.max(15,dur-10),ne=sh*60+sm+trim;
    endtime=`${p(Math.floor(ne/60))}:${p(ne%60)}`;
  }
  const ev={id:eid||nid++,title,color:sCl,date:document.getElementById('f-date').value,time,endtime,
    desc:document.getElementById('f-desc').value.trim(),type:document.getElementById('f-type').value,
    location:document.getElementById('f-loc').value.trim(),recurring:document.getElementById('f-rec').checked,
    speedy:document.getElementById('f-speedy').checked,private:document.getElementById('f-priv').checked};
  if(eid){const i=events.findIndex(x=>x.id===eid);if(i>-1)events[i]=ev}else events.push(ev);
  save();closeModal();render();rMini();
  toast(eid?'Event updated':'Event created','ok');
}
function delEv(){
  if(!eid)return;
  events=events.filter(e=>e.id!==eid);
  save();closeModal();render();rMini();toast('Event deleted','ok');
}

/* ─ SEARCH ─ */
let sTimer;
function doSearch(q){
  clearTimeout(sTimer);
  sTimer=setTimeout(()=>{
    if(!q){sv(view);return}
    const lq=q.toLowerCase();
    const res=events.filter(e=>e.title.toLowerCase().includes(lq)||(e.desc&&e.desc.toLowerCase().includes(lq))||(e.location&&e.location.toLowerCase().includes(lq)));
    document.querySelectorAll('.vbtn').forEach(b=>b.classList.remove('on'));
    ['month','week','day','schedule'].forEach(n=>document.getElementById('v-'+n).setAttribute('hidden',''));
    document.getElementById('v-schedule').removeAttribute('hidden');
    const wrap=document.getElementById('scw');
    if(!res.length){wrap.innerHTML=`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-title">No results for "${q}"</div><div class="empty-sub">Try a different keyword</div></div>`;return}
    let html=`<div style="padding:12px 4px 8px;font-size:11px;color:var(--ink3)">${res.length} result${res.length!==1?'s':''} for <strong style="color:var(--ink2)">"${q}"</strong></div>`;
    res.forEach(e=>{
      html+=`<div class="se" onclick="editEv(${e.id})">
        <div class="se-bar" style="background:${CLR[e.color]||CLR.blue}"></div>
        <div class="se-info"><div class="se-title">${e.title}</div><div class="se-meta"><span>${e.date}</span>${e.location?`<span>📍 ${e.location}</span>`:''}</div></div>
        <div class="se-r">${e.time?`<div class="se-time">${fmt(e.time)}</div>`:''}<div class="stag ${e.color}">${e.type||'event'}</div></div>
      </div>`;
    });
    wrap.innerHTML=html;
  },200);
}

/* ─ TOAST ─ */
let tTimer;
function toast(msg,type='ok'){
  clearTimeout(tTimer);
  const t=document.getElementById('toast');
  document.getElementById('toast-text').textContent=msg;
  t.className=`toast ${type} show`;
  tTimer=setTimeout(()=>t.classList.remove('show'),2800);
}

/* ─ AUTH ─ */
function avatarClick(){const u=localStorage.getItem('vcloud_user');if(u)logout();else window.location.href='login.html'}
function logout(){localStorage.removeItem('vcloud_user');localStorage.removeItem('vcloud_username');uAuthUI();toast('Signed out','ok')}
function uAuthUI(){
  const u=localStorage.getItem('vcloud_user'),nm=localStorage.getItem('vcloud_username')||'S';
  const lb=document.getElementById('lbtn'),av=document.getElementById('avatar');
  if(u){lb.style.display='none';av.textContent=nm.charAt(0).toUpperCase();av.title=`Signed in as ${nm}`}
  else{lb.style.display='flex';av.textContent='?';av.title='Not signed in'}
}
function toggleSb(){document.getElementById('sb').classList.toggle('open')}

/* ─ KEYS ─ */
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  const inp=tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT';
  if(e.key==='Escape'){closeModal();document.getElementById('sinp').value=''}
  if(!inp&&e.key==='n')openModal();
  if(!inp&&e.key==='ArrowLeft')prev();
  if(!inp&&e.key==='ArrowRight')next();
  if(!inp&&e.key==='t')goToday();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();document.getElementById('sinp').focus()}
});

/* ─ INIT ─ */
window.addEventListener('DOMContentLoaded',()=>{
  load();uAuthUI();sv('month');rMini();
  if(window.innerWidth<=860)document.getElementById('hb').style.display='block';
  window.addEventListener('resize',()=>{document.getElementById('hb').style.display=window.innerWidth<=860?'block':'none'});
  if(events.some(e=>e.date===tk()))document.getElementById('ndot').style.display='block';
});
</script>
