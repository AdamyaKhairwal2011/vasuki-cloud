<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vibe — Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --white:#ffffff;
      --off:#f7f6f4;
      --bg:#eeece9;
      --ink:#0c0c0c;
      --ink2:#3a3a3a;
      --muted:#888;
      --border:#e0ddd9;
      --accent:#1a6bf5;
      --error:#d93025;
    }
    body{font-family:'Geist',sans-serif;background:var(--off);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased;}

    /* CARD */
    .card{
      width:100%;max-width:420px;
      background:var(--white);border:1px solid var(--border);
      border-radius:18px;padding:44px 40px;
      box-shadow:0 2px 32px rgba(0,0,0,.06);
      animation:fadeIn .45s ease both;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    .card-logo{
      font-family:'Instrument Serif',serif;font-size:20px;
      color:var(--ink);text-decoration:none;display:block;
      margin-bottom:32px;
    }

    /* TABS */
    .tabs{display:flex;gap:0;background:var(--off);border:1px solid var(--border);border-radius:9px;padding:3px;margin-bottom:32px;}
    .tab{
      flex:1;padding:9px 0;text-align:center;font-size:13px;font-weight:400;
      color:var(--muted);background:transparent;border:none;cursor:pointer;
      border-radius:7px;font-family:'Geist',sans-serif;transition:all .18s;
    }
    .tab.on{background:var(--white);color:var(--ink);font-weight:500;box-shadow:0 1px 6px rgba(0,0,0,.07);}

    .panel{display:none;}
    .panel.on{display:block;}

    .panel-title{font-family:'Instrument Serif',serif;font-size:26px;letter-spacing:-.4px;margin-bottom:6px;}
    .panel-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5;}

    /* SOCIAL BUTTONS */
    .social-row{display:flex;gap:10px;margin-bottom:22px;}
    .soc-btn{
      flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
      padding:10px 14px;border:1px solid var(--border);border-radius:9px;
      background:var(--white);font-size:13px;font-weight:400;color:var(--ink2);
      cursor:pointer;font-family:'Geist',sans-serif;transition:all .18s;
    }
    .soc-btn:hover{border-color:#bbb;background:var(--off);}
    .soc-btn svg{width:16px;height:16px;flex-shrink:0;}

    .divider{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
    .divider span{font-size:12px;color:var(--muted);white-space:nowrap;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

    /* FORM */
    .field{margin-bottom:16px;}
    label{display:block;font-size:12.5px;font-weight:500;color:var(--ink2);margin-bottom:6px;}
    .input-wrap{position:relative;}
    input[type=text],input[type=email],input[type=password]{
      width:100%;padding:11px 14px;
      border:1px solid var(--border);border-radius:9px;
      background:var(--white);color:var(--ink);
      font-family:'Geist',sans-serif;font-size:14px;outline:none;
      transition:border-color .18s,box-shadow .18s;
    }
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,107,245,.1);}
    input::placeholder{color:#bbb;}
    input.err{border-color:var(--error);}

    .pw-toggle{
      position:absolute;right:13px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;padding:2px;
      color:var(--muted);transition:color .18s;
    }
    .pw-toggle:hover{color:var(--ink);}
    .pw-toggle svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

    .row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
    .check-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink2);cursor:pointer;}
    input[type=checkbox]{width:15px;height:15px;accent-color:var(--ink);cursor:pointer;}
    .link-sm{font-size:13px;color:var(--accent);text-decoration:none;transition:opacity .18s;}
    .link-sm:hover{opacity:.7;}

    /* STRENGTH */
    .strength{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden;display:none;}
    .strength-fill{height:100%;border-radius:2px;width:0;transition:width .3s,background .3s;}

    /* ERROR BANNER */
    .error-banner{
      display:none;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;
      padding:10px 14px;font-size:13px;color:var(--error);margin-bottom:18px;
    }

    /* SUBMIT */
    .submit{
      width:100%;padding:12px;border-radius:9px;
      background:var(--ink);color:#fff;
      font-family:'Geist',sans-serif;font-size:14px;font-weight:500;
      border:none;cursor:pointer;transition:all .18s;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .submit:hover{background:#1a1a1a;box-shadow:0 4px 18px rgba(0,0,0,.14);}
    .submit:disabled{opacity:.6;cursor:not-allowed;}

    .switch-text{text-align:center;margin-top:20px;font-size:13px;color:var(--muted);}
    .switch-text a{color:var(--ink);font-weight:500;text-decoration:none;}
    .switch-text a:hover{text-decoration:underline;}

    .terms{text-align:center;margin-top:16px;font-size:12px;color:var(--muted);line-height:1.6;}
    .terms a{color:var(--muted);text-decoration:underline;}

    /* BACK LINK */
    .back{
      display:block;text-align:center;margin-top:28px;
      font-size:13px;color:var(--muted);text-decoration:none;transition:color .18s;
    }
    .back:hover{color:var(--ink);}

    @media(max-width:480px){
      body{align-items:flex-start;background:var(--white);}
      .card{border:none;border-radius:0;padding:32px 20px;box-shadow:none;max-width:100%;}
    }
  </style>
</head>
<body>

<div class="card">
  <a class="card-logo" href="index.html">Vibe</a>

  <div class="tabs">
    <button class="tab on" id="tab-login" onclick="switchTab('login')">Sign in</button>
    <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create account</button>
  </div>

  <!-- LOGIN -->
  <div class="panel on" id="panel-login">
    <div class="panel-title">Welcome back</div>
    <div class="panel-sub">Sign in to your account to continue.</div>

    <div class="social-row">
      <button class="soc-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="divider"><span>or</span></div>

    <div class="error-banner" id="login-err">Incorrect email or password. Please try again.</div>

    <div class="field">
      <label for="l-email">Email address</label>
      <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="l-password">Password</label>
      <div class="input-wrap">
        <input type="password" id="l-password" placeholder="Enter your password" autocomplete="current-password"/>
        <button class="pw-toggle" onclick="togglePw('l-password',this)" tabindex="-1">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>
    <div class="row-between">
      <label class="check-label"><input type="checkbox" id="remember"/> Remember me</label>
      <a class="link-sm" href="#">Forgot password?</a>
    </div>
    <button class="submit" id="login-btn" onclick="handleLogin()">Sign in</button>
    <div class="switch-text">Don't have an account? <a href="#" onclick="switchTab('signup');return false;">Sign up</a></div>
  </div>

  <!-- SIGNUP -->
  <div class="panel" id="panel-signup">
    <div class="panel-title">Create account</div>
    <div class="panel-sub">Join Vibe — it's free.</div>

    <div class="social-row">
      <button class="soc-btn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <div class="divider"><span>or</span></div>

    <div class="field">
      <label for="s-name">Full name</label>
      <input type="text" id="s-name" placeholder="Your name" autocomplete="name"/>
    </div>
    <div class="field">
      <label for="s-email">Email address</label>
      <input type="email" id="s-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="s-password">Password</label>
      <div class="input-wrap">
        <input type="password" id="s-password" placeholder="Create a password (min. 8 chars)" autocomplete="new-password" oninput="checkStrength(this)"/>
        <button class="pw-toggle" onclick="togglePw('s-password',this)" tabindex="-1">
          <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength" id="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
    </div>
    <button class="submit" id="signup-btn" onclick="handleSignup()" style="margin-top:6px;">Create account</button>
    <div class="terms">By signing up you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</div>
    <div class="switch-text">Already have an account? <a href="#" onclick="switchTab('login');return false;">Sign in</a></div>
  </div>

  <a class="back" href="index.html">← Back to Vibe</a>
</div>

<script>
  function switchTab(t) {
    ['login','signup'].forEach(id => {
      document.getElementById('panel-'+id).classList.toggle('on', id===t);
      document.getElementById('tab-'+id).classList.toggle('on', id===t);
    });
  }

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    const isText = el.type === 'text';
    el.type = isText ? 'password' : 'text';
    btn.querySelector('circle') && (btn.querySelector('circle').style.opacity = isText ? '1' : '0.3');
  }

  function checkStrength(input) {
    const bar = document.getElementById('strength-bar');
    const fill = document.getElementById('strength-fill');
    bar.style.display = 'block';
    const v = input.value;
    let s = 0;
    if (v.length >= 8) s++;
    if (/[A-Z]/.test(v)) s++;
    if (/[0-9]/.test(v)) s++;
    if (/[^A-Za-z0-9]/.test(v)) s++;
    const w = ['0%','30%','55%','75%','100%'];
    const c = ['transparent','#d93025','#f59e0b','#84cc16','#22c55e'];
    fill.style.width = w[s];
    fill.style.background = c[s];
  }

  function handleLogin() {
    const email = document.getElementById('l-email').value.trim();
    const pass = document.getElementById('l-password').value;
    const errEl = document.getElementById('login-err');
    const btn = document.getElementById('login-btn');
    errEl.style.display = 'none';

    if (!email || !pass) {
      if (!email) document.getElementById('l-email').classList.add('err');
      if (!pass) document.getElementById('l-password').classList.add('err');
      errEl.style.display = 'block';
      errEl.textContent = 'Please fill in all fields.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';

    // Replace with your auth API call
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1000);
  }

  function handleSignup() {
    const name = document.getElementById('s-name').value.trim();
    const email = document.getElementById('s-email').value.trim();
    const pass = document.getElementById('s-password').value;
    const btn = document.getElementById('signup-btn');

    if (!name || !email || pass.length < 8) {
      if (!name) document.getElementById('s-name').classList.add('err');
      if (!email) document.getElementById('s-email').classList.add('err');
      if (pass.length < 8) document.getElementById('s-password').classList.add('err');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account…';

    // Replace with your registration API call
    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1000);
  }

  // Remove error state on input
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('input', () => el.classList.remove('err'));
  });
</script>
</body>
</html>
