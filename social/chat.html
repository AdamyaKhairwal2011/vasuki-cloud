<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vibe — Messages</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --white:#ffffff;
  --off:#f8f7f5;
  --bg:#f1efec;
  --ink:#0a0a0a;
  --ink2:#2d2d2d;
  --muted:#8a8a8a;
  --border:#e6e3de;
  --border-strong:#d0ccc6;
  --accent:#0a0a0a;
  --accent-soft:rgba(10,10,10,.06);
  --sidebar:248px;
  --conv-col:296px;
  --danger:#c62828;
  --green:#16a34a;
  --bubble-me:#0a0a0a;
  --bubble-them:#ffffff;
  --ease:cubic-bezier(0.22,1,0.36,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}

html,body{height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);display:flex}

/* ── TOPBAR LOADER ── */
#loader{position:fixed;top:0;left:0;right:0;height:2px;z-index:9999;pointer-events:none}
#loader-bar{height:100%;width:0;background:var(--ink);transition:width .5s var(--ease),opacity .3s ease;border-radius:0 1px 1px 0}
#loader.on #loader-bar{width:75%}
#loader.done #loader-bar{width:100%;opacity:0;transition:width .25s var(--ease),opacity .4s ease .1s}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:var(--white);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;
  position:relative;z-index:10
}
.sb-head{padding:22px 18px 16px;border-bottom:1px solid var(--border)}
.sb-logo{
  font-family:'Instrument Serif',serif;font-size:24px;
  color:var(--ink);display:block;margin-bottom:18px;
  text-decoration:none;letter-spacing:-.3px
}
.sb-compose{
  width:100%;padding:10px 14px;
  background:var(--ink);color:#fff;
  border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;
  transition:background .2s var(--ease),transform .15s var(--ease-spring)
}
.sb-compose:hover{background:#222}
.sb-compose:active{transform:scale(.97)}
.sb-compose svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round}

.sb-nav{padding:12px 10px;flex:1;overflow-y:auto}
.sb-nav::-webkit-scrollbar{width:0}
.sb-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:0 8px;margin:14px 0 5px}
.sb-label:first-child{margin-top:0}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:9px;
  font-size:13.5px;color:var(--ink2);
  cursor:pointer;transition:background .15s,color .15s;
  text-decoration:none;margin-bottom:1px;
  font-weight:400
}
.nav-item:hover{background:var(--off);color:var(--ink)}
.nav-item.active{background:var(--ink);color:#fff}
.nav-item.active svg{stroke:#fff}
.nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nav-label{font-size:13.5px}

.sb-foot{border-top:1px solid var(--border);padding:12px 10px}
.sb-profile{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:10px;
  cursor:pointer;transition:background .15s;margin-bottom:6px
}
.sb-profile:hover{background:var(--off)}
.sb-av{
  width:34px;height:34px;border-radius:50%;
  background:var(--ink);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:.5px
}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-handle{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logout-btn{
  width:100%;padding:8px 10px;
  border:1px solid var(--border);border-radius:9px;
  background:transparent;font-family:'DM Sans',sans-serif;
  font-size:12.5px;color:var(--muted);cursor:pointer;
  transition:all .18s;text-align:left;
  display:flex;align-items:center;gap:8px
}
.logout-btn:hover{background:#fef2f2;color:var(--danger);border-color:#fecaca}
.logout-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}

/* ── MAIN ── */
.main{flex:1;display:flex;height:100vh;overflow:hidden;min-width:0}

/* ── CONVERSATIONS COLUMN ── */
.conv-col{
  width:var(--conv-col);flex-shrink:0;
  display:flex;flex-direction:column;
  border-right:1px solid var(--border);
  background:var(--white);overflow:hidden
}
.conv-head{
  padding:0 16px;height:54px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0
}
.conv-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);letter-spacing:-.2px}
.icon-btn{
  width:32px;height:32px;border-radius:8px;
  border:1px solid var(--border);background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .15s var(--ease-spring)
}
.icon-btn:hover{background:var(--off)}
.icon-btn:active{transform:scale(.9)}
.icon-btn svg{width:14px;height:14px;stroke:var(--ink2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

.conv-search{padding:10px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-wrap{
  display:flex;align-items:center;gap:8px;
  background:var(--off);border:1px solid var(--border);
  border-radius:9px;padding:7px 12px;
  transition:border-color .18s
}
.search-wrap:focus-within{border-color:var(--border-strong)}
.search-wrap svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;flex-shrink:0}
.search-wrap input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);flex:1}
.search-wrap input::placeholder{color:var(--muted)}

.conv-list{flex:1;overflow-y:auto}
.conv-list::-webkit-scrollbar{width:3px}
.conv-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.conv-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  transition:background .12s;
  border-bottom:1px solid var(--border);
  position:relative;user-select:none
}
.conv-item:hover{background:var(--off)}
.conv-item.active{background:var(--accent-soft)}
.conv-item.active::before{
  content:'';position:absolute;
  left:0;top:0;bottom:0;width:2.5px;
  background:var(--ink);border-radius:0 2px 2px 0
}
.conv-av{
  width:40px;height:40px;border-radius:50%;
  flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:13px;font-weight:600;
  letter-spacing:.3px
}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:13.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-preview{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.conv-time{font-size:11px;color:var(--muted)}
.conv-unread{
  width:18px;height:18px;background:var(--ink);
  border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:10px;font-weight:600;color:#fff
}

.conv-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:48px 20px;text-align:center;flex:1
}
.conv-empty svg{width:28px;height:28px;stroke:var(--muted);fill:none;stroke-width:1.4;stroke-linecap:round;margin-bottom:10px;opacity:.6}
.conv-empty p{font-size:13px;color:var(--muted);line-height:1.7}

/* ── CHAT COLUMN ── */
.chat-col{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);min-width:0}

.chat-head{
  padding:0 20px;height:54px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
  background:rgba(255,255,255,.88);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  flex-shrink:0
}
.chat-head-av{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;flex-shrink:0;letter-spacing:.3px
}
.chat-head-info{flex:1;min-width:0}
.chat-head-name{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-.2px}
.chat-head-status{font-size:11.5px;color:var(--muted)}
.chat-head-actions{display:flex;gap:6px}

/* ── MESSAGES ── */
.chat-msgs{
  flex:1;overflow-y:auto;
  padding:20px 20px 12px;
  display:flex;flex-direction:column;gap:2px;
  scroll-behavior:smooth
}
.chat-msgs::-webkit-scrollbar{width:4px}
.chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

.msg-date{text-align:center;margin:14px 0 6px;position:relative}
.msg-date span{
  font-size:11px;color:var(--muted);
  background:var(--bg);padding:0 14px;
  position:relative;z-index:1
}
.msg-date::before{
  content:'';position:absolute;
  left:0;right:0;top:50%;height:1px;
  background:var(--border)
}

.msg-row{
  display:flex;align-items:flex-end;gap:8px;
  animation:msgIn .22s cubic-bezier(0.22,1,0.36,1) both
}
@keyframes msgIn{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.msg-row.me{flex-direction:row-reverse}

.msg-av-wrap{width:28px;height:28px;flex-shrink:0}
.msg-av{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:600;letter-spacing:.3px
}
.msg-av.hidden{visibility:hidden}

.msg-bubble{
  max-width:68%;padding:9px 13px;
  border-radius:18px;font-size:13.5px;
  line-height:1.55;word-break:break-word;
  position:relative
}
.msg-bubble.them{
  background:var(--bubble-them);
  border:1px solid var(--border);
  color:var(--ink2);border-bottom-left-radius:5px
}
.msg-bubble.me{
  background:var(--bubble-me);color:#fff;
  border-bottom-right-radius:5px
}
.msg-ts{
  font-size:10.5px;color:var(--muted);
  padding:0 4px;margin-top:3px;flex-shrink:0;
  align-self:flex-end
}
.msg-row.me .msg-ts{text-align:right}

.msg-img{
  max-width:240px;border-radius:10px;
  border:1px solid rgba(0,0,0,.08);
  display:block;margin-top:6px;
  cursor:pointer;transition:opacity .15s
}
.msg-img:hover{opacity:.9}

/* typing */
.typing-row{display:flex;align-items:center;gap:8px;padding:4px 0}
.typing-dots{
  background:var(--bubble-them);border:1px solid var(--border);
  border-radius:14px;padding:10px 14px;
  display:flex;gap:3px;align-items:center
}
.typing-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--muted);
  animation:tdot 1.2s ease infinite
}
.typing-dot:nth-child(2){animation-delay:.18s}
.typing-dot:nth-child(3){animation-delay:.36s}
@keyframes tdot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* ── INPUT AREA ── */
.chat-input{
  border-top:1px solid var(--border);
  background:var(--white);padding:12px 16px;flex-shrink:0
}
.img-preview-wrap{margin-bottom:8px;display:none}
.img-preview-wrap.show{display:block}
.img-preview-inner{position:relative;display:inline-block}
.img-preview-inner img{
  max-height:72px;border-radius:8px;
  border:1px solid var(--border);display:block
}
.img-remove{
  position:absolute;top:3px;right:3px;
  width:18px;height:18px;
  background:rgba(0,0,0,.6);border:none;
  border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center
}
.img-remove svg{width:9px;height:9px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round}

.input-row{display:flex;align-items:flex-end;gap:8px}
.input-wrap{
  flex:1;display:flex;align-items:flex-end;
  background:var(--off);border:1.5px solid var(--border);
  border-radius:14px;padding:0 6px 0 14px;
  transition:border-color .2s cubic-bezier(0.22,1,0.36,1)
}
.input-wrap:focus-within{border-color:var(--border-strong)}
.chat-ta{
  flex:1;border:none;outline:none;background:transparent;
  font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);
  resize:none;line-height:1.55;padding:11px 0;
  min-height:42px;max-height:120px
}
.chat-ta::placeholder{color:var(--muted)}
.input-tools{display:flex;align-items:center;gap:2px;padding:5px}
.tool-btn{
  width:30px;height:30px;border-radius:7px;border:none;
  background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,transform .15s var(--ease-spring)
}
.tool-btn:hover{background:var(--border)}
.tool-btn:active{transform:scale(.88)}
.tool-btn svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

.send-btn{
  width:40px;height:40px;border-radius:11px;
  background:var(--ink);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .18s,transform .18s var(--ease-spring),opacity .18s;
  flex-shrink:0
}
.send-btn:hover{background:#222;transform:scale(1.05)}
.send-btn:active{transform:scale(.94)}
.send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.send-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── EMPTY STATE ── */
.chat-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding:40px
}
.chat-empty-icon{
  width:64px;height:64px;border-radius:18px;
  background:var(--white);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;margin-bottom:20px
}
.chat-empty-icon svg{width:26px;height:26px;stroke:var(--muted);fill:none;stroke-width:1.4;stroke-linecap:round}
.chat-empty h2{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);margin-bottom:8px;letter-spacing:-.3px}
.chat-empty p{font-size:13px;color:var(--muted);line-height:1.75;max-width:260px}
.chat-empty-cta{
  margin-top:18px;padding:10px 22px;
  background:var(--ink);color:#fff;border:none;
  border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;transition:background .18s,transform .18s var(--ease-spring)
}
.chat-empty-cta:hover{background:#222;transform:translateY(-1px)}
.chat-empty-cta:active{transform:translateY(0) scale(.97)}

/* ── MODAL ── */
.modal-bg{
  position:fixed;inset:0;
  background:rgba(0,0,0,.3);
  backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);
  z-index:200;display:flex;align-items:center;justify-content:center;
  animation:fadein .18s ease
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--white);border:1px solid var(--border);
  border-radius:18px;padding:24px;
  min-width:320px;max-width:420px;width:90%;
  box-shadow:0 24px 80px rgba(0,0,0,.16);
  animation:slideup .22s cubic-bezier(0.22,1,0.36,1);
  position:relative
}
@keyframes slideup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.modal-close-btn{
  position:absolute;top:14px;right:14px;
  width:28px;height:28px;border-radius:7px;
  border:none;background:var(--off);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .15s var(--ease-spring)
}
.modal-close-btn:hover{background:var(--border)}
.modal-close-btn:active{transform:scale(.88)}
.modal-close-btn svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2.2;stroke-linecap:round}
.modal-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);margin-bottom:14px;letter-spacing:-.2px}
.modal-search{
  display:flex;align-items:center;gap:8px;
  background:var(--off);border:1.5px solid var(--border);
  border-radius:10px;padding:9px 12px;margin-bottom:12px;
  transition:border-color .18s
}
.modal-search:focus-within{border-color:var(--border-strong)}
.modal-search svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;flex-shrink:0}
.modal-search input{border:none;outline:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);flex:1}
.modal-search input::placeholder{color:var(--muted)}

.user-list{max-height:260px;overflow-y:auto}
.user-list::-webkit-scrollbar{width:3px}
.user-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.user-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;border-radius:10px;
  cursor:pointer;transition:background .12s
}
.user-item:hover{background:var(--off)}
.user-av{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:.3px
}
.user-name{font-size:13px;font-weight:500;color:var(--ink)}
.user-handle{font-size:11.5px;color:var(--muted)}
.user-list-empty{padding:20px;text-align:center;font-size:13px;color:var(--muted)}

/* ── EMOJI PICKER ── */
.emoji-picker{
  position:fixed;background:var(--white);
  border:1px solid var(--border);border-radius:14px;
  padding:10px;display:flex;flex-wrap:wrap;gap:2px;
  width:212px;box-shadow:0 8px 32px rgba(0,0,0,.12);
  z-index:300;animation:fadein .14s ease
}
.emoji-btn{
  width:30px;height:30px;border:none;background:transparent;
  cursor:pointer;border-radius:7px;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  transition:background .1s
}
.emoji-btn:hover{background:var(--off)}

/* ── SKELETON ── */
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}
.sk-item{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:center}
.sk-av{width:40px;height:40px;border-radius:50%;background:var(--bg);flex-shrink:0;animation:shimmer 1.4s ease infinite}
.sk-lines{flex:1}
.sk-line{height:8px;background:var(--bg);border-radius:4px;margin-bottom:6px;animation:shimmer 1.4s ease infinite}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;
  font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;
  padding:10px 22px;border-radius:10px;
  opacity:0;pointer-events:none;
  transition:all .25s cubic-bezier(0.22,1,0.36,1);
  z-index:999;white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.2)
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:860px){.conv-col{width:240px}}
@media(max-width:640px){
  .sidebar{width:58px}
  .sb-logo,.sb-label,.nav-label,.sb-info,.sb-compose span,.logout-btn span{display:none}
  .sb-compose{padding:10px;justify-content:center}
  .nav-item{justify-content:center;padding:10px}
  .sb-profile{justify-content:center;padding:8px}
  .logout-btn{justify-content:center}
}
@media(max-width:480px){.conv-col{display:none}}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader"><div id="loader-bar"></div></div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-head">
    <a class="sb-logo" href="index.html">Vibe</a>
    <button class="sb-compose" onclick="openModal()">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      <span>New Chat</span>
    </button>
  </div>
  <nav class="sb-nav">

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG — match your Vasuki credentials exactly
// ═══════════════════════════════════════════════════════════
const API   = "https://adamyakhairwal2011-vasuki-cloud.hf.space";
const ADMIN = "codeclutch.adamyarao@gmail.com";
const PASS  = "wkmeupb4ugo";

// ═══════════════════════════════════════════════════════════
//  MINIMAL VASUKI CLIENT (no external dep, uses your pattern)
// ═══════════════════════════════════════════════════════════
const sdk = {
  userEmail: null,
  async _post(endpoint, body) {
    const r = await fetch(API + endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return r.json();
  },
  async login(email, pw) {
    const data = await this._post("/get-file-content", { email: ADMIN, path: "users_rows.json" });
    const db   = JSON.parse(data.content);
    const users = db.Sheet1 || [];
    const u = users.find(x => x.username === email && x.password === pw);
    if (!u) throw new Error("Invalid credentials");
    this.userEmail = email;
    return u;
  },
  async getDB(name) {
    const path = name.endsWith(".json") ? name : name + ".json";
    const r = await this._post("/get-file-content", { email: this.userEmail, path });
    return JSON.parse(r.content);
  },
  async saveDB(name, data) {
    const path = name.endsWith(".json") ? name : name + ".json";
    return this._post("/save-file-content", { email: this.userEmail, path, content: JSON.stringify(data, null, 2) });
  },
  // Get a table from a DB file
  async fetchTable(db, table) {
    const d = await this.getDB(db);
    return d[table] || [];
  },
  // Insert a row into a table — FIX: this was the core missing method
  async insertRow(db, table, row) {
    const d = await this.getDB(db);
    if (!d[table]) d[table] = [];
    d[table].push(row);
    await this.saveDB(db, d);
  }
};

// ═══════════════════════════════════════════════════════════
//  SESSION
// ═══════════════════════════════════════════════════════════
const ME_EMAIL    = localStorage.getItem("vibe_user")     || "";
const ME_NAME     = localStorage.getItem("vibe_name")     || "User";
const ME_HANDLE   = localStorage.getItem("vibe_handle")   || "";
const ME_INITIALS = localStorage.getItem("vibe_initials") || "?";

if (!ME_EMAIL) window.location.href = "login.html";

document.getElementById("sb-av").textContent     = ME_INITIALS;
document.getElementById("sb-name").textContent   = ME_NAME;
document.getElementById("sb-handle").textContent = ME_HANDLE ? "@" + ME_HANDLE : ME_EMAIL;

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let allUsers     = [];   // all users from users_rows.Sheet1
let allConvs     = [];   // derived conversation objects
let activeConvId = null;
let pendingImg   = "";
let pollTimer    = null;
let lastMsgCount = 0;    // for flicker-free polling

// ═══════════════════════════════════════════════════════════
//  LOADER
// ═══════════════════════════════════════════════════════════
function loaderOn()  { document.getElementById("loader").className = "on"; }
function loaderDone(){ const l = document.getElementById("loader"); l.className = "done"; setTimeout(()=>l.className="",700); }

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
(async function init() {
  loaderOn();
  try {
    await sdk.login(ADMIN, "wkmeupb4ugo");  // re-auth with stored email
  } catch(e) {
    // If stored email differs from admin, still set userEmail so _post works
    sdk.userEmail = ME_EMAIL;
  }

  await loadUsers();
  await loadConversations();
  loaderDone();

  // URL param: ?with=handle
  const p = new URLSearchParams(location.search);
  const withHandle = p.get("with");
  if (withHandle) {
    const u = allUsers.find(x => (x.handle||"").toLowerCase() === withHandle.toLowerCase());
    if (u) startConversation(u.handle, u.name || u.handle, u.email || "");
  }
})();

// ═══════════════════════════════════════════════════════════
//  LOAD USERS
// ═══════════════════════════════════════════════════════════
async function loadUsers() {
  try {
    allUsers = await sdk.fetchTable("users_rows", "Sheet1");
  } catch(e) { console.warn("loadUsers:", e); }
}

// ═══════════════════════════════════════════════════════════
//  LOAD CONVERSATIONS (derived from vibe_messages)
// ═══════════════════════════════════════════════════════════
async function loadConversations(silent = false) {
  const listEl = document.getElementById("conv-list");
  try {
    let msgs = [];
    try { msgs = await sdk.fetchTable("vibe_messages", "Sheet1"); } catch(_) {}
    if (!Array.isArray(msgs)) msgs = [];

    // Build conv map — filter to only messages where I'm sender or recipient
    const convMap = {};
    msgs.forEach(m => {
      if (!m || !m.conv_id) return;
      const isSender    = norm(m.sender_email)    === norm(ME_EMAIL) || norm(m.sender_handle)    === norm(ME_HANDLE);
      const isRecipient = norm(m.recipient_email) === norm(ME_EMAIL) || norm(m.recipient_handle) === norm(ME_HANDLE);
      if (!isSender && !isRecipient) return;

      if (!convMap[m.conv_id]) {
        convMap[m.conv_id] = { conv_id: m.conv_id, msgs: [], other: null };
        // Determine the "other" party
        if (isSender) {
          convMap[m.conv_id].other = {
            name:     m.recipient_name || m.recipient_handle || "Unknown",
            handle:   m.recipient_handle || "",
            email:    m.recipient_email  || "",
            initials: m.recipient_initials || getInitials(m.recipient_name || m.recipient_handle || "?")
          };
        } else {
          convMap[m.conv_id].other = {
            name:     m.sender_name || m.sender_handle || "Unknown",
            handle:   m.sender_handle || "",
            email:    m.sender_email  || "",
            initials: m.sender_initials || getInitials(m.sender_name || m.sender_handle || "?")
          };
        }
      }
      convMap[m.conv_id].msgs.push(m);
    });

    allConvs = Object.values(convMap).map(c => {
      const sorted = c.msgs.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
      return { conv_id: c.conv_id, other: c.other, msgs: sorted, last: sorted[sorted.length-1] };
    }).sort((a,b) => new Date(b.last?.created_at||0) - new Date(a.last?.created_at||0));

    renderConvList(allConvs);
  } catch(e) {
    if (!silent) {
      listEl.innerHTML = `<div class="conv-empty"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg><p>Could not load conversations.</p></div>`;
    }
  }
}

function renderConvList(convs) {
  const listEl = document.getElementById("conv-list");
  const q = document.getElementById("conv-search").value.toLowerCase();

  const filtered = q
    ? convs.filter(c => c.other.name.toLowerCase().includes(q) || c.other.handle.toLowerCase().includes(q))
    : convs;

  if (!filtered.length) {
    listEl.innerHTML = `<div class="conv-empty"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><p>No conversations yet.<br>Start one!</p></div>`;
    return;
  }

  listEl.innerHTML = filtered.map(c => {
    const pal  = palette(c.other.handle || c.other.name || "");
    const init = esc(c.other.initials || getInitials(c.other.name || "?"));
    const last = c.last;
    const preview = last
      ? (last.image_url ? "Image" : (last.body || "").slice(0,52) + ((last.body||"").length>52?"…":""))
      : "Start a conversation";
    const isActive = c.conv_id === activeConvId;
    // IMPORTANT: encode conv_id as data attribute to avoid quoting bugs
    return `<div class="conv-item${isActive?" active":""}" data-cid="${esc(c.conv_id)}" onclick="selectConv(this.dataset.cid)">
      <div class="conv-av" style="background:${pal.bg};color:${pal.fg}">${init}</div>
      <div class="conv-info">
        <div class="conv-name">${esc(c.other.name)}</div>
        <div class="conv-preview">${esc(preview)}</div>
      </div>
      <div class="conv-meta">
        <div class="conv-time">${last ? timeAgo(last.created_at) : ""}</div>
      </div>
    </div>`;
  }).join("");
}

function filterConvs(q) {
  renderConvList(allConvs);
}

// ═══════════════════════════════════════════════════════════
//  SELECT CONVERSATION
// ═══════════════════════════════════════════════════════════
function selectConv(convId) {
  if (activeConvId === convId) return;
  activeConvId = convId;

  // Stop existing poll
  clearInterval(pollTimer);
  lastMsgCount = 0;

  const conv = allConvs.find(c => c.conv_id === convId);
  if (!conv) return;

  // Update sidebar active state
  document.querySelectorAll(".conv-item").forEach(el =>
    el.classList.toggle("active", el.dataset.cid === convId)
  );

  // Populate header
  const pal  = palette(conv.other.handle || conv.other.name || "");
  const init = getInitials(conv.other.name || "?");
  const chAv = document.getElementById("ch-av");
  chAv.style.background = pal.bg;
  chAv.style.color       = pal.fg;
  chAv.textContent       = init;
  document.getElementById("ch-name").textContent   = conv.other.name;
  document.getElementById("ch-status").textContent = conv.other.handle ? "@" + conv.other.handle : conv.other.email;

  // Show chat pane
  document.getElementById("chat-empty").style.display = "none";
  const pane = document.getElementById("chat-pane");
  pane.style.display = "flex";

  // Render existing messages immediately (no flicker)
  renderMessages(conv.msgs);

  // Then poll for new ones
  pollTimer = setInterval(() => refreshMessages(true), 4000);

  document.getElementById("chat-ta").focus();
}

// ═══════════════════════════════════════════════════════════
//  RENDER MESSAGES (smart — only appends new ones)
// ═══════════════════════════════════════════════════════════
function renderMessages(msgs) {
  const el = document.getElementById("chat-msgs");
  const wasAtBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 100;

  el.innerHTML = "";
  lastMsgCount = msgs.length;

  if (!msgs.length) {
    el.innerHTML = `<div style="flex:1;display:flex;align-items:center;justify-content:center"><p style="font-size:13px;color:var(--muted)">Say hello!</p></div>`;
    return;
  }

  let lastDateStr = null;
  const meEmail  = norm(ME_EMAIL);
  const meHandle = norm(ME_HANDLE);

  msgs.forEach((m, i) => {
    const dateStr = new Date(m.created_at).toDateString();
    if (dateStr !== lastDateStr) {
      lastDateStr = dateStr;
      const div = document.createElement("div");
      div.className = "msg-date";
      div.innerHTML = `<span>${formatDate(m.created_at)}</span>`;
      el.appendChild(div);
    }

    const isMe = norm(m.sender_email) === meEmail || norm(m.sender_handle) === meHandle;
    const next = msgs[i+1];
    // Hide avatar if same sender sent the next message within 2 min
    const hideAv = next
      && norm(next.sender_email) === norm(m.sender_email)
      && new Date(next.created_at) - new Date(m.created_at) < 120000;

    const row = document.createElement("div");
    row.className = `msg-row${isMe?" me":""}`;

    const pal  = isMe ? { bg:"var(--bubble-me)", fg:"#fff" } : palette(m.sender_handle || m.sender_name || "");
    const init = isMe ? ME_INITIALS : getInitials(m.sender_name || m.sender_handle || "?");

    const imgHtml = m.image_url
      ? `<img class="msg-img" src="${esc(m.image_url)}" loading="lazy"
           onerror="this.style.display='none'"
           onclick="window.open('${esc(m.image_url)}','_blank')" alt=""/>`
      : "";

    const showTs = !next
      || norm(next.sender_email) !== norm(m.sender_email)
      || new Date(next.created_at) - new Date(m.created_at) > 120000;

    row.innerHTML = `
      <div class="msg-av-wrap">
        <div class="msg-av${hideAv?" hidden":""}" style="background:${pal.bg};color:${pal.fg}">${esc(init)}</div>
      </div>
      <div style="display:flex;flex-direction:column;${isMe?"align-items:flex-end":""}">
        <div class="msg-bubble ${isMe?"me":"them"}">${m.body ? esc(m.body) : ""}${imgHtml}</div>
        ${showTs ? `<div class="msg-ts">${shortTime(m.created_at)}</div>` : ""}
      </div>`;
    el.appendChild(row);
  });

  if (wasAtBottom) {
    el.scrollTop = el.scrollHeight;
  }
}

async function refreshMessages(silent = false) {
  if (!activeConvId) return;
  try {
    const all  = await sdk.fetchTable("vibe_messages", "Sheet1");
    const msgs = (all || [])
      .filter(m => m && m.conv_id === activeConvId)
      .sort((a,b) => new Date(a.created_at) - new Date(b.created_at));

    // Only re-render if count changed (avoids flicker)
    if (msgs.length !== lastMsgCount) {
      renderMessages(msgs);
      // Also refresh conv list to update preview/time
      await loadConversations(true);
    }
  } catch(e) {
    if (!silent) console.error("refreshMessages:", e);
  }
}

// ═══════════════════════════════════════════════════════════
//  SEND MESSAGE — FIX: proper insertRow using getDB → push → saveDB
// ═══════════════════════════════════════════════════════════
async function sendMsg() {
  const ta   = document.getElementById("chat-ta");
  const body = ta.value.trim();
  if (!body && !pendingImg) return;
  if (!activeConvId) { toast("Select a conversation first"); return; }

  const conv = allConvs.find(c => c.conv_id === activeConvId);
  if (!conv) return;

  const btn = document.getElementById("send-btn");
  btn.disabled = true;

  const row = {
    conv_id:            activeConvId,
    sender_name:        ME_NAME,
    sender_handle:      ME_HANDLE,
    sender_initials:    ME_INITIALS,
    sender_email:       ME_EMAIL,
    recipient_name:     conv.other.name,
    recipient_handle:   conv.other.handle,
    recipient_initials: conv.other.initials,
    recipient_email:    conv.other.email,
    body:               body,
    image_url:          pendingImg || null,
    created_at:         new Date().toISOString()
  };

  // Optimistic: append immediately
  conv.msgs.push(row);
  renderMessages(conv.msgs);
  ta.value = ""; ta.style.height = "auto";
  clearImg();

  try {
    await sdk.insertRow("vibe_messages", "Sheet1", row);
    // Reload full list in background
    loadConversations(true);
  } catch(e) {
    toast("Send failed: " + e.message);
    // Roll back optimistic insert
    conv.msgs.pop();
    renderMessages(conv.msgs);
    ta.value = body;
  } finally {
    btn.disabled = false;
  }
}

// ═══════════════════════════════════════════════════════════
//  NEW CONVERSATION MODAL — FIX: multiple convs supported
//  conv_id = sorted handles joined by "__"
// ═══════════════════════════════════════════════════════════
function openModal() {
  const bg = document.createElement("div");
  bg.className = "modal-bg";
  bg.onclick = e => { if (e.target === bg) bg.remove(); };

  const myHandle = ME_HANDLE || ME_EMAIL;
  const otherUsers = allUsers.filter(u =>
    norm(u.email) !== norm(ME_EMAIL) && norm(u.handle) !== norm(myHandle)
  );

  bg.innerHTML = `
    <div class="modal">
      <button class="modal-close-btn" onclick="this.closest('.modal-bg').remove()">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-title">New Conversation</div>
      <div class="modal-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" placeholder="Search by name or handle…" id="modal-search-inp" oninput="modalSearch(this.value)" autocomplete="off"/>
      </div>
      <div class="user-list" id="modal-user-list">${renderUserItems(otherUsers)}</div>
    </div>`;

  document.body.appendChild(bg);
  setTimeout(() => bg.querySelector("#modal-search-inp")?.focus(), 80);
}

function modalSearch(q) {
  const lower = q.toLowerCase().trim();
  const myHandle = ME_HANDLE || ME_EMAIL;
  const results = allUsers.filter(u =>
    norm(u.email) !== norm(ME_EMAIL) && norm(u.handle) !== norm(myHandle) &&
    (!lower ||
      (u.name   || "").toLowerCase().includes(lower) ||
      (u.handle || "").toLowerCase().includes(lower) ||
      (u.email  || "").toLowerCase().includes(lower))
  );
  const el = document.getElementById("modal-user-list");
  if (el) el.innerHTML = renderUserItems(results);
}

function renderUserItems(users) {
  if (!users.length) return `<div class="user-list-empty">No users found</div>`;
  return users.slice(0,12).map(u => {
    const pal  = palette(u.handle || u.name || "");
    const init = getInitials(u.name || u.handle || "?");
    // Use data attributes — avoids ALL quoting/injection bugs
    return `<div class="user-item"
      data-handle="${esc(u.handle||"")}"
      data-name="${esc(u.name||u.handle||"")}"
      data-email="${esc(u.email||"")}"
      onclick="pickUser(this)">
      <div class="user-av" style="background:${pal.bg};color:${pal.fg}">${esc(init)}</div>
      <div>
        <div class="user-name">${esc(u.name||u.handle)}</div>
        <div class="user-handle">@${esc(u.handle)}</div>
      </div>
    </div>`;
  }).join("");
}

function pickUser(el) {
  const handle = el.dataset.handle;
  const name   = el.dataset.name;
  const email  = el.dataset.email;
  document.querySelector(".modal-bg")?.remove();
  startConversation(handle, name, email);
}

// ═══════════════════════════════════════════════════════════
//  START CONVERSATION — FIX: deterministic conv_id, handles
//  any number of conversations correctly
// ═══════════════════════════════════════════════════════════
function startConversation(handle, name, email) {
  const myId    = ME_HANDLE || ME_EMAIL;
  const theirId = handle || email;

  // Deterministic ID: always sort so A→B and B→A get same conv
  const convId = [norm(myId), norm(theirId)].sort().join("__");

  // If conversation already exists, just open it
  const existing = allConvs.find(c => c.conv_id === convId);
  if (existing) {
    selectConv(convId);
    return;
  }

  // Create locally so user can start typing immediately
  const otherUser = allUsers.find(u => norm(u.handle) === norm(handle) || norm(u.email) === norm(email)) || {};
  const newConv = {
    conv_id: convId,
    msgs: [],
    last: null,
    other: {
      name:     name || otherUser.name || handle || email,
      handle:   handle || otherUser.handle || "",
      email:    email  || otherUser.email  || "",
      initials: getInitials(name || handle || "?")
    }
  };
  allConvs.unshift(newConv);
  renderConvList(allConvs);

  // Now select it — it's in allConvs so selectConv works
  selectConv(convId);
  toast("Conversation started — say hello!");
}

// ═══════════════════════════════════════════════════════════
//  IMAGE URL ATTACHMENT
// ═══════════════════════════════════════════════════════════
function promptImg() {
  const url = prompt("Paste an image URL (e.g. from Imgur):");
  if (!url || !url.startsWith("http")) return;
  pendingImg = url;
  const wrap = document.getElementById("img-preview-wrap");
  const img  = document.getElementById("img-preview-img");
  img.src = url;
  img.onerror = () => { clearImg(); toast("Could not load that image URL"); };
  wrap.classList.add("show");
}

function clearImg() {
  pendingImg = "";
  document.getElementById("img-preview-wrap").classList.remove("show");
  document.getElementById("img-preview-img").src = "";
}

// ═══════════════════════════════════════════════════════════
//  EMOJI PICKER
// ═══════════════════════════════════════════════════════════
const EMOJIS = ["😀","😂","🥰","😎","🤔","👍","❤️","🎉","🔥","✨","😭","🤣","💯","🙏","👀","🫶","😊","🙌","🥳","👋"];

function toggleEmoji(e) {
  e.stopPropagation();
  const existing = document.getElementById("emoji-picker");
  if (existing) { existing.remove(); return; }

  const picker = document.createElement("div");
  picker.id = "emoji-picker";
  picker.className = "emoji-picker";

  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  picker.style.cssText = `bottom:${window.innerHeight - rect.top + 8}px;right:${window.innerWidth - rect.right}px`;

  picker.innerHTML = EMOJIS.map(em =>
    `<button class="emoji-btn" onclick="insertEmoji('${em}')">${em}</button>`
  ).join("");

  document.body.appendChild(picker);

  setTimeout(() => {
    document.addEventListener("click", function close(ev) {
      if (!picker.contains(ev.target)) {
        picker.remove();
        document.removeEventListener("click", close);
      }
    });
  }, 20);
}

function insertEmoji(em) {
  const ta = document.getElementById("chat-ta");
  const s  = ta.selectionStart;
  ta.value = ta.value.slice(0,s) + em + ta.value.slice(ta.selectionEnd);
  ta.focus();
  ta.setSelectionRange(s + em.length, s + em.length);
  document.getElementById("emoji-picker")?.remove();
}

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
function doLogout() {
  clearInterval(pollTimer);
  ["vibe_user","vibe_name","vibe_handle","vibe_initials"].forEach(k => localStorage.removeItem(k));
  window.location.href = "login.html";
}

function onKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoGrow(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

function norm(s) { return (s || "").trim().toLowerCase(); }

function getInitials(str) {
  return (str || "?").trim().split(/\s+/).map(w => w[0] || "").join("").toUpperCase().slice(0,2) || "?";
}

function esc(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// Avatar palette — deterministic from string
function palette(str) {
  const palettes = [
    {bg:"#e8eaf6",fg:"#3949ab"},
    {bg:"#fce4ec",fg:"#c2185b"},
    {bg:"#e8f5e9",fg:"#2e7d32"},
    {bg:"#fff3e0",fg:"#e65100"},
    {bg:"#e3f2fd",fg:"#1565c0"},
    {bg:"#f3e5f5",fg:"#7b1fa2"},
    {bg:"#e0f2f1",fg:"#00695c"},
    {bg:"#fff8e1",fg:"#f57f17"}
  ];
  let h = 0;
  for (let i = 0; i < str.length; i++) h = str.charCodeAt(i) + ((h<<5) - h);
  return palettes[Math.abs(h) % palettes.length];
}

function formatDate(iso) {
  if (!iso) return "";
  const d   = new Date(iso);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return "Today";
  const yest = new Date(now); yest.setDate(yest.getDate()-1);
  if (d.toDateString() === yest.toDateString()) return "Yesterday";
  return d.toLocaleDateString(undefined, {month:"short",day:"numeric",year:d.getFullYear()!==now.getFullYear()?"numeric":undefined});
}

function shortTime(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleTimeString(undefined, {hour:"2-digit",minute:"2-digit"});
}

function timeAgo(iso) {
  if (!iso) return "";
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return "now";
  if (m < 60) return m + "m";
  const h = Math.floor(m/60);
  if (h < 24) return h + "h";
  return Math.floor(h/24) + "d";
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2600);
}
</script>
