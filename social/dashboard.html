<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vasuki - Media</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --white:#ffffff;
      --off:#f7f6f4;
      --bg:#f0eeeb;
      --ink:#0c0c0c;
      --ink2:#3a3a3a;
      --muted:#888;
      --border:#e2dfdb;
      --accent:#1a6bf5;
      --accent-soft:rgba(26,107,245,.08);
      --radius:12px;
      --danger:#e53935;
      --green:#22c55e;
      --sidebar:230px;
    }
    html,body{height:100%;overflow:hidden;}
    body{font-family:'Geist',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;}

    /* ── SIDEBAR ── */
    .sidebar{width:var(--sidebar);flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:relative;z-index:10;}
    .sb-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
    .sb-logo{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);display:block;margin-bottom:18px;text-decoration:none;}
    .sb-compose{width:100%;padding:9px 14px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .18s;}
    .sb-compose:hover{background:#222;}
    .sb-compose svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
    .sb-nav{padding:14px 10px;flex:1;overflow-y:auto;}
    .sb-section-label{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:0 8px;margin-bottom:6px;margin-top:14px;}
    .sb-section-label:first-child{margin-top:0;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;font-size:13.5px;color:var(--ink2);cursor:pointer;transition:all .15s;position:relative;text-decoration:none;margin-bottom:1px;}
    .nav-item:hover{background:var(--off);color:var(--ink);}
    .nav-item.active{background:var(--off);color:var(--ink);font-weight:500;}
    .nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
    .nav-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;}
    .sb-footer{border-top:1px solid var(--border);padding:14px 10px;}
    .sb-profile{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .15s;}
    .sb-profile:hover{background:var(--off);}
    .sb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#c7d2fe,#a5b4fc);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#4338ca;flex-shrink:0;}
    .sb-info{flex:1;min-width:0;}
    .sb-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .sb-handle{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .logout-btn{width:100%;margin-top:6px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:'Geist',sans-serif;font-size:12.5px;color:var(--muted);cursor:pointer;transition:all .15s;text-align:left;display:flex;align-items:center;gap:8px;}
    .logout-btn:hover{background:#fef2f2;color:var(--danger);border-color:#fecaca;}
    .logout-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;}

    /* ── MAIN ── */
    .main{flex:1;display:flex;height:100vh;overflow:hidden;}

    /* ── FEED ── */
    .feed-col{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
    .feed-header{padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(255,255,255,.85);backdrop-filter:blur(12px);flex-shrink:0;}
    .feed-title{font-family:'Instrument Serif',serif;font-size:19px;color:var(--ink);}
    .feed-tabs{display:flex;}
    .feed-tab{font-size:13px;color:var(--muted);padding:6px 14px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
    .feed-tab.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:500;}
    .feed-tab:hover:not(.active){color:var(--ink2);}
    .icon-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .icon-btn:hover{background:var(--off);}
    .icon-btn svg{width:15px;height:15px;stroke:var(--ink2);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

    .feed-scroll{flex:1;overflow-y:auto;padding:16px 20px;}
    .feed-scroll::-webkit-scrollbar{width:4px;}
    .feed-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* Compose */
    .compose-box{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;position:relative;}
    .compose-top{display:flex;gap:10px;align-items:flex-start;}
    .av{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#c7d2fe,#a5b4fc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#4338ca;}
    .compose-input{flex:1;border:none;outline:none;font-family:'Geist',sans-serif;font-size:14px;color:var(--ink);background:transparent;resize:none;line-height:1.6;min-height:48px;}
    .compose-input::placeholder{color:var(--muted);}
    .compose-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
    .compose-tools{display:flex;gap:2px;}
    .compose-tool{width:30px;height:30px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
    .compose-tool:hover{background:var(--off);}
    .compose-tool svg{width:15px;height:15px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
    .btn-post{padding:7px 18px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;}
    .btn-post:hover{background:#222;}
    .char-count{font-size:11px;color:var(--muted);}

    /* Autocomplete dropdown */
    .autocomplete-dropdown{
      position:absolute;left:60px;right:16px;
      background:var(--white);border:1px solid var(--border);border-radius:10px;
      box-shadow:0 8px 24px rgba(0,0,0,.1);
      z-index:100;max-height:200px;overflow-y:auto;
      display:none;
    }
    .autocomplete-dropdown.show{display:block;}
    .autocomplete-item{
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;cursor:pointer;transition:background .12s;
    }
    .autocomplete-item:hover,.autocomplete-item.selected{background:var(--off);}
    .autocomplete-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
    .autocomplete-name{font-size:13px;font-weight:500;color:var(--ink);}
    .autocomplete-handle{font-size:12px;color:var(--muted);}

    /* Post Card */
    .post-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;transition:border-color .15s;animation:fadeUp .3s ease both;}
    .post-card:hover{border-color:#d0cdc8;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .post-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:12px;}
    .post-av{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;}
    .post-meta{flex:1;min-width:0;}
    .post-name{font-size:13.5px;font-weight:600;color:var(--ink);}
    .post-handle{font-size:12px;color:var(--muted);}
    .post-time{font-size:11.5px;color:var(--muted);margin-left:auto;white-space:nowrap;}
    .post-more{width:28px;height:28px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0;}
    .post-more:hover{background:var(--off);}
    .post-more svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;}
    .post-body{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:12px;}
    .post-hashtag{color:var(--accent);font-weight:500;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline;}
    .post-hashtag:hover{opacity:.75;text-decoration:underline;}
    .post-mention{color:var(--accent);font-weight:500;cursor:pointer;transition:opacity .15s;text-decoration:none;display:inline;}
    .post-mention:hover{opacity:.75;text-decoration:underline;}
    .post-mention.valid-user{color:var(--accent);}
    .post-mention.invalid-user{color:var(--muted);}
    .post-actions{display:flex;gap:0;margin:-4px;}
    .post-action{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:none;background:transparent;cursor:pointer;font-family:'Geist',sans-serif;font-size:12.5px;color:var(--muted);transition:all .15s;}
    .post-action:hover{background:var(--off);color:var(--ink2);}
    .post-action.liked{color:var(--danger);}
    .post-action.liked .heart{stroke:var(--danger);fill:var(--danger);}
    .post-action.reposted{color:var(--green);}
    .post-action svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .18s ease;}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .modal-box{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;min-width:320px;max-width:400px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.14);animation:slideUp .22s ease;position:relative;}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:7px;border:none;background:var(--off);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .modal-close svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;}
    .modal-tag{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .modal-title{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);margin-bottom:4px;}
    .modal-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
    .modal-posts{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
    .modal-post-item{background:var(--off);border-radius:9px;padding:10px 12px;font-size:13px;color:var(--ink2);line-height:1.5;}
    .modal-profile-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;margin:0 auto 12px;}
    .modal-profile-name{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);text-align:center;margin-bottom:2px;}
    .modal-profile-handle{font-size:13px;color:var(--muted);text-align:center;margin-bottom:16px;}
    .modal-follow-btn{width:100%;padding:9px;background:var(--ink);color:#fff;border:none;border-radius:9px;font-family:'Geist',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;}
    .modal-follow-btn:hover{background:#222;}

    /* Empty / Loading */
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center;}
    .empty-icon{width:48px;height:48px;border-radius:14px;background:var(--off);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
    .empty-icon svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
    .empty-title{font-family:'Instrument Serif',serif;font-size:20px;color:var(--ink);margin-bottom:6px;}
    .empty-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:280px;}
    .loading-state{display:flex;flex-direction:column;gap:10px;padding-top:4px;}
    .skel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px;}
    .skel-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
    .skel-av{width:36px;height:36px;border-radius:50%;background:var(--bg);}
    .skel-lines{flex:1;}
    .skel-line{height:8px;background:var(--bg);border-radius:4px;margin-bottom:6px;}
    .skel-line.w60{width:60%}.skel-line.w40{width:40%}.skel-line.w80{width:80%}.skel-line.w55{width:55%;}
    @keyframes shimmer{0%{opacity:.6;}50%{opacity:1;}100%{opacity:.6;}}
    .skel *{animation:shimmer 1.4s ease infinite;}

    /* Right panel */
    .right-col{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--white);overflow:hidden;}
    .right-scroll{flex:1;overflow-y:auto;padding:16px;}
    .right-scroll::-webkit-scrollbar{width:3px;}
    .right-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .widget{margin-bottom:20px;}
    .widget-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:500;margin-bottom:12px;}
    .search-wrap{display:flex;align-items:center;gap:8px;background:var(--off);border:1px solid var(--border);border-radius:9px;padding:8px 12px;margin-bottom:16px;}
    .search-wrap svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.7;stroke-linecap:round;flex-shrink:0;}
    .search-wrap input{border:none;outline:none;background:transparent;font-family:'Geist',sans-serif;font-size:13px;color:var(--ink);flex:1;}
    .search-wrap input::placeholder{color:var(--muted);}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .stat-card{background:var(--off);border:1px solid var(--border);border-radius:9px;padding:12px 14px;}
    .stat-val{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink);line-height:1;}
    .stat-label{font-size:11px;color:var(--muted);margin-top:2px;}
    .profile-card{background:var(--off);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .profile-card-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#c7d2fe,#a5b4fc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#4338ca;flex-shrink:0;}
    .profile-card-info{flex:1;min-width:0;}
    .profile-card-name{font-size:13.5px;font-weight:500;color:var(--ink);}
    .profile-card-handle{font-size:12px;color:var(--muted);}
    .trending-item{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;border-radius:6px;}
    .trending-item:hover{background:var(--off);}
    .trending-item:last-child{border-bottom:none;}
    .trending-tag{font-size:13px;font-weight:500;color:var(--accent);}
    .trending-count{font-size:11px;color:var(--muted);}

    /* Toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;padding:10px 20px;border-radius:9px;opacity:0;pointer-events:none;transition:all .25s;z-index:999;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    @media(max-width:900px){.right-col{display:none;}}
    @media(max-width:640px){
      .sidebar{width:60px;}
      .sb-logo,.sb-section-label,.nav-item span,.sb-info,.sb-compose span,.logout-btn span{display:none;}
      .sb-compose{padding:9px;justify-content:center;}
      .nav-item{justify-content:center;padding:10px;}
      .sb-profile{justify-content:center;padding:8px;}
      .logout-btn{justify-content:center;}
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-header">
    <a class="sb-logo" href="index.html">Vibe</a>
    <button class="sb-compose" onclick="focusCompose()">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      <span>New Post</span>
    </button>
  </div>
  <nav class="sb-nav">
    <div class="sb-section-label">Menu</div>
    <a class="nav-item active" href="#" onclick="setTab(event,'home')">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="#" onclick="setTab(event,'explore')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span>Explore</span>
    </a>
    <a class="nav-item" href="#" onclick="setTab(event,'notifications')">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span>Notifications</span>
    </a>
    <a class="nav-item" href="#" onclick="setTab(event,'messages')">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span>Messages</span>
    </a>
    <a class="nav-item" href="#" onclick="setTab(event,'bookmarks')">
      <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
      <span>Bookmarks</span>
    </a>
    <div class="sb-section-label">You</div>
    <a class="nav-item" href="#" onclick="setTab(event,'profile')">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>My Profile</span>
    </a>
    <a class="nav-item" href="#" onclick="setTab(event,'settings')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span>Settings</span>
    </a>
  </nav>
  <div class="sb-footer">
    <div class="sb-profile">
      <div class="sb-av" id="sb-av">?</div>
      <div class="sb-info">
        <div class="sb-name" id="sb-name">Loading...</div>
        <div class="sb-handle" id="sb-handle">@—</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      <span>Sign out</span>
    </button>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div class="feed-col">
    <div class="feed-header">
      <div class="feed-title" id="page-title">Home</div>
      <div class="feed-tabs" id="feed-tabs">
        <div class="feed-tab active" onclick="switchFeedTab(this,'for-you')">For you</div>
        <div class="feed-tab" onclick="switchFeedTab(this,'following')">Following</div>
      </div>
      <button class="icon-btn" title="Refresh" onclick="loadPosts()">
        <svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
    </div>

    <div class="feed-scroll" id="feed-scroll">
      <div class="compose-box">
        <div class="compose-top">
          <div class="av" id="compose-av">?</div>

        <input type="text" placeholder="Search Vasuki..." oninput="handleSearch(this.value)" id="search-input"/>
      </div>
      <div class="widget">
        <div class="widget-title">Your Profile</div>
        <div class="profile-card">
          <div class="profile-card-av" id="right-av">?</div>
          <div class="profile-card-info">
            <div class="profile-card-name" id="right-name">—</div>
            <div class="profile-card-handle" id="right-handle">@—</div>

      <div class="widget">
        <div class="widget-title">Your Stats</div>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-val" id="stat-posts">—</div><div class="stat-label">Posts</div></div>
          <div class="stat-card"><div class="stat-val" id="stat-followers">—</div><div class="stat-label">Followers</div></div>
          <div class="stat-card"><div class="stat-val" id="stat-following">—</div><div class="stat-label">Following</div></div>

          <div class="trending-item" onclick="openHashtagModal('tech')"><span class="trending-tag">#tech</span><span class="trending-count">trending</span></div>
          <div class="trending-item" onclick="openHashtagModal('design')"><span class="trending-tag">#design</span><span class="trending-count">trending</span></div>

<div class="toast" id="toast"></div>

<script type="module">
  import Vasuki from 'https://cdn.jsdelivr.net/npm/vasuki-db@1.0.1/index.min.js';
  let vdb = new Vasuki();

  // ── AUTH GUARD ──
  const VIBE_USER     = localStorage.getItem('vibe_user');
  const VIBE_NAME     = localStorage.getItem('vibe_name')     || 'User';
  const VIBE_HANDLE   = localStorage.getItem('vibe_handle')   || '';
  const VIBE_INITIALS = localStorage.getItem('vibe_initials') || '?';

  if (!VIBE_USER) window.location.href = 'login.html';

  document.getElementById('sb-av').textContent        = VIBE_INITIALS;
  document.getElementById('sb-name').textContent      = VIBE_NAME;
  document.getElementById('sb-handle').textContent    = VIBE_HANDLE ? '@' + VIBE_HANDLE : VIBE_USER;
  document.getElementById('compose-av').textContent   = VIBE_INITIALS;
  document.getElementById('right-av').textContent     = VIBE_INITIALS;
  document.getElementById('right-name').textContent   = VIBE_NAME;
  document.getElementById('right-handle').textContent = VIBE_HANDLE ? '@' + VIBE_HANDLE : VIBE_USER;

  // ── DB: single login promise, never repeated ──
  const dbInitPromise = vdb.login('codeclutch.adamyarao@gmail.com', 'wkmeupb4ugo');

  async function getDB() {
    await dbInitPromise;
    return vdb;
  }

  // Cache of all known users for mentions
  let knownUsers = [];

  async function loadKnownUsers() {
    try {
      const db    = await getDB();
      const users = await db.fetchTable('users_rows', 'Sheet1');
      knownUsers  = (users || []).filter(u => u && u.handle);
      window._knownUsers = knownUsers;
    } catch(e) { console.warn('Could not load users for mentions:', e); }
  }

  // ── LOAD POSTS ──
  window.loadPosts = async function () {
    const container = document.getElementById('posts-container');
    showSkeleton(container);
    try {
      const db    = await getDB();
      const posts = await db.fetchTable('vibe_posts', 'Sheet1');
      const sorted = (posts || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      container.innerHTML = '';
      if (!sorted.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="empty-title">No posts yet</div><div class="empty-sub">Be the first to post something.</div></div>`;
        return;
      }
      sorted.forEach(p => container.appendChild(buildPostCard(p)));
    } catch (err) {
      console.error(err);
      container.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg></div><div class="empty-title">Couldn't load posts</div><div class="empty-sub">Check your database connection.</div></div>`;
    }
  };

  // ── BUILD POST CARD ──
  function buildPostCard(p) {
    const el = document.createElement('div');
    el.className = 'post-card';
    el.id = 'post-' + p.id;
    const initials = (p.author_initials || getInitials(p.author_name || p.author_handle || '?')).toUpperCase();
    const color    = avatarColor(p.author_handle || p.author_name || '');
    const isMe     = (p.author_email || '').toLowerCase() === VIBE_USER.toLowerCase()
                  || (p.author_handle || '') === VIBE_HANDLE;

    el.innerHTML = `
      <div class="post-top">
        <div class="post-av" style="background:${color.bg};color:${color.fg}">${escHtml(initials)}</div>
        <div class="post-meta">
          <div class="post-name">${escHtml(p.author_name || p.author_handle || 'Unknown')}</div>
          <div class="post-handle">@${escHtml(p.author_handle || '')}</div>
        </div>
        <div class="post-time">${timeAgo(p.created_at)}</div>
        ${isMe
          ? `<button class="post-more" onclick="deletePost('${p.id}',this)"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg></button>`
          : `<button class="post-more" onclick="showToast('Options coming soon')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg></button>`}
      </div>
      <div class="post-body">${renderPostBody(p.body || '')}</div>
      <div class="post-actions">
        <button class="post-action" id="like-btn-${p.id}" onclick="toggleLike('${p.id}',this)">
          <svg class="heart" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
          <span id="like-count-${p.id}">${formatNum(parseInt(p.likes)||0)}</span>
        </button>
        <button class="post-action" onclick="showToast('Comments — connect your backend')">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span>${formatNum(parseInt(p.comments)||0)}</span>
        </button>
        <button class="post-action" id="repost-btn-${p.id}" onclick="toggleRepost('${p.id}',this)">
          <svg viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          <span id="repost-count-${p.id}">${formatNum(parseInt(p.reposts)||0)}</span>
        </button>
        <button class="post-action" onclick="sharePost('${p.id}')">
          <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.59 13.51l6.83 3.98M15.41 6.51l-6.82 3.98"/></svg>
        </button>
      </div>`;
    return el;
  }

  // ── RENDER POST BODY ──
  function renderPostBody(text) {
    if (!text) return '';
    let safe = escHtml(text);
    safe = safe.replace(/#(\w+)/g, (_, tag) =>
      `<span class="post-hashtag" onclick="openHashtagModal('${tag}')">#${tag}</span>`);
    safe = safe.replace(/@(\w+)/g, (_, handle) => {
      const user = (window._knownUsers || []).find(u => u.handle && u.handle.toLowerCase() === handle.toLowerCase());
      return user
        ? `<span class="post-mention valid-user" onclick="openMentionModal('${handle}')" title="View @${handle}'s profile">@${handle}</span>`
        : `<span class="post-mention invalid-user" title="User not found">@${handle}</span>`;
    });
    return safe;
  }
  window.renderPostBody = renderPostBody;

  // ── SUBMIT POST ──
  window.submitPost = async function () {
    const inp  = document.getElementById('compose-input');
    const body = inp.value.trim();
    if (!body)             { showToast('Write something first!'); return; }
    if (body.length > 280) { showToast('Too long — max 280 characters'); return; }
    const btn = document.querySelector('.btn-post');
    btn.textContent = 'Posting…'; btn.disabled = true;
    try {
      const db = await getDB();
      await db.insertRow('vibe_posts', 'Sheet1', {
        author_name: VIBE_NAME, author_handle: VIBE_HANDLE,
        author_initials: VIBE_INITIALS, author_email: VIBE_USER,
        body, likes: 0, comments: 0, reposts: 0,
        created_at: new Date().toISOString()
      });
      inp.value = ''; updateCharCount(inp);
      showToast('Posted ✓');
      await loadPosts();
    } catch (err) {
      console.error(err);
      showToast('Failed to post — check your DB connection');
    } finally {
      btn.textContent = 'Post'; btn.disabled = false;
    }
  };

  window.deletePost = async function (id) {
    if (!confirm('Delete this post?')) return;
    document.getElementById('post-' + id)?.remove();
    showToast('Post deleted');
  };

  window.toggleLike = async function (id, btn) {
    const countEl = document.getElementById('like-count-' + id);
    const liked   = btn.classList.contains('liked');
    const current = parseInt(countEl.textContent.replace('k','000')) || 0;
    btn.classList.toggle('liked');
    countEl.textContent = formatNum(liked ? current - 1 : current + 1);
    if (!liked) showToast('Liked ❤️');
  };

  window.toggleRepost = async function (id, btn) {
    const countEl  = document.getElementById('repost-count-' + id);
    const reposted = btn.classList.contains('reposted');
    const current  = parseInt(countEl.textContent.replace('k','000')) || 0;
    btn.classList.toggle('reposted');
    countEl.textContent = formatNum(reposted ? current - 1 : current + 1);
    showToast(reposted ? 'Repost removed' : 'Reposted ✓');
  };

  // ── STATS ──
  async function loadStats() {
    try {
      const db    = await getDB();
      const posts = await db.fetchTable('vibe_posts', 'Sheet1');
      const mine  = (posts || []).filter(p =>
        (p.author_email  || '').toLowerCase() === VIBE_USER.toLowerCase() ||
        (p.author_handle || '') === VIBE_HANDLE
      );
      const totalLikes = mine.reduce((s, p) => s + (parseInt(p.likes) || 0), 0);
      document.getElementById('stat-posts').textContent     = mine.length;
      document.getElementById('stat-likes').textContent     = formatNum(totalLikes);
      document.getElementById('stat-followers').textContent = '—';
      document.getElementById('stat-following').textContent = '—';
    } catch(e) { console.warn(e); }
  }

  // ── SKELETON ──
  function showSkeleton(container) {
    container.innerHTML = Array(3).fill('').map(() => `
      <div class="skel">
        <div class="skel-row"><div class="skel-av"></div><div class="skel-lines"><div class="skel-line w60"></div><div class="skel-line w40"></div></div></div>
        <div class="skel-line w80"></div><div class="skel-line w55" style="margin-top:6px;"></div>
      </div>`).join('');
  }

  // ── HASHTAG MODAL ──
  window.openHashtagModal = function(tag) {
    const posts = document.querySelectorAll('.post-card');
    let matched = [];
    posts.forEach(card => {
      const body = card.querySelector('.post-body');
      if (body && body.textContent.toLowerCase().includes('#' + tag.toLowerCase())) {
        matched.push({ name: card.querySelector('.post-name')?.textContent || '', text: body.textContent });
      }
    });
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="modal-box">
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        <div class="modal-tag">Hashtag</div>
        <div class="modal-title">#${escHtml(tag)}</div>
        <div class="modal-sub">${matched.length} post${matched.length !== 1 ? 's' : ''} in your feed</div>
        <div class="modal-posts">
          ${matched.length
            ? matched.map(p => `<div class="modal-post-item"><strong>${escHtml(p.name)}</strong>: ${escHtml(p.text.slice(0,120))}${p.text.length>120?'…':''}</div>`).join('')
            : `<div class="modal-post-item" style="color:var(--muted);text-align:center;">No posts with #${escHtml(tag)} yet</div>`}
        </div>
      </div>`;
    document.body.appendChild(overlay);
  };

  // ── MENTION MODAL ──
  window.openMentionModal = function(handle) {
    const user = (window._knownUsers || []).find(u => u.handle && u.handle.toLowerCase() === handle.toLowerCase());
    if (!user) { showToast('@' + handle + ' — user not found'); return; }
    const color = avatarColor(user.handle || '');
    const init  = getInitials(user.name || user.handle || '?');
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="modal-box" style="text-align:left;">
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()"><svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        <div style="text-align:center;">
          <div class="modal-profile-av" style="background:${color.bg};color:${color.fg}">${escHtml(init)}</div>
          <div class="modal-profile-name">${escHtml(user.name || user.handle)}</div>
          <div class="modal-profile-handle">@${escHtml(user.handle)}</div>
        </div>
        <div style="height:16px;"></div>
        <button class="modal-follow-btn" onclick="showToast('Follow — connect your backend');this.closest('.modal-overlay').remove()">Follow @${escHtml(user.handle)}</button>
        <button style="width:100%;margin-top:8px;padding:9px;background:transparent;border:1px solid var(--border);border-radius:9px;font-family:'Geist',sans-serif;font-size:13px;cursor:pointer;" onclick="showToast('Message — connect your backend');this.closest('.modal-overlay').remove()">Send message</button>
      </div>`;
    document.body.appendChild(overlay);
  };

  // ── INIT ──
  loadKnownUsers();
  loadPosts();
  loadStats();
  window._vdb = vdb;
</script>

<script>
  // ── COMPOSE: @ autocomplete ──
  let autocompleteActive = false;
  let autocompleteIdx    = -1;

  function handleComposeInput(el) {
    updateCharCount(el);
    const before = el.value.slice(0, el.selectionStart);
    const match  = before.match(/@(\w*)$/);
    if (match) showAutocomplete(match[1].toLowerCase(), el);
    else       hideAutocomplete();
  }

  function showAutocomplete(query, textarea) {
    const dd      = document.getElementById('autocomplete-dropdown');
    const matches = (window._knownUsers || [])
      .filter(u => u.handle && u.handle.toLowerCase().startsWith(query) &&
        u.handle.toLowerCase() !== (localStorage.getItem('vibe_handle')||'').toLowerCase())
      .slice(0, 6);
    if (!matches.length) { hideAutocomplete(); return; }
    dd.innerHTML = matches.map((u, i) => {
      const color = avatarColor(u.handle || '');
      const init  = getInitials(u.name || u.handle || '?');
      return `<div class="autocomplete-item" data-handle="${escHtml(u.handle)}" onmousedown="selectMention('${escHtml(u.handle)}')">
        <div class="autocomplete-av" style="background:${color.bg};color:${color.fg}">${escHtml(init)}</div>
        <div><div class="autocomplete-name">${escHtml(u.name || u.handle)}</div><div class="autocomplete-handle">@${escHtml(u.handle)}</div></div>
      </div>`;
    }).join('');
    dd.classList.add('show');
    autocompleteActive = true;
    autocompleteIdx    = -1;
  }

  function hideAutocomplete() {
    document.getElementById('autocomplete-dropdown').classList.remove('show');
    autocompleteActive = false;
    autocompleteIdx    = -1;
  }

  function selectMention(handle) {
    const ta     = document.getElementById('compose-input');
    const before = ta.value.slice(0, ta.selectionStart).replace(/@(\w*)$/, '@' + handle + ' ');
    const after  = ta.value.slice(ta.selectionStart);
    ta.value     = before + after;
    ta.focus();
    ta.setSelectionRange(before.length, before.length);
    updateCharCount(ta);
    hideAutocomplete();
  }

  document.addEventListener('keydown', e => {
    if (document.activeElement.id === 'compose-input' && autocompleteActive) {
      const items = document.querySelectorAll('.autocomplete-item');
      if (e.key === 'ArrowDown')  { e.preventDefault(); autocompleteIdx = Math.min(autocompleteIdx+1, items.length-1); items.forEach((el,i) => el.classList.toggle('selected', i===autocompleteIdx)); }
      else if (e.key === 'ArrowUp')   { e.preventDefault(); autocompleteIdx = Math.max(autocompleteIdx-1, 0); items.forEach((el,i) => el.classList.toggle('selected', i===autocompleteIdx)); }
      else if (e.key === 'Enter' && autocompleteIdx >= 0) { e.preventDefault(); selectMention(items[autocompleteIdx].dataset.handle); }
      else if (e.key === 'Escape') hideAutocomplete();
      return;
    }
    if (e.key === 'n' && document.activeElement.tagName !== 'TEXTAREA' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault(); focusCompose();
    }
  });

  // ── NAV ──
  function logout() {
    ['vibe_user','vibe_name','vibe_handle','vibe_initials'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'login.html';
  }

  function setTab(e, tab) {
    e.preventDefault();
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    e.currentTarget.classList.add('active');
    const titles = { home:'Home', explore:'Explore', notifications:'Notifications', messages:'Messages', bookmarks:'Bookmarks', profile:'My Profile', settings:'Settings' };
    document.getElementById('page-title').textContent = titles[tab] || tab;
    document.getElementById('feed-tabs').style.display = tab === 'home' ? 'flex' : 'none';
    if (tab !== 'home') showToast(`${titles[tab]} — coming soon`);
    else loadPosts();
  }

  function switchFeedTab(el, tab) {
    document.querySelectorAll('.feed-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    showToast(tab === 'following' ? 'Showing posts from people you follow' : 'Showing all posts');
    loadPosts();
  }

  function focusCompose() {
    document.getElementById('compose-input').focus();
    document.getElementById('feed-scroll').scrollTo({ top: 0, behavior: 'smooth' });
  }

  function updateCharCount(el) {
    const len = el.value.length;
    const cc  = document.getElementById('char-count');
    cc.textContent = len > 0 ? `${len}/280` : '';
    cc.style.color = len > 260 ? 'var(--danger)' : 'var(--muted)';
  }

  function handleSearch(val) {
    if (val.length > 2) showToast(`Searching "${val}" — connect search to your backend`);
  }

  function sharePost(id) {
    const url = `${location.origin}${location.pathname}?post=${id}`;
    if (navigator.clipboard) navigator.clipboard.writeText(url).then(() => showToast('Link copied!'));
    else showToast('Link copied!');
  }

  // ── UTILS ──
  function formatNum(n) { return n >= 1000 ? (n/1000).toFixed(1).replace('.0','')+'k' : n; }
  function escHtml(str) { return str ? String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
  function getInitials(str) { return (str||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }
  function timeAgo(iso) {
    if (!iso) return '';
    const m = Math.floor((Date.now() - new Date(iso)) / 60000);
    if (m < 1)  return 'just now';
    if (m < 60) return `${m}m ago`;
    const h = Math.floor(m/60);
    if (h < 24) return `${h}h ago`;
    return `${Math.floor(h/24)}d ago`;
  }
  function avatarColor(str) {
    const palettes = [
      {bg:'linear-gradient(135deg,#c7d2fe,#a5b4fc)',fg:'#4338ca'},
      {bg:'linear-gradient(135deg,#fde68a,#fbbf24)',fg:'#92400e'},
      {bg:'linear-gradient(135deg,#bbf7d0,#4ade80)',fg:'#166534'},
      {bg:'linear-gradient(135deg,#fecaca,#f87171)',fg:'#991b1b'},
      {bg:'linear-gradient(135deg,#e0e7ff,#818cf8)',fg:'#3730a3'},
      {bg:'linear-gradient(135deg,#fce7f3,#f9a8d4)',fg:'#9d174d'},
      {bg:'linear-gradient(135deg,#d1fae5,#6ee7b7)',fg:'#065f46'},
    ];
    let hash = 0;
    for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash<<5) - hash);
    return palettes[Math.abs(hash) % palettes.length];
  }
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }
</script>
</body>
