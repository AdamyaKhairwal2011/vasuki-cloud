<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vasuki Classrooms | Manage teaching and learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'VasukiCustom';
            src: url('custom.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            font-family: 'VasukiCustom', sans-serif;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }
        
        .dropdown-menu {
            display: none;
            transition: all 0.2s ease-in-out;
        }

        .btn-google {
            transition: box-shadow 0.2s;
        }
        .btn-google:hover {
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.30), 0 4px 8px 3px rgba(60,64,67,0.15);
        }
    </style>
</head>
<body class="bg-white text-gray-800">

    <nav class="flex items-center justify-between px-6 py-4 border-b border-gray-200 sticky top-0 bg-white z-50">
        <div class="flex items-center space-x-3">
            <img src="logo.jpg" 
                 alt="Vasuki Logo" 
                 class="h-8 w-auto"
                 onerror="this.onerror=null; this.src='logo.png';">
            
            <div class="text-xl font-medium text-gray-600 flex items-center">
                <span class="text-blue-600 font-bold mr-1">Vasuki</span> Classrooms
            </div>
        </div>
        
        <div class="hidden md:flex items-center space-x-8 text-sm font-medium text-gray-600">
            <a href="#" class="hover:text-blue-600">Overview</a>
            <a href="#" class="hover:text-blue-600">Features</a>
            
            <div class="relative dropdown">
                <button class="flex items-center hover:text-blue-600 focus:outline-none py-2">
                    Resources
                    <svg class="w-4 h-4 ml-1" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                    </svg>
                </button>
                
                <div class="dropdown-menu absolute left-0 mt-0 w-48 bg-white border border-gray-200 rounded-lg shadow-xl py-2 z-50">
                    <a href="https://vasuki.cloud/meet/" class="block px-4 py-3 hover:bg-gray-100 flex items-center">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-3"></span>
                        Meet
                    </a>
                    <a href="https://vasuki.cloud/calendar/" class="block px-4 py-3 hover:bg-gray-100 flex items-center">
                        <span class="w-2 h-2 bg-blue-500 rounded-full mr-3"></span>
                        Calendar
                    </a>
                    <a href="https://vasuki.cloud/forms/" class="block px-4 py-3 hover:bg-gray-100 flex items-center">
                        <span class="w-2 h-2 bg-purple-500 rounded-full mr-3"></span>
                        Forms
                    </a>
                </div>
            </div>
        </div>

        <div class="flex items-center space-x-4">
            <button class="text-sm font-medium text-gray-600">Sign in</button>
            <button class="bg-blue-600 text-white px-6 py-2 rounded-md font-medium text-sm btn-google">
                Get started for free
            </button>
        </div>
    </nav>

    </body>
</html>
