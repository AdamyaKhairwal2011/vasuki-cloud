<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./tailwind.js"></script>
  <script src="./gsap.js"></script>
</head>
<body class="bg-black text-white antialiased overflow-x-hidden selection:bg-[#00b7ff30]">

  <!-- HEADER -->
  <header id="siteHeader" class="fixed top-0 left-0 right-0 z-50 backdrop-blur-xl bg-black/30 border-b border-white/10">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

      <div class="flex items-center gap-3 z-50">
        <span class="brand-text font-semibold text-2xl tracking-tight bg-gradient-to-r from-white to-gray-400 bg-clip-text text-transparent">
          Vāsuki
        </span>
      </div>

      <!-- Future Nav -->
      <div class="hidden md:flex gap-8 text-gray-300 text-sm">
        <div id="profile-picture"></div>
      </div>


    </div>
  </header>


<!-- TOP SECTION -->
<section class="max-w-7xl mx-auto px-6 pt-32 pb-10 relative z-20">

  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-6">

    <!-- LEFT: Title & Description -->
    <div>
      <h1 id="project_name"
          class="text-5xl md:text-7xl font-semibold leading-tight tracking-tight mb-2"></h1>

      <p id="project_description"
         class="text-white/70 max-w-3xl text-lg leading-relaxed"></p>
    </div>

    <!-- RIGHT: Top Action Icons -->
    <div class="flex items-center gap-4">

      <!-- Share -->
<button
  class="p-3 rounded-2xl bg-white/10 hover:bg-white/20 transition shadow-lg shadow-white/5"
  title="Share"
   onclick="openPermissionPopup(`${new URLSearchParams(window.location.search).get('project_id')}`)"
>
<img src="./share.svg" alt="" width="25px" height="25px">
</button>


      <!-- Delete Project -->
      <button id="deleteProjectBtn"
        class="p-3 rounded-2xl bg-red-600/20 hover:bg-red-600/30 
               shadow-lg shadow-red-600/20 transition active:scale-95"
        title="Delete Project">
<img src="./delete.svg" alt="" width="25px" height="25px">
      </button>

    </div>
  </div>

</section>



  <!-- BACKGROUND GRID + DECORATIONS -->
  <div class="absolute inset-0 -z-10">
    <div class="w-full h-full opacity-40 bg-[linear-gradient(to_right,#1a1d29_1px,transparent_1px),linear-gradient(to_bottom,#1a1d29_1px,transparent_1px)] bg-[size:80px_80px]"></div>

    <div class="absolute left-0 top-0 bottom-0 w-32 bg-[repeating-linear-gradient(45deg,rgba(255,255,255,0.3)_0,rgba(255,255,255,0.4)_0.5px,transparent_1px,transparent_17px)] opacity-10"></div>
    <div class="absolute right-0 top-0 bottom-0 w-72 bg-[repeating-linear-gradient(45deg,rgba(255,255,255,0.2)_0,rgba(255,255,255,0.5)_0.5px,transparent_1px,transparent_17px)] opacity-10"></div>
  </div>



  <!-- AI INPUT SECTION -->
  <div class="max-w-5xl mx-auto px-6 mt-6">




<div class="max-w-7xl mx-auto px-8">
    <h2 class="text-4xl font-bold mt-24 mb-12 tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">
        Project Files
    </h2>

    <div id="dropZone"
            class="w-full h-56 rounded-[50px]
                    flex flex-col items-center justify-center text-white/90
                    hover:bg-[#007aff15] transition cursor-pointer apple-neumorphic-button
                    text-center p-8 backdrop-blur-sm  
                    border-2 border-dotted border-white/50
                    " style="border-radius: 50px;">
        <svg class="w-12 h-12 mb-4 text-[#007aff]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 10.5v6m0 0l-3-3m3 3l3-3m-9 5.25a2.25 2.25 0 01-2.25-2.25V7.5A2.25 2.25 0 0110.5 5.25h3.75a2.25 2.25 0 012.25 2.25v2.25m-4.5-4.5h-1.5m0 0h1.5m-1.5 0a1.5 1.5 0 01-1.5-1.5V6.75a1.5 1.5 0 011.5-1.5H15a1.5 1.5 0 011.5 1.5v2.25" />
        </svg>
        <span class="text-2xl font-semibold tracking-wide">Drop Files Here</span>
        <span class="text-md text-white/60 mt-1">or click to browse local storage (Unlimited, yet 100GB recommended)</span>
    </div>

<div id="uploadProgress" class="w-full bg-black/20 rounded-xl p-3 hidden">
    <div class="text-white mb-2" id="uploadText">0 MB / 0 MB uploaded</div>
    <div class="w-full bg-white/10 rounded-xl overflow-hidden h-2">
        <div id="uploadBar" class="h-2 bg-white/60 transition-all duration-200" style="width:0%"></div>
    </div>
</div>

</div>



  <!-- FILE TABLE -->
<div class="max-w-6xl mx-auto px-6 mt-16">

  <!-- Horizontal Scroll Wrapper -->
  <div class="overflow-x-auto scrollbar-thin scrollbar-thumb-white/10 scrollbar-track-transparent 
              hover:scrollbar-thumb-white/20 transition-all duration-300
              rounded-2xl backdrop-blur-xl bg-white/5 border border-white/10">

    <table class="min-w-max w-full text-left">
      <thead class="bg-white/5 border-b border-white/10">
        <tr>
          <th class="py-4 px-4 text-white/70 text-sm font-medium whitespace-nowrap">Name</th>
          <th class="py-4 px-4 text-white/70 text-sm font-medium whitespace-nowrap">Type</th>
          <th class="py-4 px-4 text-white/70 text-sm font-medium whitespace-nowrap">Size</th>
          <th class="py-4 px-4"></th>
        </tr>
      </thead>

      <tbody id="fileTableBody" class="divide-y divide-white/5">
      </tbody>
    </table>

  </div>

</div>

<!-- Permission Popup -->
<div id="permissionPopup"
     class="fixed inset-0 bg-black/60 backdrop-blur-xl hidden
            flex items-center justify-center z-50">

  <div class="bg-white/10 p-6 rounded-2xl border border-white/20 shadow-xl w-[90%] max-w-md">

    <h2 class="text-2xl font-semibold mb-4">Select Permission</h2>

    <label class="text-white/70 text-sm">Choose access type</label>

    <select id="permissionSelect"
            class="w-full mt-2 p-3 rounded-xl bg-black/40 border border-white/20 text-white outline-none">
      <option value="69832077eRacrt3">Read Only</option>
      <option value="23908723Dacrt4">Download</option>
    </select>

    <div class="flex justify-end gap-3 mt-6">
      <button onclick="closePermissionPopup()"
              class="px-4 py-2 bg-white/10 border border-white/20 rounded-xl hover:bg-white/20">
        Cancel
      </button>

      <button onclick="generateShareLink()"
              class="px-4 py-2 bg-green-500 text-black font-semibold rounded-xl hover:bg-green-600">
        Generate
      </button>
    </div>
  </div>
</div>



  <script src="./project.js" type="module"></script>
</body>

</html>
