<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vasuki Neem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0b0f1a;
  --glass:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.15);
  --accent:#0071e3;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Inter,sans-serif;
  background:linear-gradient(135deg,#0b0f1a,#121a2f);
  color:#fff;
  display:flex;
}
aside{
  width:260px;
  padding:25px;
  background:var(--glass);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:15px;
}
main{
  flex:1;
  padding:25px;
  overflow:auto;
}
button{
  background:var(--glass);
  border:1px solid var(--border);
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
}
button:hover{background:var(--accent)}
.upload{
  border:2px dashed var(--border);
  border-radius:16px;
  padding:30px;
  text-align:center;
  cursor:pointer;
  margin-bottom:20px;
}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,.08)}
tr.selected{background:rgba(0,113,227,.3)}
.folder{font-weight:600;cursor:pointer}
.folder:hover{color:var(--accent)}
.actions button{margin-left:6px;font-size:.75rem}
.path{opacity:.7;margin-bottom:10px}

/* STORAGE */
.storage-card{
  background:rgba(255,255,255,.05);
  border:1px solid var(--border);
  border-radius:16px;
  padding:15px;
  margin-top:auto;
}
.storage-text{
  text-align:center;
  font-size:.8rem;
  margin-top:8px;
  opacity:.8;
}

/* MOBILE */
@media(max-width:900px){
  body{flex-direction:column}
  aside{
    width:100%;
    flex-direction:row;
    align-items:center;
    gap:10px;
  }
  aside h2{display:none}
  .storage-card{display:none}
}
</style>
</head>

<body>

<aside>
  <h2>Vasuki Neem</h2>
  <button onclick="goBack()">⬅</button>
  <div class="path" id="path">/</div>
  <button id="shareBtn" onclick="openShare()" style="display:none">🔗 Share</button>

  <div class="storage-card">
    <canvas id="storageChart" height="120"></canvas>
    <div class="storage-text">
      <span id="usedText">0 MB</span> / 500 MB
    </div>
  </div>
</aside>

<main>

<div class="upload" onclick="fileInput.click()">
  <input type="file" id="fileInput" multiple hidden onchange="uploadFiles()">
  <h3>Upload Files</h3>
</div>

<button onclick="createFolder()">➕ New Folder</button>

<table>
<thead>
<tr>
  <th>Name</th>
  <th>Size</th>
  <th align="right">Actions</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</main>

<!-- SHARE MODAL -->
<div id="shareModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);align-items:center;justify-content:center">
  <div style="background:#0b1324;padding:25px;border-radius:18px;width:340px">
    <h3>Share Files</h3>
    <select id="sharePerm" style="width:100%;padding:10px;margin:15px 0">
      <option value="read">Read only</option>
      <option value="download">Download</option>
    </select>
    <input id="shareLink" readonly style="width:100%;padding:10px;margin-bottom:10px">
    <button onclick="generateShare()">Generate Link</button>
    <button onclick="closeShare()">Close</button>
  </div>
</div>

<script>
const BASE_URL="http://localhost:3000";
const params=new URLSearchParams(location.search);
const userEmail=params.get("email") || "demo@vasuki.ai";
const MAX_MB = 500;

let currentFolder="";
let selectedFiles=new Set();
let storageChart;

/* STORAGE CHART */
function initChart(){
  const ctx=document.getElementById("storageChart");
  storageChart=new Chart(ctx,{
    type:"doughnut",
    data:{
      labels:["Used","Free"],
      datasets:[{
        data:[0,MAX_MB],
        backgroundColor:["#0071e3","#1c274a"],
        borderWidth:0
      }]
    },
    options:{
      cutout:"75%",
      plugins:{legend:{display:false}}
    }
  });
}
initChart();

function updateStorage(usedMB){
  usedMB=Math.min(usedMB,MAX_MB);
  storageChart.data.datasets[0].data=[usedMB,MAX_MB-usedMB];
  storageChart.update();
  document.getElementById("usedText").textContent=usedMB.toFixed(1)+" MB";
}

function updateShareButton(){
  document.getElementById("shareBtn").style.display =
    selectedFiles.size ? "block":"none";
}

/* LIST FILES */
async function listFiles(){
  const res=await fetch(`${BASE_URL}/list-files`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail,folder:currentFolder})
  });
  const {files}=await res.json();

  document.getElementById("path").textContent="/"+currentFolder;
  const tbody=document.getElementById("list");
  tbody.innerHTML="";

  let usedBytes=0;

  files.forEach(f=>{
    if(!f.isFolder) usedBytes+=f.size;

    const tr=document.createElement("tr");
    if(selectedFiles.has(f.name))tr.classList.add("selected");

    tr.onclick=e=>toggleSelect(f.name,e);

    tr.innerHTML=`
      <td class="${f.isFolder?"folder":""}">
        ${f.isFolder?"📁":"📄"} ${f.name}
      </td>
      <td>${f.isFolder?"-":(f.size/1024).toFixed(1)+" KB"}</td>
      <td class="actions" align="right">
        ${!f.isFolder?`<button onclick="event.stopPropagation();downloadFile('${f.name}')">Get</button>`:""}
        <button onclick="event.stopPropagation();renameItem('${f.name}')">Rename</button>
        <button onclick="event.stopPropagation();deleteItem('${f.name}')">Delete</button>
      </td>
    `;

    if(f.isFolder){
      tr.querySelector("td").onclick=e=>{
        e.stopPropagation();
        openFolder(f.name);
      };
    }

    tbody.appendChild(tr);
  });

  updateStorage(usedBytes/1024/1024);
}

/* SELECTION */
function toggleSelect(name,e){
  if(e.target.tagName==="BUTTON")return;
  selectedFiles.has(name)?selectedFiles.delete(name):selectedFiles.add(name);
  updateShareButton();
  listFiles();
}

/* NAV */
function openFolder(name){
  currentFolder=currentFolder?`${currentFolder}/${name}`:name;
  selectedFiles.clear();
  updateShareButton();
  listFiles();
}
function goBack(){
  if(!currentFolder)return;
  currentFolder=currentFolder.split("/").slice(0,-1).join("/");
  selectedFiles.clear();
  updateShareButton();
  listFiles();
}

/* CREATE */
async function createFolder(){
  const name=prompt("Folder name");
  if(!name)return;
  await fetch(`${BASE_URL}/create-folder`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail,folder:currentFolder,name})
  });
  listFiles();
}

/* UPLOAD */
async function uploadFiles(){
  const fd=new FormData();
  fd.append("email",userEmail);
  fd.append("folder",currentFolder);
  for(const f of fileInput.files)fd.append("files",f);
  await fetch(`${BASE_URL}/upload`,{method:"POST",body:fd});
  listFiles();
}

/* DELETE */
async function deleteItem(name){
  if(!confirm("Delete permanently?"))return;
  await fetch(`${BASE_URL}/delete-file`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:userEmail,
      path:currentFolder?`${currentFolder}/${name}`:name
    })
  });
  selectedFiles.delete(name);
  updateShareButton();
  listFiles();
}

/* RENAME */
async function renameItem(oldName){
  const newName=prompt("New name",oldName);
  if(!newName)return;
  await fetch(`${BASE_URL}/rename-file`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:userEmail,
      oldPath:currentFolder?`${currentFolder}/${oldName}`:oldName,
      newName
    })
  });
  listFiles();
}

/* DOWNLOAD */
function downloadFile(name){
  window.open(`${BASE_URL}/download/${userEmail}/${currentFolder}/${name}`);
}

/* SHARE */
function openShare(){
  document.getElementById("shareModal").style.display="flex";
}
function closeShare(){
  document.getElementById("shareModal").style.display="none";
}
async function generateShare(){
  const perm=document.getElementById("sharePerm").value;
  const files=[...selectedFiles].map(f=>currentFolder?`${currentFolder}/${f}`:f);

  const res=await fetch(`${BASE_URL}/share`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email:userEmail,files,permission:perm})
  });

  const data=await res.json();
  shareLink.value=data.url;
  navigator.clipboard.writeText(data.url);
}

listFiles();
</script>

</body>
</html>
