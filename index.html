<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault | Vasuki Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    :root {
        --sidebar-w: 280px;
        --bg: #f5f5f7;
        --accent: #0071e3;
        --text-main: #1d1d1f;
        --text-sec: #86868b;
        --glass: rgba(255, 255, 255, 0.75);
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; }
    body {
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        margin: 0;
        display: flex;
        height: 100vh;
        color: var(--text-main);
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
    }
    aside {
        width: var(--sidebar-w);
        background: #fff;
        border-right: 1px solid #e5e5e7;
        display: flex;
        flex-direction: column;
        padding: 32px 24px;
        z-index: 1000;
        transition: var(--transition);
        position: relative;
    }
    .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 40px;
        animation: fadeInDown 0.6s ease;
    }
    .logo-sm {
        width: 45px;
        height: 45px;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease;
    }
    .logo-sm:hover { transform: rotate(-5deg) scale(1.1); }
    .nav-item {
        display: flex;
        align-items: center;
        padding: 12px 16px;
        border-radius: 12px;
        color: var(--text-sec);
        text-decoration: none;
        margin-bottom: 6px;
        font-size: 0.95rem;
        transition: var(--transition);
    }
    .nav-item.active {
        background: rgba(0, 113, 227, 0.08);
        color: var(--accent);
        font-weight: 600;
    }
    main {
        flex: 1;
        padding: 40px;
        overflow-y: auto;
        background: linear-gradient(160deg, #f5f5f7 0%, #ffffff 100%);
        transition: var(--transition);
    }
    .header-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        animation: fadeIn 0.8s ease;
    }
    .menu-toggle {
        display: none;
        background: #fff;
        border: 1px solid #e5e5e7;
        padding: 10px;
        border-radius: 10px;
        cursor: pointer;
    }
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }
    .stat-box {
        background: #fff;
        padding: 24px;
        border-radius: 20px;
        border: 1px solid #e5e5e7;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        animation: slideUp 0.6s ease forwards;
        opacity: 0;
    }
    .stat-box:nth-child(1) { animation-delay: 0.1s; }
    .stat-box:nth-child(2) { animation-delay: 0.2s; }
    .stat-box:nth-child(3) { animation-delay: 0.3s; }
    .glass-card {
        background: var(--glass);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 24px;
        border: 1px solid #fff;
        padding: clamp(15px, 4vw, 30px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.04);
        animation: fadeIn 1s ease;
    }
    .table-wrapper { overflow-x: auto; margin-top: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { text-align: left; padding: 15px; color: var(--text-sec); font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #e5e5e7; }
    td { padding: 18px 15px; border-bottom: 1px solid #f2f2f2; transition: 0.2s; }
    tr:hover td { background: rgba(0,0,0,0.01); }
    .btn-action {
        background: #f5f5f7; border: none; padding: 8px 14px; 
        border-radius: 8px; cursor: pointer; font-weight: 500; transition: 0.3s;
    }
    .btn-action:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }
    #toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: #1d1d1f; color: #fff; padding: 12px 25px; 
        border-radius: 50px; display: none; z-index: 2000;
    }
    #closeSidebar {
        display: none;
        position: absolute;
        top: 15px;
        right: 15px;
        background: #ff3b30;
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 900px) {
        aside { position: fixed; left: -100%; height: 100%; }
        aside.open { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
        .menu-toggle { display: block; }
        main { padding: 25px; }
        #closeSidebar { display: block; }
    }
    @media (max-width: 600px) {
        .header-bar { flex-direction: column; align-items: flex-start; gap: 15px; }
        .stats-grid { grid-template-columns: 1fr; }
        .stat-box { padding: 18px; }
    }
</style>
</head>
<body>

<aside id="sidebar">
    <button id="closeSidebar" onclick="toggleSidebar()">✕</button>
    <div class="brand">
        <div class="logo-sm">
            <img src="./logo.png" width="45" height="45" alt="V" style="object-fit: contain;">
        </div>
        <div class="brand-name">Vasuki iTech</div>
    </div>
    <nav>
        <a href="#" class="nav-item active">📁 All Files</a>
    </nav>
    <div class="sidebar-card" style="background:#fbfbfd; padding:20px; border-radius:20px; border:1px solid #efeff3; margin-top:20px;">
        <h4 style="margin:0 0 15px 0; font-size:0.8rem; color:var(--text-sec);">STORAGE</h4>
        <canvas id="storageChart"></canvas>
        <div style="text-align: center; margin-top: 10px;">
            <span id="usageText" style="font-weight: 600;">0 MB</span>
            <span style="color:var(--text-sec); font-size:0.8rem;"> / 500 MB</span>
        </div>
    </div>
</aside>

<main>
    <div class="header-bar">
        <div style="display:flex; align-items:center; gap:15px;">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <h1 style="margin:0; font-size: 1.8rem; letter-spacing: -0.03em;">Vasuki Neem</h1>
        </div>
        <div class="user-pill" style="background:#fff; padding:8px 18px; border-radius:30px; border:1px solid #e5e5e7; font-size:0.85rem;">
            <span id="userDisplay">Loading...</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <small style="color:var(--text-sec)">Files Stored</small>
            <div id="fileCount" style="font-size:1.6rem; font-weight:600;">0</div>
        </div>
        <div class="stat-box">
            <small style="color:var(--text-sec)">Vault Status</small>
            <div style="font-size:1.6rem; font-weight:600; color:#34c759;">Active</div>
        </div>
        <div class="stat-box">
            <small style="color:var(--text-sec)">Encryption</small>
            <div style="font-size:1.6rem; font-weight:600; color:var(--accent);">AES-256</div>
        </div>
    </div>

    <div class="glass-card">
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('files').click()" 
             style="border:2px dashed #d2d2d7; border-radius:20px; padding:40px; text-align:center; cursor:pointer; transition:0.3s;">
            <input type="file" id="files" multiple style="display:none" onchange="uploadFiles()">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">🚀</div>
            <div style="font-weight: 600; font-size: 1.1rem;">Upload to Cloud</div>
            <div style="color: var(--text-sec); font-size: 0.85rem;">Click or drag files into this area</div>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Size</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="fileList"></tbody>
            </table>
        </div>
    </div>
</main>

<div id="toast"></div>

<script>
const BASE_URL = "https://vasuki-cloud-backend-production.up.railway.app";
const urlParams = new URLSearchParams(window.location.search);
const userEmail = urlParams.get('email');
let storageChart;

if (!userEmail) window.location.href = 'login.html';
else {
    document.getElementById('userDisplay').textContent = userEmail;
    initChart();
    listFiles();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

function initChart() {
    const ctx = document.getElementById('storageChart').getContext('2d');
    storageChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Used', 'Free'],
            datasets: [{
                data: [0, 500],
                backgroundColor: ['#0071e3', '#f2f2f7'],
                borderWidth: 0,
                cutout: '85%'
            }]
        },
        options: { plugins: { legend: { display: false } }, responsive: true }
    });
}

async function listFiles() {
    try {
        const res = await fetch(`${BASE_URL}/list-files`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: userEmail })
        });
        const data = await res.json();
        const tbody = document.getElementById("fileList");

        let totalMB = 0;
        tbody.innerHTML = data.files.map(f => {
            totalMB += (f.size / (1024*1024));
            return `
                <tr>
                    <td style="font-weight:500;">${f.name}</td>
                    <td style="color:var(--text-sec)">${(f.size/1024).toFixed(1)} KB</td>
                    <td style="display:flex; gap:8px;">
                        <button class="btn-action" onclick="window.open('${BASE_URL}/download/${encodeURIComponent(userEmail)}/${encodeURIComponent(f.name)}')">Get</button>
                        <button class="btn-action" style="background:#ff9500; color:#fff" onclick="renameFilePrompt('${f.name}')">Rename</button>
                        <button class="btn-action" style="background:#ff3b30; color:#fff" onclick="deleteFile('${f.name}')">×</button>
                    </td>
                </tr>
            `;
        }).join('');

        document.getElementById('fileCount').textContent = data.files.length;
        updateStorageUI(totalMB);
    } catch (err) { console.error("Sync failed", err); }
}

async function renameFilePrompt(oldName) {
    const newName = prompt("Enter new filename:", oldName);
    if(!newName || newName === oldName) return;

    try {
        const res = await fetch(`${BASE_URL}/rename-file`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: userEmail, oldName, newName })
        });
        const data = await res.json();
        if(res.ok) showToast("Renamed successfully");
        else showToast(data.message || "Rename failed");
        listFiles();
    } catch(err) {
        console.error(err);
        showToast("Rename failed");
    }
}

function updateStorageUI(used) {
    document.getElementById('usageText').textContent = `${used.toFixed(1)} MB`;
    storageChart.data.datasets[0].data = [used, 500 - used];
    storageChart.update();
}

async function uploadFiles() {
    const files = document.getElementById('files').files;
    const formData = new FormData();
    formData.append("email", userEmail);
    for (let f of files) formData.append("files", f);

    showToast("Sending to Vault...");
    const res = await fetch(`${BASE_URL}/upload`, { method: "POST", body: formData });
    if (res.ok) { showToast("Stored Successfully"); listFiles(); }
}

async function deleteFile(name) {
    if(!confirm("Delete?")) return;
    await fetch(`${BASE_URL}/delete-file`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail, filename: name })
    });
    listFiles();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}
</script>
</body>
</html>
