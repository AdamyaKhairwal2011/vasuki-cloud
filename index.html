<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neem | Vasuki iTech</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-w: 280px;
            --bg: #0a0a0c; 
            --accent: #0071e3;
            --text-main: #ffffff;
            --text-sec: #86868b;
            /* Frosted Glass Effect */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(16px) saturate(180%);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; outline: none; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
            background: url("./planet-earth-dark-outer-space_63762-1157.jpg");
            background-size: cover;
        }

        /* --- BACKGROUND SPLINE --- */
        #splineViewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Allows clicking through to UI */
        }

        /* --- SIDEBAR --- */
        aside {
            width: var(--sidebar-w);
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            z-index: 1000;
            transition: var(--transition);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border-radius: 12px;
            color: var(--text-sec);
            text-decoration: none;
            margin-bottom: 8px;
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
            border: 1px solid var(--glass-border);
        }

        /* --- MAIN CONTENT --- */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            z-index: 1000;
            position: relative;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin: 0;
            color: #fff;
        }

        .user-pill {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.85rem;
            color: var(--text-sec);
        }

        /* --- BENTO STATS --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 24px;
            transition: var(--transition);
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 8px;
            display: block;
            color: #fff;
        }

        /* --- GLASS CARDS --- */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: var(--transition);
            margin-bottom: 30px;
            cursor: pointer;
            color: var(--text-sec);
        }

        .upload-zone:hover {
            border-color: var(--accent);
            background: rgba(0, 113, 227, 0.05);
            color: #fff;
        }

        /* --- TABLE STYLE --- */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { 
            color: var(--text-sec); 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 1px; 
            padding: 15px 10px; 
            border-bottom: 1px solid var(--glass-border); 
            text-align: left;
        }
        td { 
            padding: 16px 10px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid var(--glass-border);
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-action:hover { background: var(--accent); border-color: var(--accent); }

        #toast {
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5000;
            display: none;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Chart Customization */
        #storageChart { filter: drop-shadow(0 0 10px rgba(0, 113, 227, 0.3)); }

        @media (max-width: 1000px) {
            aside { position: fixed; left: -280px; height: 100%; }
            main { padding: 20px; }
        }
    </style>
</head>
<body>


<aside id="sidebar">
    <div class="brand">
        <img src="./logo-wht.png" width="35" alt="V">
        <div class="brand-name">Vasuki iTech</div>
    </div>
    <nav>
        <a href="#" class="nav-item active">📁 All Assets</a>
    </nav>
    <div style="margin-top:auto; background: rgba(255,255,255,0.03); padding: 20px; border-radius: 24px; border: 1px solid var(--glass-border);">
        <h4 style="margin:0 0 15px 0; font-size:0.65rem; color:var(--text-sec); letter-spacing:1px; text-transform: uppercase;">Cloud Storage</h4>
        <div style="height: 120px;"><canvas id="storageChart"></canvas></div>
        <div style="text-align: center; margin-top: 10px;">
            <span id="usageText" style="font-weight: 700; color: #fff;">0 MB</span>
            <span style="color:var(--text-sec); font-size:0.75rem;"> / 500 MB</span>
        </div>
    </div>
</aside>

<main>
    <div class="header-bar">
        <h1>Vasuki <span style="font-weight:300; color:var(--text-sec);">Neem</span></h1>
        <div class="user-pill">
            <span id="userDisplay">Loading...</span>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-box">
            <small style="color:var(--text-sec); font-weight:600; text-transform:uppercase; font-size:0.65rem;">Cloud Assets</small>
            <span id="fileCount" class="stat-val">0</span>
        </div>
        <div class="stat-box">
            <small style="color:var(--text-sec); font-weight:600; text-transform:uppercase; font-size:0.65rem;">Security</small>
            <span class="stat-val" style="color: #34C759;">Active</span>
        </div>
        <div class="stat-box">
            <small style="color:var(--text-sec); font-weight:600; text-transform:uppercase; font-size:0.65rem;">Encryption</small>
            <span class="stat-val" style="color: var(--accent);">End-to-End</span>
        </div>
    </div>

    <div class="glass-card">
        <div class="upload-zone" id="dropZone" onclick="document.getElementById('files').click()">
            <input type="file" id="files" multiple style="display:none" onchange="uploadFiles()">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">☁️</div>
            <div style="font-weight: 600; color:#fff;">Deploy New Resource</div>
            <div style="font-size: 0.8rem;">Drag and drop or click to upload</div>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Resource Name</th>
                        <th>Size</th>
                        <th style="text-align:right">Management</th>
                    </tr>
                </thead>
                <tbody id="fileList"></tbody>
            </table>
        </div>
    </div>
</main>

<div id="shareModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(12px); z-index:9999; justify-content:center; align-items:center; padding:20px;">
    <div style="background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.15); backdrop-filter: blur(25px) saturate(180%); padding:35px; border-radius:32px; max-width:440px; width:100%; box-shadow: 0 40px 100px rgba(0,0,0,0.6);">
        
        <h2 style="margin-top:0; color: #fff; font-weight: 700; letter-spacing: -0.5px;">Secure Share</h2>
        <p style="color: var(--text-sec); font-size: 0.85rem; margin-top: -10px; margin-bottom: 25px;">Select resources to generate an encrypted link.</p>
        
        <div id="fileSelection" style="max-height:220px; overflow-y:auto; margin:20px 0; padding-right: 5px;">
            </div>

        <div style="margin-bottom:25px;">
            <label style="display:block; margin-bottom:10px; font-size:0.65rem; color:var(--text-sec); font-weight:700; letter-spacing: 1px; text-transform: uppercase;">Access Permission</label>
            <select id="sharePerm" style="width:100%; padding:14px; background: rgba(255,255,255,0.05); color: #fff; border:1px solid rgba(255,255,255,0.1); border-radius:14px; font-family: inherit; outline: none; cursor: pointer;">
                <option value="read" style="background: #1a1a1a;">View Only (Restricted)</option>
                <option value="download" style="background: #1a1a1a;">Download Access</option>
            </select>
        </div>

        <div style="display:grid; grid-template-columns: 1.2fr 0.8fr; gap:12px;">
            <button onclick="doShare()" style="background:var(--accent); color:white; border:none; padding:15px; border-radius:14px; font-weight:700; cursor:pointer; transition: transform 0.2s ease;">
                Generate & Copy Link
            </button>
            <button onclick="closeShareModal()" style="background: rgba(255,255,255,0.1); color: #fff; border:none; padding:15px; border-radius:14px; font-weight:600; cursor:pointer;">
                Cancel
            </button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
const BASE_URL = "https://vasuki-cloud-backend-production.up.railway.app";
const urlParams = new URLSearchParams(window.location.search);
const userEmail = urlParams.get('email');
let storageChart;
let allFiles = [];

if (!userEmail) window.location.href = 'login.html';
else {
    document.getElementById('userDisplay').textContent = userEmail;
    initChart();
    listFiles();
}

function toggleSidebar() {
    const sb = document.getElementById('sidebar');
    const ov = document.getElementById('overlay');
    sb.classList.toggle('open');
    ov.classList.toggle('active');
}

function initChart() {
    const ctx = document.getElementById('storageChart').getContext('2d');
    storageChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Used', 'Free'],
            datasets: [{
                data: [0, 500],
                backgroundColor: ['#007AFF', '#E5E5E7'],
                borderWidth: 0,
                cutout: '80%'
            }]
        },
        options: { 
            plugins: { legend: { display: false } }, 
            responsive: true,
            maintainAspectRatio: false
        }
    });
}

async function listFiles() {
    try {
        const res = await fetch(`${BASE_URL}/list-files`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: userEmail })
        });
        const data = await res.json();
        allFiles = data.files;
        const tbody = document.getElementById("fileList");

        let totalMB = 0;
        tbody.innerHTML = data.files.map(f => {
            totalMB += (f.size / (1024*1024));
            return `
                <tr>
                    <td style="font-weight:500;">${f.name}</td>
                    <td style="color:var(--text-sec); font-family: monospace; font-size: 0.8rem;">${(f.size/1024).toFixed(1)} KB</td>
                    <td align="right">
                        <div style="display:flex; gap:6px; justify-content: flex-end;">
                            <button class="btn-action" onclick="window.open('${BASE_URL}/download/${encodeURIComponent(userEmail)}/${encodeURIComponent(f.name)}')">GET</button>
                            <button class="btn-action" style="background:#FF9500; color:white;" onclick="renameFilePrompt('${f.name}')">Rename</button>
                            <button class="btn-action" style="background:#FF3B30; color:white;" onclick="deleteFile('${f.name}')">Delete</button>
                            <button class="btn-action" style="background:#34C759; color:white;" onclick="openShareModal()">Share</button>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');

        document.getElementById('fileCount').textContent = data.files.length;
        updateStorageUI(totalMB);
    } catch (err) { console.error("Sync failed", err); }
}

async function renameFilePrompt(oldName) {
    const newName = prompt("Enter new filename:", oldName);
    if(!newName || newName === oldName) return;
    try {
        const res = await fetch(`${BASE_URL}/rename-file`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: userEmail, oldName, newName })
        });
        if(res.ok) showToast("Filename updated");
        listFiles();
    } catch(err) { showToast("Error renaming"); }
}

function openShareModal() {
    const modal = document.getElementById('shareModal');
    const fileSel = document.getElementById('fileSelection');
    fileSel.innerHTML = allFiles.map(f => `
        <label style="display:flex; align-items:center; background:#162c41; padding:10px; border-radius:10px; margin-bottom:8px; cursor:pointer; font-size:0.85rem;">
            <input type="checkbox" value="${f.name}" style="margin-right:12px; accent-color:var(--accent);"> ${f.name}
        </label>
    `).join('');
    modal.style.display = 'flex';
}

function closeShareModal() { document.getElementById('shareModal').style.display = 'none'; }

function doShare() {
    const selected = Array.from(document.querySelectorAll('#fileSelection input:checked')).map(cb => cb.value);
    if (selected.length === 0) { showToast('Select files'); return; }
    const perm = document.getElementById('sharePerm').value;
    const shareURL = `${window.location.origin}/share.html?user=${encodeURIComponent(userEmail)}&files=${encodeURIComponent(selected.join(','))}&perm=${perm}`;
    navigator.clipboard.writeText(shareURL);
    showToast("Link copied to clipboard");
    closeShareModal();
}

function updateStorageUI(used) {
    document.getElementById('usageText').textContent = `${used.toFixed(1)} MB`;
    storageChart.data.datasets[0].data = [used, 500 - used];
    storageChart.update();
}

async function uploadFiles() {
    const files = document.getElementById('files').files;
    const formData = new FormData();
    formData.append("email", userEmail);
    for (let f of files) formData.append("files", f);
    showToast("Uploading...");
    const res = await fetch(`${BASE_URL}/upload`, { method: "POST", body: formData });
    if (res.ok) { showToast("Upload complete"); listFiles(); }
}

async function deleteFile(name) {
    if(!confirm("Delete permanently?")) return;
    await fetch(`${BASE_URL}/delete-file`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: userEmail, filename: name })
    });
    listFiles();
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.animation = 'slideUp 0.4s forwards';
    setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
