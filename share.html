<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Assets | Vasuki Cloud</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    :root {
        --bg: #F5F5F7;
        --card-bg: #FFFFFF;
        --accent: #007AFF;
        --text-main: #1D1D1F;
        --text-sec: #86868B;
        --glass-border: rgba(0, 0, 0, 0.08);
        --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
        margin: 0;
        font-family: 'Inter', -apple-system, sans-serif;
        background: var(--bg);
        color: var(--text-main);
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    /* --- HEADER --- */
    header {
        width: 100%;
        max-width: 1000px;
        padding: 60px 30px 40px;
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }

    .brand-area h2 {
        margin: 0;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -1px;
    }

    .status-badge {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        padding: 6px 14px;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-sec);
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .status-dot {
        width: 8px;
        height: 8px;
        background: #34C759;
        border-radius: 50%;
        box-shadow: 0 0 8px #34C759;
    }

    /* --- GRID --- */
    .container {
        width: 100%;
        max-width: 1000px;
        padding: 0 30px 60px;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 24px;
    }

    .card {
        background: var(--card-bg);
        border-radius: 24px;
        padding: 16px;
        border: 1px solid var(--glass-border);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        border-color: var(--accent);
    }

    .preview-wrapper {
        width: 100%;
        height: 180px;
        background: #fdfdfd;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
    }

    .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s ease;
        user-select: none;
        -webkit-user-drag: none;
    }

    .card:hover img {
        transform: scale(1.05);
    }

    .file-info {
        padding: 15px 5px 5px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .file-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--text-main);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .download-btn {
        width: 100%;
        padding: 10px;
        border-radius: 12px;
        border: none;
        background: var(--accent);
        color: #fff;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
    }

    .download-btn:hover {
        background: #0056b3;
    }

    .read-only-shield {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(4px);
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 0.6rem;
        font-weight: 700;
        text-transform: uppercase;
        color: var(--text-sec);
        border: 1px solid var(--glass-border);
    }

    .footer-note {
        margin-top: 40px;
        text-align: center;
        color: var(--text-sec);
        font-size: 0.8rem;
        padding: 20px;
        border-top: 1px solid var(--glass-border);
        width: 100%;
    }

    @media (max-width: 600px) {
        header { padding-top: 40px; flex-direction: column; align-items: flex-start; gap: 15px; }
        .grid { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<header>
    <div class="brand-area">
        <div style="color: var(--accent); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Vasuki iTech Vault</div>
        <h2>Shared Assets</h2>
    </div>
    <div class="status-badge" id="permBadge">
        <div class="status-dot"></div>
        Secure Link Active
    </div>
</header>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<div class="footer-note" id="note">
    Protected by Vasuki Cloud Encryption. All access is logged.
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const user = params.get("user");
    const files = params.get("files")?.split(",");
    const perm = params.get("perm");

    if (!user || !files || !perm) {
        document.body.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
                <h1 style="font-size:4rem;">🔒</h1>
                <p style="color:#86868b; font-weight:500;">Access Denied. This link is invalid or has expired.</p>
            </div>
        `;
        throw new Error("Invalid link");
    }

    const isReadOnly = perm === "read";
    
    if (isReadOnly) {
        document.addEventListener("contextmenu", e => e.preventDefault());
        document.getElementById("permBadge").innerHTML = '<div class="status-dot" style="background:#FF9500; box-shadow: 0 0 8px #FF9500;"></div> Read Only Mode';
        document.getElementById("note").innerText = "This is a secure read-only preview. Downloading is disabled.";
    }

    const grid = document.getElementById("grid");

    files.forEach(file => {
        const imgURL = `https://vasuki-cloud-backend-production.up.railway.app/download/${user}/${file}`;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <div class="preview-wrapper">
                ${isReadOnly ? '<div class="read-only-shield">Protected</div>' : ''}
                <img src="${imgURL}" ${isReadOnly ? 'style="pointer-events:none"' : ''} onerror="this.src='https://cdn-icons-png.flaticon.com/512/124/124837.png'; this.style.padding='40px';">
            </div>
            <div class="file-info">
                <div class="file-name" title="${file}">${file}</div>
                ${!isReadOnly ? `
                    <button class="download-btn">
                        <span>Download</span>
                    </button>
                ` : ``}
            </div>
        `;

        if (!isReadOnly) {
            card.querySelector("button").onclick = () => {
                const a = document.createElement("a");
                a.href = imgURL;
                a.download = file;
                a.click();
            };
        }

        grid.appendChild(card);
    });
</script>

</body>
</html>
