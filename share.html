<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="./tailwind.js"></script>
    <style>
  img {
    -webkit-user-drag: none;
    pointer-events: none;
  }
</style>

</head>
<body oncontextmenu="return false" class="bg-[#050505] text-white antialiased overflow-x-hidden relativee">

  <div class="absolute inset-0">
    <div class="w-full h-full bg-[linear-gradient(to_right,#1a1d29_1px,transparent_1px),linear-gradient(to_bottom,#1a1d29_1px,transparent_1px)] bg-[size:80px_80px] opacity-40"></div>

    <!-- Diagonal pattern right side (like original site) -->
    <div class="absolute left-0 top-0 bottom-0 w-32 bg-[repeating-linear-gradient(45deg,rgba(255,255,255,0.3)_0,rgba(255,255,255,0.5)_0.5px,transparent_1px,transparent_17px)] opacity-20"></div>
    <div class="absolute right-0 top-0 bottom-0 w-72 bg-[repeating-linear-gradient(45deg,rgba(255,255,255,0.3)_0,rgba(255,255,255,0.5)_0.5px,transparent_1px,transparent_17px)] opacity-20"></div>
  </div>




<!-- APPLE STYLE HEADER -->
<header id="siteHeader" class="fixed top-0 left-0 right-0 z-1200  bg-black border-b border-white/10">
  <div class="max-w-7xl mx-auto px-6 md:px-10 py-4 flex items-center justify-between">

    <div class="flex items-center gap-3">
      <span class="text-[28px] font-semibold tracking-tight bg-gradient-to-r from-white to-white/40 bg-clip-text text-transparent">
        Vāsuki
      </span>
    </div>
  </div>
</header>
    
<section class="pt-[130px] pb-[50px] relative">
  <div class="max-w-7xl mx-auto px-6 md:px-10">

    <h1 class="text-[44px] md:text-[46px] leading-[1.05] tracking-tight font-semibold 
               bg-gradient-to-b from-white to-white/60 bg-clip-text text-transparent drop-shadow-xl">
               Project Shared By <span id="sender_name"></span>
    </h1>

    <br><br><br>
  <div id="file_list"
       class="p-6 rounded-3xl bg-white/5 backdrop-blur-xl border border-white/10 
              shadow-lg shadow-black/30 space-y-6 select-none transition-all">
  </div>
  <div id="loader" class="w-full flex justify-center py-10">
  <div class="w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
</div>


  </div>
</section>

<!-- Fullscreen Image Viewer -->
<div id="image_viewer"
     class="fixed inset-0 w-full flex bg-black/80 backdrop-blur-xl hidden items-center justify-center z-50">
  <br><br><br><br><br><br>
  <img id="viewer_img"
       class="max-w-[90vw] max-h-[90vh] rounded-xl shadow-2xl border border-white/20" />

</div>
<script>
  document.getElementById("image_viewer").onclick = () => {
    document.getElementById("image_viewer").classList.add("hidden");
  };
</script>


<script type="module" src="./share.js"></script>
</body>
</html>
